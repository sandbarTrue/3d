<!DOCTYPE html>
<!--
  gallery-cloudai.html
  复刻老 discover.html 的风格 (nav/pills/masonry/multi-card-type),
  每个 scene-card 的 3D 内容由 CloudAI-X/threejs-skills 规范驱动:
    · threejs-shaders        — palette shader
    · threejs-geometry       — InstancedMesh wave
    · threejs-interaction    — Raycaster pick
    · threejs-animation      — elastic tween ring
    · threejs-materials      — MeshPhysicalMaterial sphere
  不动: 其它所有已有文件.
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery · CloudAI-X — 3D Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Mono:wght@700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.2);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(167,139,250,0.4)}
  a{color:inherit;text-decoration:none}

  .nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;padding:0 24px;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid rgba(167,139,250,0.1)}
  .nav-logo{font-weight:800;font-size:18px;letter-spacing:-0.5px;margin-right:32px;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .nav a{font-size:13px;font-weight:500;margin-right:20px;color:rgba(255,255,255,0.4);transition:color .2s}
  .nav a:hover{color:rgba(255,255,255,0.8)}
  .nav a.on{color:#fff}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .nav-right .btn{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,0.7)}
  .nav-right .btn.primary{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;border:none}

  .pills{display:flex;gap:6px;padding:14px 24px;background:rgba(10,10,15,0.6);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.04);overflow-x:auto}
  .pills::-webkit-scrollbar{display:none}
  .pill{padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);font-size:12px;font-weight:500;color:rgba(255,255,255,0.4);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
  .pill:hover{border-color:rgba(167,139,250,0.3);color:rgba(255,255,255,0.7)}
  .pill.on{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;border-color:transparent}

  .grid{column-count:4;column-gap:14px;padding:20px 24px 60px;max-width:1500px;margin:0 auto}
  @media(max-width:1200px){.grid{column-count:3}}
  @media(max-width:800px){.grid{column-count:2;padding:12px}}
  @media(max-width:500px){.grid{column-count:1}}
  .card{break-inside:avoid;margin-bottom:14px;border-radius:14px;overflow:hidden;background:rgba(20,18,30,0.8);border:1px solid rgba(255,255,255,0.05);position:relative;transition:transform .3s ease, box-shadow .3s ease, border-color .3s ease}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.2)}
  .card .scene{width:100%;position:relative;overflow:hidden;background:#0a0815}
  .card .scene canvas{display:block;width:100%!important;height:100%!important}

  .badge-3d{position:absolute;top:10px;right:10px;z-index:5;padding:3px 8px;border-radius:6px;background:rgba(167,139,250,0.15);backdrop-filter:blur(8px);border:1px solid rgba(167,139,250,0.2);font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(167,139,250,0.9);text-transform:uppercase}
  .card-text{padding:24px 20px}
  .card-text h3{font-size:16px;font-weight:700;margin-bottom:6px}
  .card-text p{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5}
  .card-text .tag{display:inline-block;margin-top:10px;padding:3px 8px;border-radius:10px;background:rgba(167,139,250,0.1);font-size:10px;font-weight:700;color:rgba(167,139,250,0.9)}
  .card-pixel{background:rgba(10,10,20,0.9);color:#0f0;padding:24px 20px;font-family:'Space Mono',monospace}
  .card-pixel .label{font-size:9px;text-transform:uppercase;letter-spacing:2px;opacity:.5;margin-bottom:10px}
  .card-pixel .body{font-size:11px;line-height:1.7;text-transform:uppercase;font-weight:700}
  .card-pixel .foot{margin-top:14px;font-size:10px;opacity:.4}
  .card-deck{padding:24px 20px;background:rgba(15,14,25,0.9)}
  .card-deck .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(167,139,250,0.7);font-weight:700;margin-bottom:8px}
  .card-deck h3{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1.1}
  .card-deck .author{font-size:11px;color:rgba(255,255,255,0.4);margin-top:8px}
  .card-play{padding:28px;background:linear-gradient(135deg,rgba(70,30,100,0.9),rgba(50,20,80,0.9));display:flex;align-items:center;justify-content:center;min-height:160px}
  .card-play h2{font-size:44px;font-weight:800;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,#a78bfa,#f472b6,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
  .card-foot{display:flex;align-items:center;gap:6px;padding:10px 14px;border-top:1px solid rgba(255,255,255,0.04)}
  .card-foot .dot{width:20px;height:20px;border-radius:50%}
  .card-foot .name{font-size:11px;font-weight:500;color:rgba(255,255,255,0.5)}
  .card-foot .likes{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">3D Lab / CloudAI</div>
  <a href="gallery-cloudai.html" class="on">CloudAI</a>
  <a href="gallery-nicewolf.html">NiceWolf</a>
  <a href="gallery-openaec.html">OpenAEC</a>
  <a href="gallery-webgpu.html">WebGPU</a>
  <div class="nav-right">
    <a href="showcase-2d.html" class="btn">Index</a>
    <a href="discover.html" class="btn primary">Legacy discover</a>
  </div>
</nav>

<div class="pills">
  <button class="pill on">All</button>
  <button class="pill">Fundamentals</button>
  <button class="pill">Materials</button>
  <button class="pill">Shaders</button>
  <button class="pill">Geometry</button>
  <button class="pill">Animation</button>
  <button class="pill">Interaction</button>
  <button class="pill">Post FX</button>
</div>

<main class="grid" id="grid"></main>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.164.1/build/three.module.js","three/addons/":"https://unpkg.com/three@0.164.1/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';

const cards = [
  { kind: 'scene', builder: buildShader,    h: 280, badge: 'shader',  title: 'Palette shader', text: 'IQ cosine palette · ShaderMaterial', author: 'CloudAI · skills/threejs-shaders', dot: '#a78bfa', likes: '1.2k' },
  { kind: 'pixel' },
  { kind: 'scene', builder: buildInstanced, h: 240, badge: 'geometry', title: 'InstancedMesh', text: '1000 cubes, single draw call', author: 'CloudAI · skills/threejs-geometry', dot: '#fcd34d', likes: '845' },
  { kind: 'deck' },
  { kind: 'scene', builder: buildPicker,    h: 240, badge: 'pick',    title: 'Raycaster', text: 'Hover to highlight, click to lock', author: 'CloudAI · skills/threejs-interaction', dot: '#f472b6', likes: '721' },
  { kind: 'play' },
  { kind: 'scene', builder: buildElastic,   h: 220, badge: 'tween',   title: 'Elastic ring', text: 'Hand-written easing, no GSAP', author: 'CloudAI · skills/threejs-animation', dot: '#60a5fa', likes: '510' },
  { kind: 'text', title: 'One file per sub-skill', text: 'CloudAI-X ships ten deterministic skill files. Each is self-contained, readable in under a minute, and dense with quick-start code.', tag: '10 skills' },
  { kind: 'scene', builder: buildGlassBall, h: 260, badge: 'material', title: 'Physical glass', text: 'transmission + clearcoat PBR', author: 'CloudAI · skills/threejs-materials', dot: '#ee7752', likes: '1.7k' },
];

const grid = document.getElementById('grid');
const sceneRequests = [];

cards.forEach(c => {
  const card = document.createElement('div');
  card.className = 'card';
  if (c.kind === 'scene') {
    card.innerHTML = `
      <span class="badge-3d">${c.badge}</span>
      <div class="scene" style="height:${c.h}px"></div>
      <div class="card-text"><h3>${c.title}</h3><p>${c.text}</p></div>
      <div class="card-foot"><span class="dot" style="background:${c.dot}"></span><span class="name">${c.author}</span><span class="likes">♥ ${c.likes}</span></div>`;
    sceneRequests.push({ el: card.querySelector('.scene'), build: c.builder });
  } else if (c.kind === 'pixel') {
    card.innerHTML = `
      <div class="card-pixel">
        <div class="label">CloudAI-X · console</div>
        <div class="body">$ claude skill load<br>  threejs-shaders<br>  threejs-geometry<br>  threejs-materials<br>ok. 3 files, 52 kb.</div>
        <div class="foot">10 deterministic files</div>
      </div>
      <div class="card-foot" style="background:rgba(10,10,20,0.9)"><span class="dot" style="background:#0f0"></span><span class="name">CloudAI-X</span><span class="likes">♥ 934</span></div>`;
  } else if (c.kind === 'deck') {
    card.innerHTML = `
      <div class="card-deck">
        <div class="lbl">Pitch deck</div>
        <h3>Sub-skills<br>compose.</h3>
        <div class="author">Ten small files · 2026</div>
      </div>
      <div class="card-foot"><span class="dot" style="background:#a78bfa"></span><span class="name">threejs-skills</span><span class="likes">♥ 612</span></div>`;
  } else if (c.kind === 'play') {
    card.innerHTML = `
      <div class="card-play"><h2>quick<br>start</h2></div>
      <div class="card-foot" style="background:rgba(70,30,100,0.9);border-color:rgba(167,139,250,0.15)"><span class="dot" style="background:#a78bfa"></span><span class="name">README · copy-paste</span><span class="likes">♥ 1.4k</span></div>`;
  } else if (c.kind === 'text') {
    card.innerHTML = `
      <div class="card-text"><h3>${c.title}</h3><p>${c.text}</p>${c.tag ? `<span class="tag">${c.tag}</span>` : ''}</div>`;
  }
  grid.appendChild(card);
});

/* ================ Scene builders ================ */

function makeRenderer(el){
  const r = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  r.setPixelRatio(Math.min(devicePixelRatio, 2));
  r.setSize(el.clientWidth, el.clientHeight);
  el.appendChild(r.domElement);
  const cam = new THREE.PerspectiveCamera(45, el.clientWidth / el.clientHeight, 0.1, 50);
  cam.position.z = 4;
  const scene = new THREE.Scene();
  new ResizeObserver(() => {
    r.setSize(el.clientWidth, el.clientHeight);
    cam.aspect = el.clientWidth / el.clientHeight;
    cam.updateProjectionMatrix();
  }).observe(el);
  return { r, cam, scene };
}

function buildShader(el){
  const { r, cam, scene } = makeRenderer(el);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: 'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: `
      uniform float uTime; varying vec2 vUv;
      vec3 pal(float t){ return vec3(0.5)+vec3(0.5)*cos(6.28318*(vec3(1.0,0.8,0.6)*t+vec3(0.0,0.15,0.30))); }
      void main(){ vec2 p=vUv-0.5; float r=length(p); float a=atan(p.y,p.x); float t=r*1.7+sin(a*4.0+uTime*0.6)*0.25-uTime*0.12; vec3 col=pal(fract(t))*smoothstep(0.7,0.0,r); gl_FragColor=vec4(col,1.0); }`
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(4, 3), mat));
  cam.position.z = 3;
  const clock = new THREE.Clock();
  function t(){ requestAnimationFrame(t); mat.uniforms.uTime.value = clock.getElapsedTime(); r.render(scene, cam); } t();
}

function buildInstanced(el){
  const { r, cam, scene } = makeRenderer(el);
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const k = new THREE.DirectionalLight(0xa78bfa, 1.5); k.position.set(4, 3, 5); scene.add(k);
  const rim = new THREE.DirectionalLight(0xfcd34d, 0.6); rim.position.set(-4, -2, 2); scene.add(rim);
  cam.position.set(0, 1, 6);
  const N = 1000, grid = Math.ceil(Math.cbrt(N));
  const mesh = new THREE.InstancedMesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 }), N);
  const dummy = new THREE.Object3D(); const base = [];
  for (let i = 0; i < N; i++) {
    const x = (i % grid - grid/2) * 0.35, y = (Math.floor(i/grid) % grid - grid/2) * 0.35, z = (Math.floor(i/(grid*grid)) - grid/2) * 0.35;
    base.push(x, y, z);
    dummy.position.set(x, y, z); dummy.updateMatrix(); mesh.setMatrixAt(i, dummy.matrix);
  }
  scene.add(mesh);
  const clock = new THREE.Clock();
  function t(){ requestAnimationFrame(t); const tt = clock.getElapsedTime();
    for (let i = 0; i < N; i++) {
      const x = base[i*3], y = base[i*3+1], z = base[i*3+2];
      dummy.position.set(x, y + Math.sin(tt*0.8 + x + z)*0.35, z);
      dummy.rotation.set(tt*0.3 + x, tt*0.4 + y, 0);
      dummy.updateMatrix(); mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
    scene.rotation.y = tt*0.12;
    r.render(scene, cam);
  } t();
}

function buildPicker(el){
  const { r, cam, scene } = makeRenderer(el);
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const l = new THREE.DirectionalLight(0xffffff, 1.1); l.position.set(3, 4, 5); scene.add(l);
  cam.position.z = 6;
  const base = new THREE.Color(0x5a4d8a), hi = new THREE.Color(0xa78bfa), lock = new THREE.Color(0xfcd34d);
  const cubes = [];
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color: base.clone(), roughness: 0.4 }));
    m.position.set((i-1.5)*0.9, (j-1.5)*0.9, 0);
    m.userData = { lock: false };
    scene.add(m); cubes.push(m);
  }
  const ray = new THREE.Raycaster(); const ptr = new THREE.Vector2(); let hov = null;
  r.domElement.addEventListener('pointermove', ev => {
    const rr = r.domElement.getBoundingClientRect();
    ptr.x = ((ev.clientX-rr.left)/rr.width)*2-1; ptr.y = -((ev.clientY-rr.top)/rr.height)*2+1;
    ray.setFromCamera(ptr, cam);
    const hit = ray.intersectObjects(cubes)[0]?.object || null;
    if (hov && hov !== hit && !hov.userData.lock) hov.material.color.copy(base);
    if (hit && !hit.userData.lock) hit.material.color.copy(hi);
    hov = hit;
  });
  r.domElement.addEventListener('pointerdown', ev => { if (hov) { hov.userData.lock = true; hov.material.color.copy(lock); }});
  function t(){ requestAnimationFrame(t); scene.rotation.y += 0.0025; r.render(scene, cam); } t();
}

function buildElastic(el){
  const { r, cam, scene } = makeRenderer(el);
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const l = new THREE.DirectionalLight(0xffffff, 1.2); l.position.set(2, 4, 3); scene.add(l);
  cam.position.set(0, 1.5, 5.5); cam.lookAt(0, 0, 0);
  const N = 10, radius = 1.8, cubes = [];
  for (let i = 0; i < N; i++) {
    const a = (i/N) * Math.PI*2;
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.72, 0.45, 0.5+i/N*0.25), roughness: 0.35 }));
    m.position.set(Math.cos(a)*radius, 0, Math.sin(a)*radius); scene.add(m); cubes.push(m);
  }
  const c4 = 2*Math.PI/3;
  const easeOutElastic = t => t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
  const clock = new THREE.Clock();
  function t(){ requestAnimationFrame(t); const tt = clock.getElapsedTime();
    cubes.forEach((m,i)=>{ const ph = (tt + i*0.12) % 2; m.scale.setScalar(0.5+easeOutElastic(Math.min(ph,1))*0.8); m.rotation.y = tt+i; });
    scene.rotation.y = tt*0.15; r.render(scene, cam);
  } t();
}

function buildGlassBall(el){
  const { r, cam, scene } = makeRenderer(el);
  r.toneMapping = THREE.ACESFilmicToneMapping;
  scene.add(new THREE.AmbientLight(0xffffff, 0.3));
  const k = new THREE.DirectionalLight(0xfff3d6, 2.0); k.position.set(3, 4, 5); scene.add(k);
  const rim = new THREE.DirectionalLight(0xa78bfa, 1.4); rim.position.set(-4, -2, -3); scene.add(rim);
  cam.position.z = 3.5;
  const mat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 1, ior: 1.5, thickness: 0.6, roughness: 0.1, clearcoat: 1 });
  const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 3), mat);
  scene.add(mesh);
  // simple back plane with gradient
  const bg = new THREE.Mesh(new THREE.PlaneGeometry(8, 5), new THREE.MeshBasicMaterial({ color: 0x2a1a4a }));
  bg.position.z = -3; scene.add(bg);
  function t(){ requestAnimationFrame(t); mesh.rotation.y += 0.006; mesh.rotation.x += 0.003; r.render(scene, cam); } t();
}

// boot all scenes after first layout
requestAnimationFrame(() => sceneRequests.forEach(s => s.build(s.el)));
</script>
</body>
