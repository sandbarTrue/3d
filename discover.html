<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — 3D Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Mono:wght@700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#f2f2f2;color:#1a1a1a;min-height:100vh}

  /* ─── Nav ─── */
  .nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;padding:0 24px;background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);border-bottom:1px solid #e5e5e5}
  .nav-logo{font-weight:800;font-size:18px;letter-spacing:-0.5px;margin-right:32px}
  .nav a{text-decoration:none;color:#888;font-size:13px;font-weight:500;margin-right:20px;transition:color .2s}
  .nav a:hover,.nav a.on{color:#111}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .nav-right .btn{padding:7px 16px;border-radius:8px;border:1px solid #ddd;background:white;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
  .nav-right .btn:hover{border-color:#aaa}
  .nav-right .btn.primary{background:#111;color:white;border-color:#111}
  .nav-right .btn.primary:hover{background:#333}

  /* ─── Pills ─── */
  .pills{display:flex;gap:6px;padding:14px 24px;background:white;border-bottom:1px solid #eee;overflow-x:auto}
  .pills::-webkit-scrollbar{display:none}
  .pill{padding:7px 16px;border-radius:20px;border:1px solid #e0e0e0;background:white;font-size:12px;font-weight:500;color:#666;cursor:pointer;white-space:nowrap;transition:all .15s}
  .pill:hover{border-color:#bbb;color:#333}
  .pill.on{background:#111;color:white;border-color:#111}

  /* ─── Masonry ─── */
  .grid{column-count:4;column-gap:14px;padding:20px 24px 60px;max-width:1500px;margin:0 auto}
  @media(max-width:1200px){.grid{column-count:3}}
  @media(max-width:800px){.grid{column-count:2;padding:12px}}
  @media(max-width:500px){.grid{column-count:1}}

  /* ─── Card ─── */
  .card{break-inside:avoid;margin-bottom:14px;border-radius:12px;overflow:hidden;background:white;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease;position:relative}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.1)}

  /* 3D canvas container */
  .card .scene{width:100%;position:relative;overflow:hidden}
  .card .scene canvas{width:100%!important;height:100%!important;display:block}

  /* Text overlays */
  .card .overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;pointer-events:none}
  .card .overlay.center{justify-content:center;align-items:center;text-align:center}
  .card .overlay.gradient::before{content:'';position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.45));pointer-events:none}
  .card .overlay *{position:relative;z-index:1}
  .card .overlay h2{color:white;font-size:28px;font-weight:900;line-height:1.1;letter-spacing:-1px}
  .card .overlay p{color:rgba(255,255,255,.75);font-size:11px;margin-top:4px;font-weight:500}

  /* Card types */
  .card-text{padding:24px 20px}
  .card-text h3{font-size:16px;font-weight:700;margin-bottom:6px}
  .card-text p{font-size:12px;color:#888;line-height:1.5}
  .card-text .tag{display:inline-block;margin-top:10px;padding:3px 8px;border-radius:10px;background:#f0f0f0;font-size:10px;font-weight:600;color:#999}

  .card-pixel{background:#111;color:#0f0;padding:24px 20px;font-family:'Space Mono',monospace}
  .card-pixel .label{font-size:9px;text-transform:uppercase;letter-spacing:2px;opacity:.5;margin-bottom:10px}
  .card-pixel .body{font-size:11px;line-height:1.7;text-transform:uppercase;font-weight:700}
  .card-pixel .foot{margin-top:14px;font-size:10px;opacity:.4}

  .card-love{padding:28px 20px;text-align:center;background:linear-gradient(160deg,#fff5f5,#fff0f6)}
  .card-love .hearts{font-size:36px;margin-bottom:12px}
  .card-love h3{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;margin-bottom:6px}
  .card-love p{font-size:11px;color:#999;line-height:1.5;max-width:220px;margin:0 auto}

  .card-deck{padding:24px 20px;background:#f9fafb}
  .card-deck .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#bbb;font-weight:600;margin-bottom:8px}
  .card-deck h3{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1.1}
  .card-deck .author{font-size:11px;color:#aaa;margin-top:8px}

  .card-play{padding:28px;background:#fef3c7;display:flex;align-items:center;justify-content:center;min-height:160px}
  .card-play h2{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  .card-cjk{padding:24px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:white}
  .card-cjk h3{font-size:24px;font-weight:900;margin-bottom:6px}
  .card-cjk p{font-size:11px;opacity:.65}

  .card-tool{padding:20px;border:2px dashed #ddd;background:#fafafa;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:140px;color:#bbb}
  .card-tool .icon{width:40px;height:40px;border-radius:10px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:20px}
  .card-tool p{font-size:12px;font-weight:500}

  /* Map card */
  .card-map{position:relative;overflow:hidden}
  .card-map canvas{width:100%!important;height:100%!important;display:block}
  .card-map .map-label{position:absolute;bottom:10px;left:10px;background:white;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.08)}

  /* Footer */
  .card-foot{display:flex;align-items:center;gap:6px;padding:10px 14px;border-top:1px solid #f0f0f0}
  .card-foot.dark{border-color:#222;background:#111}
  .card-foot .dot{width:20px;height:20px;border-radius:50%}
  .card-foot .name{font-size:11px;font-weight:500;color:#888}
  .card-foot .likes{margin-left:auto;font-size:11px;color:#bbb}
  .card-foot.dark .name{color:#666}
  .card-foot.dark .likes{color:#444}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">3D Lab</div>
  <a href="#">Explore</a>
  <a href="#" class="on">Discover</a>
  <a href="#">Community</a>
  <a href="#">Learn</a>
  <div class="nav-right">
    <button class="btn">Log in</button>
    <button class="btn primary">Get Started</button>
  </div>
</nav>

<div class="pills">
  <button class="pill on">All</button>
  <button class="pill">3D Illustration</button>
  <button class="pill">Typography</button>
  <button class="pill">Isometric</button>
  <button class="pill">Abstract</button>
  <button class="pill">Game Art</button>
  <button class="pill">Product</button>
  <button class="pill">Architecture</button>
  <button class="pill">Motion</button>
</div>

<div class="grid" id="grid"></div>

<script>
// ── Helpers ──
const PI = Math.PI, TAU = PI * 2;

// ── Card definitions ──
const cards = [
  // 1: "The next wave" — hero with 3D abstract wave
  { type: '3d-hero', height: 280, bg: '#0c3547',
    title: 'The next<br>wave', sub: 'Generative 3D — Explore the frontier',
    scene: 'wave', foot: { color: '#60a5fa', name: 'Studio Wave', likes: '2.4k' } },

  // 2: Pixel art text card
  { type: 'pixel' },

  // 3: Coral isometric blocks
  { type: '3d', height: 260, bg: '#f5f0ec',
    scene: 'blocks-coral',
    foot: { color: '#ff7979', name: 'Isometric Co.', likes: '3.1k' } },

  // 4: "Diamond" typography with 3D diamond
  { type: '3d-text', height: 220, bg: '#ffffff',
    scene: 'diamond',
    foot: { color: '#a8edea', name: 'Diamond Studio', likes: '1.8k' } },

  // 5: Castle/nature hero
  { type: '3d-hero', height: 270, bg: '#2d5016',
    title: 'The ✦ stle', sub: 'Medieval architecture reimagined',
    scene: 'nature', foot: { color: '#4ade80', name: 'Nature Lab', likes: '1.6k' } },

  // 6: Brainstorm cards
  { type: 'text', data: { h: 'Brainstorm<br>Cards', p: 'Collaborative ideation toolkit for creative teams', tag: 'Productivity' } },

  // 7: Mint blocks
  { type: '3d', height: 240, bg: '#eef8f3',
    scene: 'blocks-mint',
    foot: { color: '#55efc4', name: 'Block Studio', likes: '2.7k' } },

  // 8: Map card with 3D pin
  { type: '3d-map', height: 220, label: 'San Francisco, CA',
    foot: { color: '#22c55e', name: 'Jesse Smith', likes: '456' } },

  // 9: Pitch Deck
  { type: 'deck' },

  // 10: Mix abstract 3D
  { type: '3d', height: 200, bg: '#f8f8f8',
    scene: 'abstract',
    foot: { color: '#22c55e', name: 'Mix Lab', likes: '1.2k' } },

  // 11: Tool / Get started
  { type: 'tool' },

  // 12: Love letter
  { type: 'love' },

  // 13: Purple voxel blocks (dark bg)
  { type: '3d', height: 300, bg: '#2a2a3e',
    scene: 'blocks-purple',
    foot: { color: '#a29bfe', name: 'Voxel Art', likes: '2.1k', dark: true } },

  // 14: CJK typography
  { type: 'cjk' },

  // 15: Play Jam
  { type: 'play' },

  // 16: Sky blue blocks
  { type: '3d', height: 240, bg: '#eef4ff',
    scene: 'blocks-sky',
    foot: { color: '#74b9ff', name: 'Blue Studio', likes: '1.5k' } },

  // 17: Cyan/teal 3D
  { type: '3d', height: 260, bg: '#f0fdf4',
    scene: 'blocks-teal',
    foot: { color: '#2dd4bf', name: 'Teal Works', likes: '890' } },

  // 18: Another map
  { type: '3d-map', height: 200, label: 'Tokyo, JP',
    foot: { color: '#f59e0b', name: 'Map Studio', likes: '678' } },

  // 19: Peach blocks
  { type: '3d', height: 220, bg: '#fef5f0',
    scene: 'blocks-peach',
    foot: { color: '#fab1a0', name: 'Warm Studio', likes: '987' } },

  // 20: Dark hero
  { type: '3d-hero', height: 230, bg: '#1a1a2e',
    title: 'Creative<br>Vision', sub: 'Pushing boundaries in digital art',
    scene: 'glow', foot: { color: '#a78bfa', name: 'Vision Lab', likes: '1.9k' } },
];

// ── Build DOM ──
const grid = document.getElementById('grid');
const scenes = []; // track {el, renderer, scene, camera, objects, animFn}

cards.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  if (c.type === 'pixel') {
    card.innerHTML = `
      <div class="card-pixel">
        <div class="label">Pixel System</div>
        <div class="body">Pixel graphics, or pixel art, is a form of digital art created by meticulous editing of an image at the pixel level. It is characterized by its low resolution, where each colored square (pixel) is clearly visible and placed intentionally to form the complete image.</div>
        <div class="foot">Pixel 01.0.6</div>
      </div>
      <div class="card-foot dark"><div class="dot" style="background:#0f0"></div><span class="name">Pixel Lab</span><span class="likes">♥ 891</span></div>`;
  } else if (c.type === 'text') {
    card.innerHTML = `
      <div class="card-text">
        <h3>${c.data.h}</h3><p>${c.data.p}</p>
        ${c.data.tag ? `<span class="tag">${c.data.tag}</span>` : ''}
      </div>`;
  } else if (c.type === 'love') {
    card.innerHTML = `
      <div class="card-love">
        <div class="hearts">💗 💖 💕</div>
        <h3>Love Letter</h3>
        <p>Love is a canvas furnished by nature and embroidered by imagination.</p>
      </div>`;
  } else if (c.type === 'deck') {
    card.innerHTML = `
      <div class="card-deck">
        <div class="lbl">Pitch Deck</div>
        <h3>Next<br>Side</h3>
        <div class="author">By Jesse Smith<br>This Year</div>
      </div>`;
  } else if (c.type === 'play') {
    card.innerHTML = `
      <div class="card-play"><h2>play<br>jam!</h2></div>
      <div class="card-foot" style="background:#fef3c7;border-color:#fde68a"><div class="dot" style="background:#f59e0b"></div><span class="name">Game Jam 2024</span><span class="likes">♥ 934</span></div>`;
  } else if (c.type === 'cjk') {
    card.innerHTML = `
      <div class="card-cjk"><h3>3D设计趋势</h3><p>Exploring the future of dimensional design</p></div>
      <div class="card-foot" style="background:#5b21b6;border:none"><div class="dot" style="background:#c4b5fd"></div><span class="name" style="color:#c4b5fd">创意工坊</span><span class="likes" style="color:#8b5cf6">♥ 672</span></div>`;
  } else if (c.type === 'tool') {
    card.innerHTML = `<div class="card-tool"><div class="icon">+</div><p>Get started with a new file.</p></div>`;
  } else if (c.type === '3d' || c.type === '3d-hero' || c.type === '3d-text' || c.type === '3d-map') {
    const h = c.height || 240;
    const sceneDiv = document.createElement('div');
    sceneDiv.className = c.type === '3d-map' ? 'scene card-map' : 'scene';
    sceneDiv.style.height = h + 'px';
    sceneDiv.style.background = c.bg || '#f5f5f5';
    card.appendChild(sceneDiv);

    if (c.type === '3d-hero') {
      const ov = document.createElement('div');
      ov.className = 'overlay gradient';
      ov.innerHTML = `<h2>${c.title}</h2><p>${c.sub}</p>`;
      sceneDiv.appendChild(ov);
    }
    if (c.type === '3d-text') {
      const ov = document.createElement('div');
      ov.className = 'overlay center';
      ov.innerHTML = `<h2 style="color:#111;font-size:38px;letter-spacing:-2px">Dia<span style="display:inline-block;width:32px;height:32px;background:linear-gradient(135deg,#a8edea,#fed6e3);border-radius:50%;vertical-align:middle;margin:0 4px"></span>ond</h2>`;
      sceneDiv.appendChild(ov);
    }
    if (c.type === '3d-map' && c.label) {
      const lbl = document.createElement('div');
      lbl.className = 'map-label';
      lbl.textContent = c.label;
      sceneDiv.appendChild(lbl);
    }

    // Footer
    if (c.foot) {
      const f = document.createElement('div');
      f.className = 'card-foot' + (c.foot.dark ? ' dark' : '');
      f.innerHTML = `<div class="dot" style="background:${c.foot.color}"></div><span class="name">${c.foot.name}</span><span class="likes">♥ ${c.foot.likes}</span>`;
      card.appendChild(f);
    }

    // Queue 3D scene creation
    scenes.push({ el: sceneDiv, config: c });
  }

  grid.appendChild(card);
});

// ── Three.js scene factory ──
function createScene(el, config) {
  const w = el.clientWidth, h = el.clientHeight;
  if (w === 0 || h === 0) return null;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  el.insertBefore(renderer.domElement, el.firstChild);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, w / h, 0.1, 100);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(5, 8, 6);
  dir.castShadow = true;
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0xffffff, 0.3);
  fill.position.set(-3, 4, -2);
  scene.add(fill);

  const group = new THREE.Group();
  scene.add(group);

  let animFn = null;
  const sceneType = config.scene || config.type;

  // ── Block builder ──
  function addBlock(x, y, z, color, s = 0.45) {
    const geo = new THREE.BoxGeometry(s, s, s);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.05 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x * s, z * s, y * s);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    return mesh;
  }

  if (sceneType === 'blocks-coral') {
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0.5, 0);
    const c = 0xff6b6b;
    // Staircase
    for (let i = 0; i < 4; i++)
      for (let j = 0; j < 2; j++)
        for (let k = 0; k <= i; k++)
          addBlock(i - 1.5, j - 0.5, k, c);
    group.rotation.y = 0.3;
    animFn = (t, hover) => {
      group.rotation.y = 0.3 + Math.sin(t * 0.5) * 0.08 + (hover ? t * 0.3 : 0);
    };
  }

  else if (sceneType === 'blocks-mint') {
    camera.position.set(4, 3.5, 4);
    camera.lookAt(0, 0.3, 0);
    const c = 0x00b894;
    // L-shape
    for (let x = 0; x < 3; x++) for (let y = 0; y < 2; y++) addBlock(x-1, y-0.5, 0, c);
    addBlock(-1, -0.5, 1, c); addBlock(0, -0.5, 1, c);
    addBlock(-1, 0.5, 1, c);
    for (let x = 0; x < 3; x++) addBlock(x-1, 1.5, 0, c);
    group.rotation.y = 0.4;
    animFn = (t, hover) => {
      group.rotation.y = 0.4 + Math.sin(t * 0.4) * 0.1 + (hover ? t * 0.3 : 0);
    };
  }

  else if (sceneType === 'blocks-purple') {
    camera.position.set(5, 4, 5);
    camera.lookAt(0, 0.3, 0);
    const c = 0x6c5ce7;
    // Tetris T + L
    for (let x = 0; x < 4; x++) for (let y = 0; y < 2; y++) addBlock(x-1.5, y-0.5, 0, c);
    addBlock(0.5, -0.5, 1, c); addBlock(0.5, 0.5, 1, c);
    addBlock(1.5, -0.5, 1, c); addBlock(1.5, 0.5, 1, c);
    addBlock(1.5, -0.5, 2, c); addBlock(1.5, 0.5, 2, c);
    addBlock(-1.5, 1.5, 0, c); addBlock(-0.5, 1.5, 0, c);
    addBlock(2.5, -0.5, 0, c); addBlock(2.5, 0.5, 0, c); addBlock(2.5, -0.5, 1, c);
    group.rotation.y = -0.3;
    animFn = (t, hover) => {
      group.rotation.y = -0.3 + Math.sin(t * 0.35) * 0.12 + (hover ? t * 0.25 : 0);
    };
  }

  else if (sceneType === 'blocks-sky') {
    camera.position.set(4, 3.5, 4);
    camera.lookAt(0, 0.3, 0);
    const c = 0x0984e3;
    for (let x = 0; x < 4; x++) for (let y = 0; y < 2; y++) addBlock(x-1.5, y-0.5, 0, c);
    addBlock(-0.5, -0.5, 1, c); addBlock(0.5, -0.5, 1, c); addBlock(1.5, -0.5, 1, c);
    addBlock(-0.5, 0.5, 1, c); addBlock(0.5, 0.5, 1, c);
    addBlock(0.5, -0.5, 2, c); addBlock(0.5, 0.5, 2, c);
    group.rotation.y = 0.5;
    animFn = (t, hover) => {
      group.rotation.y = 0.5 + Math.sin(t * 0.45) * 0.1 + (hover ? t * 0.3 : 0);
    };
  }

  else if (sceneType === 'blocks-peach') {
    camera.position.set(3.5, 3, 3.5);
    camera.lookAt(0, 0.2, 0);
    const c = 0xe17055;
    for (let x = 0; x < 2; x++) for (let y = 0; y < 2; y++) addBlock(x-0.5, y-0.5, 0, c);
    addBlock(1.5, -0.5, 0, c); addBlock(1.5, 0.5, 0, c); addBlock(1.5, 1.5, 0, c);
    addBlock(-0.5, -0.5, 1, c); addBlock(0.5, -0.5, 1, c);
    addBlock(-0.5, 0.5, 1, c);
    addBlock(-0.5, -0.5, 2, c);
    addBlock(-0.5, 1.5, 0, c); addBlock(0.5, 1.5, 0, c);
    group.rotation.y = 0.6;
    animFn = (t, hover) => {
      group.rotation.y = 0.6 + Math.sin(t * 0.5) * 0.08 + (hover ? t * 0.3 : 0);
    };
  }

  else if (sceneType === 'blocks-teal') {
    camera.position.set(4, 3.5, 4);
    camera.lookAt(0, 0.3, 0);
    const c = 0x2dd4bf;
    // Cross shape
    for (let y = 0; y < 3; y++) addBlock(0, y-1, 0, c);
    for (let x = -1; x <= 1; x++) addBlock(x, 0, 0, c);
    addBlock(0, 0, 1, c); addBlock(0, -1, 1, c);
    addBlock(1, 0, 1, c);
    addBlock(0, 0, 2, c);
    group.rotation.y = 0.3;
    animFn = (t, hover) => {
      group.rotation.y = 0.3 + Math.sin(t * 0.55) * 0.1 + (hover ? t * 0.3 : 0);
    };
  }

  else if (sceneType === 'wave') {
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);
    // Animated wave of spheres
    const spheres = [];
    const sg = new THREE.SphereGeometry(0.15, 16, 16);
    for (let x = -5; x <= 5; x++) {
      for (let z = -3; z <= 3; z++) {
        const mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.55 + x * 0.02, 0.7, 0.5),
          roughness: 0.3, metalness: 0.2
        });
        const s = new THREE.Mesh(sg, mat);
        s.position.set(x * 0.4, 0, z * 0.4);
        s.userData = { ox: x, oz: z };
        group.add(s);
        spheres.push(s);
      }
    }
    animFn = (t, hover) => {
      spheres.forEach(s => {
        const { ox, oz } = s.userData;
        s.position.y = Math.sin(t * (hover ? 2 : 0.8) + ox * 0.5 + oz * 0.3) * 0.3;
      });
      group.rotation.y = t * 0.1;
    };
  }

  else if (sceneType === 'diamond') {
    camera.position.set(0, 0, 4);
    camera.lookAt(0, 0, 0);
    const geo = new THREE.OctahedronGeometry(0.8, 0);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xcccccc, roughness: 0.1, metalness: 0.8,
      transparent: true, opacity: 0.7
    });
    const diamond = new THREE.Mesh(geo, mat);
    group.add(diamond);
    // Wireframe
    const wire = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x999999, wireframe: true }));
    group.add(wire);
    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 1 : 0.3);
      group.rotation.x = Math.sin(t * 0.5) * 0.2;
    };
  }

  else if (sceneType === 'nature') {
    camera.position.set(0, 1, 4);
    camera.lookAt(0, 0.3, 0);
    // Simple trees
    const trunk = new THREE.CylinderGeometry(0.05, 0.08, 0.6, 8);
    const leaves = new THREE.SphereGeometry(0.3, 8, 8);
    for (let i = 0; i < 8; i++) {
      const x = (Math.random() - 0.5) * 3;
      const z = (Math.random() - 0.5) * 2;
      const h = 0.3 + Math.random() * 0.3;
      const t = new THREE.Mesh(trunk, new THREE.MeshStandardMaterial({ color: 0x5d4037 }));
      t.position.set(x, h / 2, z);
      t.scale.y = h / 0.6;
      group.add(t);
      const l = new THREE.Mesh(leaves, new THREE.MeshStandardMaterial({ color: 0x2e7d32 }));
      l.position.set(x, h + 0.2, z);
      l.scale.set(0.8 + Math.random() * 0.4, 0.6 + Math.random() * 0.3, 0.8 + Math.random() * 0.4);
      group.add(l);
    }
    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(4, 3),
      new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.9 })
    );
    ground.rotation.x = -PI / 2;
    group.add(ground);
    animFn = (t, hover) => {
      group.rotation.y = Math.sin(t * 0.3) * 0.15 + (hover ? t * 0.2 : 0);
    };
  }

  else if (sceneType === 'abstract') {
    camera.position.set(0, 0, 4);
    camera.lookAt(0, 0, 0);
    const shapes = [];
    const colors = [0x22c55e, 0x3b82f6, 0xf59e0b, 0xef4444, 0x8b5cf6];
    for (let i = 0; i < 5; i++) {
      const geo = i % 2 === 0
        ? new THREE.TorusGeometry(0.3, 0.1, 16, 32)
        : new THREE.IcosahedronGeometry(0.25, 0);
      const mat = new THREE.MeshStandardMaterial({ color: colors[i], roughness: 0.3, metalness: 0.2 });
      const m = new THREE.Mesh(geo, mat);
      m.position.set((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 1.5, (Math.random() - 0.5));
      m.userData.speed = 0.5 + Math.random();
      m.userData.axis = new THREE.Vector3(Math.random(), Math.random(), Math.random()).normalize();
      group.add(m);
      shapes.push(m);
    }
    animFn = (t, hover) => {
      shapes.forEach(s => {
        s.rotation.x = t * s.userData.speed * (hover ? 2 : 0.5);
        s.rotation.z = t * s.userData.speed * 0.3;
      });
    };
  }

  else if (sceneType === 'glow') {
    camera.position.set(0, 0, 4);
    camera.lookAt(0, 0, 0);
    const geo = new THREE.TorusKnotGeometry(0.6, 0.2, 100, 16);
    const mat = new THREE.MeshStandardMaterial({ color: 0x8b5cf6, emissive: 0x4c1d95, roughness: 0.2, metalness: 0.5 });
    const knot = new THREE.Mesh(geo, mat);
    group.add(knot);
    const point = new THREE.PointLight(0xa78bfa, 1, 5);
    point.position.set(0, 0, 2);
    scene.add(point);
    animFn = (t, hover) => {
      knot.rotation.x = t * (hover ? 0.8 : 0.2);
      knot.rotation.y = t * (hover ? 1.2 : 0.3);
    };
  }

  else if (sceneType === '3d-map') {
    camera.position.set(0, 3, 3);
    camera.lookAt(0, 0, 0);
    // Ground plane
    const gnd = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 4),
      new THREE.MeshStandardMaterial({ color: 0xd4edda, roughness: 0.95 })
    );
    gnd.rotation.x = -PI / 2;
    group.add(gnd);
    // Roads
    const roadMat = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 0.8 });
    [[0, 0.01, 0, 6, 0.02, 0.15], [0, 0.01, 0.5, 0.15, 0.02, 4],
     [-1, 0.01, -0.5, 3, 0.02, 0.1], [1.2, 0.01, 0.8, 0.1, 0.02, 2]].forEach(([x,y,z,w,h,d]) => {
      const r = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), roadMat);
      r.position.set(x,y,z);
      group.add(r);
    });
    // Buildings
    const bldgMat = new THREE.MeshStandardMaterial({ color: 0xccddcc, roughness: 0.7 });
    for (let i = 0; i < 6; i++) {
      const bh = 0.1 + Math.random() * 0.25;
      const bw = 0.2 + Math.random() * 0.2;
      const bd = 0.2 + Math.random() * 0.15;
      const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bldgMat);
      b.position.set((Math.random()-0.5)*3, bh/2, (Math.random()-0.5)*2);
      group.add(b);
    }
    // Pin
    const pin = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xcc0000, emissiveIntensity: 0.3 })
    );
    pin.position.set(0, 0.4, 0);
    group.add(pin);
    const pinStick = new THREE.Mesh(
      new THREE.CylinderGeometry(0.015, 0.015, 0.35),
      new THREE.MeshStandardMaterial({ color: 0xef4444 })
    );
    pinStick.position.set(0, 0.2, 0);
    group.add(pinStick);
    animFn = (t, hover) => {
      pin.position.y = 0.4 + Math.sin(t * 2) * 0.05;
      group.rotation.y = Math.sin(t * 0.2) * 0.08 + (hover ? t * 0.15 : 0);
    };
  }

  return { renderer, scene, camera, group, animFn, el, hover: false };
}

// ── Init scenes with IntersectionObserver ──
const liveScenes = [];
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const s = liveScenes.find(s => s.el === e.target);
    if (s) s.visible = e.isIntersecting;
  });
}, { rootMargin: '100px' });

scenes.forEach(({ el, config }) => {
  const s = createScene(el, config);
  if (s) {
    s.visible = true;
    liveScenes.push(s);
    observer.observe(el);

    // Hover tracking
    el.closest('.card').addEventListener('mouseenter', () => s.hover = true);
    el.closest('.card').addEventListener('mouseleave', () => s.hover = false);
  }
});

// ── Animation loop ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  liveScenes.forEach(s => {
    if (!s.visible) return;
    if (s.animFn) s.animFn(t, s.hover);
    s.renderer.render(s.scene, s.camera);
  });
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  liveScenes.forEach(s => {
    const w = s.el.clientWidth, h = s.el.clientHeight;
    if (w === 0 || h === 0) return;
    s.camera.aspect = w / h;
    s.camera.updateProjectionMatrix();
    s.renderer.setSize(w, h);
  });
});

// ── Pills ──
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(q => q.classList.remove('on'));
    p.classList.add('on');
  });
});
</script>
</body>
