// Each card still holds its own mini scene and camera
function createMiniScene(el, config) {
  const w = el.clientWidth, h = el.clientHeight;
  if (w === 0 || h === 0) return null;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, w / h, 0.1, 100);

  // 4-light setup: ambient + key + fill + rim backlight
  scene.add(new THREE.AmbientLight(0x1a1030, 0.6));
  const dir = new THREE.DirectionalLight(0xfff5e6, 0.9);
  dir.position.set(5, 8, 6);
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0xe6eeff, 0.35);
  fill.position.set(-3, 4, -2);
  scene.add(fill);
  const rimBack = new THREE.DirectionalLight(0xffeedd, 0.45);
  rimBack.position.set(0, 3, -5);
  scene.add(rimBack);

  const group = new THREE.Group();
  scene.add(group);

  let animFn = null;
  let shaderMats = []; // track shader materials for uTime/uHover updates
  const sceneType = config.scene || config.type;

  // ── Block builder (for legacy scenes) ──
  function addBlock(x, y, z, color, s = 0.45) {
    const geo = new THREE.BoxGeometry(s, s, s);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.05 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x * s, z * s, y * s);
    mesh.castShadow = true;
    group.add(mesh);
    return mesh;
  }

  // ═══════ NEW: 3D Shape with shader material ═══════
  if (sceneType === '3d-shape') {
    camera.position.set(0, 0, 3.5);
    camera.lookAt(0, 0, 0);
    const geoFn = SHAPE_CREATORS[config.shape];
    if (!geoFn) return null;
    const geo = geoFn();
    const mat = createEditorMaterial(config.palette || 'nebula');
    shaderMats.push(mat);
    const mesh = new THREE.Mesh(geo, mat);
    group.add(mesh);

    // Particles surrounding the shape — color matched to palette rim
    const pal = PALETTES[config.palette] || PALETTES.nebula;
    const particleCount = 60;
    const pGeo = new THREE.BufferGeometry();
    const pPositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const r = 1.2 + Math.random() * 0.8;
      pPositions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      pPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      pPositions[i*3+2] = r * Math.cos(phi);
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    const rimCol = new THREE.Color(pal.rim1[0], pal.rim1[1], pal.rim1[2]);
    const pMat = new THREE.PointsMaterial({
      color: rimCol, size: 0.02, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const particles = new THREE.Points(pGeo, pMat);
    group.add(particles);

    // Smooth rotation state
    let rotY = 0, lastT = 0, curScale = 1.0;
    animFn = (t, hover) => {
      const dt = Math.min(t - lastT, 0.05); // clamp to avoid jumps
      lastT = t;
      const speed = hover ? 0.8 : 0.2;
      rotY += speed * dt;
      group.rotation.y = rotY;
      group.rotation.x = Math.sin(t * 0.3) * 0.15;
      // Smooth scale interpolation
      const targetScale = hover ? 1.08 : 1.0;
      curScale += (targetScale - curScale) * 0.08;
      mesh.scale.setScalar(curScale);
      particles.rotation.y = -t * 0.1;
    };
  }

  // ═══════ Robot card ═══════
  else if (sceneType === '3d-robot') {
    let camY = 0.2, camZ = 3.5;
    switch (config.robotStyle) {
      case 'drone': camY = 0.5; camZ = 3.2; break;
      case 'walle': camY = 0.15; camZ = 2.8; break;
    }
    camera.position.set(0, camY, camZ);
    camera.lookAt(0, 0, 0);

    const robot = createRobot(config.robotStyle, config.palette);
    group.add(robot.root);
    shaderMats.push(...robot.shaderMats);

    // Per-robot-style lighting for better material definition
    if (config.robotStyle === 'walle') {
      const warmLight = new THREE.PointLight(0xffcc88, 0.6, 5);
      warmLight.position.set(1, 1.5, 2);
      scene.add(warmLight);
      const fillLight = new THREE.PointLight(0x8888cc, 0.3, 5);
      fillLight.position.set(-1, 0.5, 1);
      scene.add(fillLight);
    } else if (config.robotStyle === 'cute') {
      // Warm soft light for cute porcelain look
      const cuteRim = new THREE.PointLight(0xffeedd, 0.4, 5);
      cuteRim.position.set(-1, 1.5, -1);
      scene.add(cuteRim);
    } else if (config.robotStyle === 'mech') {
      // Cool rim backlight for mech silhouette
      const mechRim = new THREE.PointLight(0x8899cc, 0.5, 6);
      mechRim.position.set(0, 2, -2);
      scene.add(mechRim);
      const mechTop = new THREE.PointLight(0xffffff, 0.3, 5);
      mechTop.position.set(0, 3, 1);
      scene.add(mechTop);
    } else if (config.robotStyle === 'retro') {
      // Warm overhead light for nostalgic feel
      const retroWarm = new THREE.PointLight(0xffddaa, 0.5, 5);
      retroWarm.position.set(0.5, 2, 1.5);
      scene.add(retroWarm);
    } else if (config.robotStyle === 'drone') {
      // Dramatic bottom-up light for sci-fi look
      const droneBottom = new THREE.PointLight(0x44ffaa, 0.3, 4);
      droneBottom.position.set(0, -1, 0);
      scene.add(droneBottom);
      const droneRim = new THREE.PointLight(0x8888ff, 0.4, 5);
      droneRim.position.set(0, 1, -2);
      scene.add(droneRim);
    }

    const robotAnim = createRobotAnimFn(robot, config.robotStyle);
    animFn = (t, hover) => robotAnim(t, hover);
  }

  else if (sceneType === 'wave') {
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);
    const spheres = [];
    const sg = new THREE.SphereGeometry(0.15, 16, 16);
    for (let x = -5; x <= 5; x++) {
      for (let z = -3; z <= 3; z++) {
        const mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.55 + x * 0.02, 0.7, 0.5),
          roughness: 0.3, metalness: 0.2
        });
        const s = new THREE.Mesh(sg, mat);
        s.position.set(x * 0.4, 0, z * 0.4);
        s.userData = { ox: x, oz: z };
        group.add(s);
        spheres.push(s);
      }
    }
    animFn = (t, hover) => {
      spheres.forEach(s => {
        const { ox, oz } = s.userData;
        s.position.y = Math.sin(t * (hover ? 2 : 0.8) + ox * 0.5 + oz * 0.3) * 0.3;
      });
      group.rotation.y = t * 0.1;
    };
  }

  else if (sceneType === 'diamond') {
    camera.position.set(0, 0, 4);
    camera.lookAt(0, 0, 0);
    const geo = new THREE.OctahedronGeometry(0.85, 2);

    // Premium diamond shader with refraction-like effect
    const diamondMat = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      transparent: true,
      uniforms: {
        uTime: { value: 0 },
        uHover: { value: 0 },
      },
      vertexShader: `
        varying vec3 vNormal, vViewPos, vWorldPos, vPos;
        void main(){
          vNormal = normalize(normalMatrix * normal);
          vPos = position;
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mv.xyz;
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uTime, uHover;
        varying vec3 vNormal, vViewPos, vWorldPos, vPos;

        vec3 cosPal(float t, vec3 a, vec3 b, vec3 c, vec3 d){
          return a + b * cos(6.283185 * (c * t + d));
        }

        void main(){
          vec3 N = normalize(vNormal);
          vec3 V = normalize(vViewPos);
          float fres = pow(1.0 - max(dot(V, N), 0.0), 3.0);

          // Rainbow refraction based on view angle and position
          float rainbowT = dot(N, V) * 0.5 + vPos.y * 0.3 + uTime * 0.08;
          vec3 rainbow = cosPal(rainbowT,
            vec3(0.5, 0.5, 0.5), vec3(0.5, 0.5, 0.5),
            vec3(1.0, 1.0, 1.0), vec3(0.0, 0.33, 0.67));

          // Base ice-blue diamond color
          vec3 base = mix(vec3(0.7, 0.75, 0.9), vec3(0.9, 0.92, 1.0), fres);

          // Specular highlights — two light sources
          vec3 L1 = normalize(vec3(0.5, 0.8, 0.6));
          vec3 L2 = normalize(vec3(-0.6, 0.3, 0.5));
          vec3 H1 = normalize(V + L1);
          vec3 H2 = normalize(V + L2);
          float spec1 = pow(max(dot(N, H1), 0.0), 120.0) * 1.2;
          float spec2 = pow(max(dot(N, H2), 0.0), 80.0) * 0.8;
          float specSoft = pow(max(dot(N, H1), 0.0), 12.0) * 0.15;

          // Facet sparkle — sharp highlights that flash as it rotates
          float facetFlash = pow(max(dot(N, normalize(vec3(
            sin(uTime * 1.3), cos(uTime * 0.9), sin(uTime * 0.7)
          ))), 0.0), 60.0) * 0.8;

          // Combine
          vec3 col = base;
          col = mix(col, rainbow, 0.3 + fres * 0.3);  // rainbow refraction
          col += vec3(1.0, 0.98, 0.95) * (spec1 + spec2 + specSoft + facetFlash);
          col += vec3(0.6, 0.7, 1.0) * fres * 0.5;     // rim glow

          // Hover boost
          col += rainbow * uHover * 0.2;

          float alpha = 0.65 + fres * 0.3 + (spec1 + facetFlash) * 0.3;
          gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
        }
      `
    });
    shaderMats.push(diamondMat);
    const diamond = new THREE.Mesh(geo, diamondMat);
    group.add(diamond);

    // Faint wireframe overlay for facet definition
    const wireMat = new THREE.ShaderMaterial({
      wireframe: true, transparent: true,
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        varying vec3 vPos;
        void main(){
          vPos = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        varying vec3 vPos;
        void main(){
          float pulse = 0.15 + 0.1 * sin(uTime * 1.5 + vPos.y * 4.0);
          gl_FragColor = vec4(0.6, 0.65, 0.85, pulse);
        }
      `
    });
    const wire = new THREE.Mesh(geo, wireMat);
    wire.scale.setScalar(1.002);
    group.add(wire);

    // Sparkle particles around diamond
    const spCount = 30;
    const spGeo = new THREE.BufferGeometry();
    const spPos = new Float32Array(spCount * 3);
    for (let i = 0; i < spCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const r = 1.0 + Math.random() * 0.5;
      spPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      spPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      spPos[i*3+2] = r * Math.cos(phi);
    }
    spGeo.setAttribute('position', new THREE.BufferAttribute(spPos, 3));
    const spMat = new THREE.PointsMaterial({
      color: 0xddeeff, size: 0.025, transparent: true, opacity: 0.5,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const sparkles = new THREE.Points(spGeo, spMat);
    group.add(sparkles);

    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 0.8 : 0.25);
      group.rotation.x = Math.sin(t * 0.5) * 0.15;
      wireMat.uniforms.uTime.value = t;
      sparkles.rotation.y = -t * 0.15;
      spMat.opacity = 0.3 + Math.sin(t * 3) * 0.15;
    };
  }

  else if (sceneType === 'nature') {
    // Enchanted mushroom garden on a floating mossy rock
    camera.position.set(0, 1.2, 3.8);
    camera.lookAt(0, 0.3, 0);

    // Floating rock base — organic shape
    const rockGeo = new THREE.DodecahedronGeometry(1.0, 2);
    const rockPos = rockGeo.attributes.position;
    for (let i = 0; i < rockPos.count; i++) {
      const y = rockPos.getY(i);
      rockPos.setY(i, y * 0.3);
      rockPos.setX(i, rockPos.getX(i) * (1.0 + (Math.random() - 0.5) * 0.12));
      rockPos.setZ(i, rockPos.getZ(i) * (1.0 + (Math.random() - 0.5) * 0.12));
    }
    rockGeo.computeVertexNormals();
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 0.92, metalness: 0.02 });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.y = -0.15;
    group.add(rock);

    // Moss carpet on top — soft green glow
    const mossGeo = new THREE.DodecahedronGeometry(1.02, 2);
    const mossPos = mossGeo.attributes.position;
    for (let i = 0; i < mossPos.count; i++) {
      const y = mossPos.getY(i);
      if (y < 0) { mossPos.setY(i, y * 0.2 - 0.12); }
      else { mossPos.setY(i, y * 0.08 + 0.06); }
      mossPos.setX(i, mossPos.getX(i) * (1.0 + (Math.random() - 0.5) * 0.08));
      mossPos.setZ(i, mossPos.getZ(i) * (1.0 + (Math.random() - 0.5) * 0.08));
    }
    mossGeo.computeVertexNormals();
    const mossMat = new THREE.MeshStandardMaterial({ color: 0x2a5a2a, roughness: 0.95, emissive: 0x0a2a0a, emissiveIntensity: 0.25 });
    const mossLayer = new THREE.Mesh(mossGeo, mossMat);
    mossLayer.position.y = 0.05;
    group.add(mossLayer);

    // Mushroom cap shader — dreamy, translucent color shifts
    const mushroomCapMat = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      uniforms: {
        uTime: { value: 0 },
        uHover: { value: 0 },
      },
      vertexShader: `
        varying vec3 vNormal, vViewPos, vPos;
        void main(){
          vNormal = normalize(normalMatrix * normal);
          vPos = position;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mv.xyz;
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader: `
        uniform float uTime, uHover;
        varying vec3 vNormal, vViewPos, vPos;
        ${PALETTE_GLSL}
        void main(){
          vec3 N = normalize(vNormal);
          vec3 V = normalize(vViewPos);
          float fres = pow(1.0 - max(dot(V, N), 0.0), 2.5);
          // Dreamy warm palette with time shift
          float t = vPos.y * 1.5 + vPos.x * 0.3 + uTime * 0.08;
          vec3 base = cosPalette(t,
            vec3(0.6, 0.35, 0.30),
            vec3(0.35, 0.25, 0.20),
            vec3(0.8, 0.5, 0.4),
            vec3(0.05, 0.15, 0.25));
          // Subsurface scattering glow
          vec3 L = normalize(vec3(0.3, 0.8, 0.4));
          float sss = pow(max(dot(-V, L), 0.0), 2.0) * 0.3;
          base += vec3(1.0, 0.5, 0.3) * sss;
          // Soft rim light
          base += vec3(1.0, 0.7, 0.9) * fres * 0.3;
          // Wrap lighting
          float d = dot(N, L) * 0.4 + 0.6;
          base *= d;
          // Specular
          vec3 H = normalize(V + L);
          float spec = pow(max(dot(N, H), 0.0), 24.0) * 0.2;
          base += vec3(1.0, 0.95, 0.85) * spec;
          // Hover brightens
          base += vec3(0.15, 0.1, 0.08) * uHover;
          base = max(base, vec3(0.08, 0.04, 0.06));
          gl_FragColor = vec4(base, 1.0);
        }`
    });
    shaderMats.push(mushroomCapMat);

    const stemMat = new THREE.MeshStandardMaterial({ color: 0xe8dcc8, roughness: 0.85, metalness: 0.0 });
    const spotMat = new THREE.MeshBasicMaterial({ color: 0xffeecc, transparent: true, opacity: 0.5 });

    // Mushroom builder
    const mushrooms = [];
    function addMushroom(x, z, capR, capH, stemR, stemH, tilt) {
      const mushGroup = new THREE.Group();
      mushGroup.position.set(x, 0.08, z);
      mushGroup.rotation.x = tilt * 0.15;
      mushGroup.rotation.z = (Math.random() - 0.5) * 0.12;

      // Stem
      const sGeo = new THREE.CylinderGeometry(stemR * 0.7, stemR, stemH, 12);
      const stem = new THREE.Mesh(sGeo, stemMat);
      stem.position.y = stemH / 2;
      mushGroup.add(stem);

      // Cap — half sphere
      const capGeo = new THREE.SphereGeometry(capR, 24, 12, 0, Math.PI * 2, 0, Math.PI * 0.55);
      const cap = new THREE.Mesh(capGeo, mushroomCapMat);
      cap.position.y = stemH + capH * 0.1;
      mushGroup.add(cap);

      // Spots on cap (small flat circles)
      for (let s = 0; s < 4; s++) {
        const angle = (s / 4) * Math.PI * 2 + Math.random() * 0.5;
        const phi = 0.15 + Math.random() * 0.3;
        const spotGeo = new THREE.CircleGeometry(capR * 0.12, 8);
        const spot = new THREE.Mesh(spotGeo, spotMat);
        spot.position.set(
          Math.sin(angle) * Math.sin(phi) * capR * 0.85,
          stemH + capH * 0.1 + Math.cos(phi) * capR * 0.85,
          Math.cos(angle) * Math.sin(phi) * capR * 0.85
        );
        spot.lookAt(x, stemH + capH * 0.5 + 2, z);
        mushGroup.add(spot);
      }

      group.add(mushGroup);
      mushrooms.push({ group: mushGroup, baseY: 0.08, cap });
    }

    // Hero mushroom (center, largest)
    addMushroom(0, 0.1, 0.32, 0.15, 0.06, 0.55, 0);
    // Secondary mushrooms
    addMushroom(0.35, 0.25, 0.22, 0.10, 0.045, 0.42, 0.3);
    addMushroom(-0.30, 0.18, 0.24, 0.12, 0.05, 0.48, -0.2);
    addMushroom(0.18, -0.28, 0.18, 0.08, 0.035, 0.35, 0.5);
    addMushroom(-0.22, -0.22, 0.15, 0.07, 0.03, 0.30, -0.4);
    // Tiny baby mushrooms
    addMushroom(0.45, -0.05, 0.10, 0.05, 0.022, 0.18, 0.6);
    addMushroom(-0.42, 0.02, 0.11, 0.05, 0.024, 0.20, -0.5);
    addMushroom(0.08, 0.38, 0.09, 0.04, 0.02, 0.15, 0.2);

    // Small ground ferns (simple cones as foliage tufts)
    const fernMat = new THREE.MeshStandardMaterial({ color: 0x3a7a3a, roughness: 0.9, emissive: 0x0a2a0a, emissiveIntensity: 0.15 });
    const fernData = [
      { x: 0.5, z: 0.3 }, { x: -0.5, z: 0.2 }, { x: 0.3, z: -0.4 },
      { x: -0.35, z: -0.35 }, { x: 0.55, z: -0.2 },
    ];
    fernData.forEach(fd => {
      const fGeo = new THREE.ConeGeometry(0.06, 0.12, 5);
      const fern = new THREE.Mesh(fGeo, fernMat);
      fern.position.set(fd.x, 0.12, fd.z);
      group.add(fern);
    });

    // Firefly / spore particles
    const sporeCount = 50;
    const sporeGeo = new THREE.BufferGeometry();
    const sporePos = new Float32Array(sporeCount * 3);
    for (let i = 0; i < sporeCount; i++) {
      sporePos[i*3]   = (Math.random() - 0.5) * 2.0;
      sporePos[i*3+1] = 0.15 + Math.random() * 1.2;
      sporePos[i*3+2] = (Math.random() - 0.5) * 2.0;
    }
    sporeGeo.setAttribute('position', new THREE.BufferAttribute(sporePos, 3));
    const sporeMat = new THREE.PointsMaterial({
      color: 0xffcc77, size: 0.025, transparent: true, opacity: 0.5,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const spores = new THREE.Points(sporeGeo, sporeMat);
    group.add(spores);

    // Warm underglow
    const underglow = new THREE.PointLight(0xaa6633, 0.4, 3);
    underglow.position.set(0, -0.2, 0);
    scene.add(underglow);
    // Top moonlight
    const moonlight = new THREE.PointLight(0x8899cc, 0.3, 4);
    moonlight.position.set(0.5, 2.0, 0.5);
    scene.add(moonlight);

    animFn = (t, hover) => {
      // Gentle floating
      group.position.y = Math.sin(t * 0.5) * 0.06;
      group.rotation.y = t * (hover ? 0.2 : 0.06);
      // Mushrooms gently breathe
      mushrooms.forEach((m, i) => {
        const phase = t * 0.8 + i * 1.2;
        m.group.position.y = m.baseY + Math.sin(phase) * 0.01;
        m.cap.scale.x = 1.0 + Math.sin(phase) * 0.03;
        m.cap.scale.z = 1.0 + Math.sin(phase) * 0.03;
      });
      // Spores drift upward and reset
      const positions = sporeGeo.attributes.position.array;
      for (let i = 0; i < sporeCount; i++) {
        positions[i*3+1] += 0.0015 + Math.sin(t * 0.6 + i) * 0.0008;
        positions[i*3]   += Math.cos(t * 0.3 + i * 0.7) * 0.0006;
        if (positions[i*3+1] > 1.5) {
          positions[i*3+1] = 0.1;
          positions[i*3] = (Math.random() - 0.5) * 2.0;
          positions[i*3+2] = (Math.random() - 0.5) * 2.0;
        }
      }
      sporeGeo.attributes.position.needsUpdate = true;
      sporeMat.opacity = 0.35 + Math.sin(t * 1.5) * 0.15;
      // Underglow pulses warmly
      underglow.intensity = 0.35 + Math.sin(t * 1.0) * 0.1;
    };
  }

  else if (sceneType === 'abstract') {
    camera.position.set(0, 0, 4.5);
    camera.lookAt(0, 0, 0);

    // Abstract shader shapes with unique per-shape color offsets
    const abstractPalettes = ['nebula', 'coral', 'hologram', 'sunset', 'aurora'];
    const abstractGeos = [
      new THREE.TorusGeometry(0.28, 0.1, 32, 64),
      new THREE.IcosahedronGeometry(0.25, 1),
      new THREE.OctahedronGeometry(0.22, 0),
      new THREE.TorusKnotGeometry(0.2, 0.07, 64, 16, 2, 3),
      new THREE.DodecahedronGeometry(0.2, 0),
    ];
    const shapes = [];
    const positions = [
      { x: 0, y: 0, z: 0 },
      { x: -0.9, y: 0.6, z: -0.3 },
      { x: 0.85, y: -0.5, z: -0.2 },
      { x: -0.7, y: -0.55, z: 0.1 },
      { x: 0.8, y: 0.55, z: -0.1 },
    ];
    abstractGeos.forEach((geo, i) => {
      const mat = createEditorMaterial(abstractPalettes[i]);
      shaderMats.push(mat);
      const m = new THREE.Mesh(geo, mat);
      m.position.set(positions[i].x, positions[i].y, positions[i].z);
      m.userData.speed = 0.4 + i * 0.15;
      m.userData.orbitR = i === 0 ? 0 : 0.6 + i * 0.15;
      m.userData.orbitSpeed = 0.15 + i * 0.05;
      m.userData.baseAngle = (i / 5) * Math.PI * 2;
      group.add(m);
      shapes.push(m);
    });

    animFn = (t, hover) => {
      const speedMul = hover ? 2.0 : 1.0;
      shapes.forEach((s, i) => {
        s.rotation.x = t * s.userData.speed * speedMul;
        s.rotation.y = t * s.userData.speed * 0.6 * speedMul;
        // Orbiting motion for non-center pieces
        if (i > 0) {
          const angle = s.userData.baseAngle + t * s.userData.orbitSpeed * speedMul;
          const r = s.userData.orbitR;
          s.position.x = Math.cos(angle) * r;
          s.position.y = Math.sin(angle) * r * 0.7;
          s.position.z = Math.sin(angle * 0.5) * 0.2;
        }
      });
      group.rotation.y = t * 0.05;
    };
  }

  // ═══════ Floating Architecture — geometric monument ═══════
  else if (sceneType === 'architecture') {
    camera.position.set(0, 1, 5);
    camera.lookAt(0, 0.5, 0);

    // Monumental base platform — warm stone
    const baseMat = createRobotMaterial(0xD0CCC4, { rimHex: 0xE0DCD4, rimStr: 0.25, specInt: 0.15, matte: 0.5 });
    shaderMats.push(baseMat);
    const baseGeo = new RoundedBoxGeometry(2.0, 0.15, 2.0, 2, 0.03);
    const basePlat = new THREE.Mesh(baseGeo, baseMat);
    basePlat.position.y = -0.3;
    group.add(basePlat);

    // Central tower — stacked tapered boxes, rounded marble-like
    const towerMat = createRobotMaterial(0xE8E4E0, { rimHex: 0xC8C0E8, rimStr: 0.35, specInt: 0.25, matte: 0.3 });
    shaderMats.push(towerMat);
    const towerPieces = [];
    const towerLevels = [
      { w: 0.6, h: 0.5, d: 0.6, y: 0.0 },
      { w: 0.5, h: 0.6, d: 0.5, y: 0.55 },
      { w: 0.38, h: 0.5, d: 0.38, y: 1.1 },
      { w: 0.25, h: 0.4, d: 0.25, y: 1.55 },
    ];
    towerLevels.forEach(lv => {
      const geo = new RoundedBoxGeometry(lv.w, lv.h, lv.d, 2, 0.04);
      const m = new THREE.Mesh(geo, towerMat);
      m.position.y = lv.y;
      group.add(m);
      towerPieces.push(m);
    });

    // Floating side pylons — cool blue-gray columns
    const pylonMat = createRobotMaterial(0x7090A0, { rimHex: 0xA0C0D0, rimStr: 0.40, specInt: 0.25 });
    shaderMats.push(pylonMat);
    const pylons = [];
    const pylonData = [
      { x: -0.8, z: 0, h: 0.9, ry: 0.2, rz: 0.15 },
      { x: 0.8, z: 0, h: 0.85, ry: -0.2, rz: -0.15 },
      { x: 0, z: -0.8, h: 0.7, ry: 0.4, rz: 0 },
      { x: 0, z: 0.8, h: 0.75, ry: -0.3, rz: 0 },
    ];
    pylonData.forEach(pd => {
      const geo = new THREE.CylinderGeometry(0.06, 0.1, pd.h, 6);
      const m = new THREE.Mesh(geo, pylonMat);
      m.position.set(pd.x, pd.h * 0.4, pd.z);
      m.rotation.set(0, pd.ry, pd.rz);
      group.add(m);
      pylons.push(m);
    });

    // Floating orb at the top
    const orbMat = createEditorMaterial('hologram');
    shaderMats.push(orbMat);
    const orbGeo = new THREE.IcosahedronGeometry(0.15, 2);
    const orb = new THREE.Mesh(orbGeo, orbMat);
    orb.position.y = 2.0;
    group.add(orb);

    // Ring around the monument
    const ringMat = createEditorMaterial('nebula');
    shaderMats.push(ringMat);
    const ringGeo = new THREE.TorusGeometry(1.0, 0.025, 16, 64);
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = 0.8;
    ring.rotation.x = PI / 2;
    group.add(ring);

    // Dust particles
    const dustCount = 50;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      dustPos[i*3]   = (Math.random() - 0.5) * 3;
      dustPos[i*3+1] = Math.random() * 2.5;
      dustPos[i*3+2] = (Math.random() - 0.5) * 3;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({
      color: 0x8899bb, size: 0.02, transparent: true, opacity: 0.35,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    group.add(new THREE.Points(dustGeo, dustMat));

    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 0.2 : 0.06);
      // Floating orb bobs
      orb.position.y = 2.0 + Math.sin(t * 1.2) * 0.1;
      orb.rotation.y = t * 1.5;
      // Ring rotates slowly
      ring.rotation.z = t * 0.3;
      // Pylons gently float
      pylons.forEach((p, i) => {
        p.position.y = pylonData[i].h * 0.4 + Math.sin(t * 0.8 + i * 1.5) * 0.05;
      });
    };
  }

  // ═══════ Crystal Cluster — elongated octahedrons with aurora palette ═══════
  else if (sceneType === 'crystal') {
    camera.position.set(0, 0.5, 4);
    camera.lookAt(0, 0.2, 0);

    // Crystal cluster: multiple elongated octahedrons
    const clusterMat = createEditorMaterial('aurora');
    shaderMats.push(clusterMat);
    const crystalShards = [];
    const shardData = [
      // x, z, height-scale, radius, tilt-x, tilt-z, y-offset
      { x: 0, z: 0, sy: 2.5, s: 0.18, rx: 0, rz: 0, yo: 0 },
      { x: 0.3, z: 0.15, sy: 1.8, s: 0.13, rx: 0.2, rz: -0.15, yo: -0.1 },
      { x: -0.25, z: 0.2, sy: 2.0, s: 0.14, rx: -0.15, rz: 0.2, yo: -0.05 },
      { x: 0.15, z: -0.25, sy: 1.5, s: 0.11, rx: 0.1, rz: 0.25, yo: -0.15 },
      { x: -0.35, z: -0.1, sy: 1.7, s: 0.12, rx: -0.25, rz: -0.1, yo: -0.1 },
      { x: 0.4, z: -0.05, sy: 1.3, s: 0.10, rx: 0.3, rz: 0.1, yo: -0.2 },
      { x: -0.1, z: -0.35, sy: 1.4, s: 0.10, rx: 0.05, rz: -0.3, yo: -0.18 },
      { x: 0.2, z: 0.35, sy: 1.1, s: 0.09, rx: -0.2, rz: 0.15, yo: -0.22 },
      { x: -0.4, z: 0.3, sy: 1.0, s: 0.08, rx: 0.15, rz: -0.2, yo: -0.25 },
    ];
    shardData.forEach(sd => {
      const geo = new THREE.OctahedronGeometry(sd.s, 0);
      // Elongate vertically
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.setY(i, pos.getY(i) * sd.sy);
      }
      geo.computeVertexNormals();
      const shard = new THREE.Mesh(geo, clusterMat);
      shard.position.set(sd.x, sd.yo + sd.s * sd.sy * 0.5, sd.z);
      shard.rotation.set(sd.rx, 0, sd.rz);
      group.add(shard);
      crystalShards.push(shard);
    });

    // Base rock
    const rockGeo = new THREE.DodecahedronGeometry(0.6, 1);
    const rockPos = rockGeo.attributes.position;
    for (let i = 0; i < rockPos.count; i++) {
      rockPos.setY(i, rockPos.getY(i) * 0.3);
      rockPos.setX(i, rockPos.getX(i) + (Math.random() - 0.5) * 0.05);
      rockPos.setZ(i, rockPos.getZ(i) + (Math.random() - 0.5) * 0.05);
    }
    rockGeo.computeVertexNormals();
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x1a2030, roughness: 0.9, metalness: 0.05 });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.y = -0.35;
    group.add(rock);

    // Aurora-colored ambient particles
    const apCount = 60;
    const apGeo = new THREE.BufferGeometry();
    const apPos = new Float32Array(apCount * 3);
    for (let i = 0; i < apCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const r = 0.6 + Math.random() * 1.2;
      apPos[i*3]   = Math.cos(theta) * r;
      apPos[i*3+1] = -0.2 + Math.random() * 2.0;
      apPos[i*3+2] = Math.sin(theta) * r;
    }
    apGeo.setAttribute('position', new THREE.BufferAttribute(apPos, 3));
    const apMat = new THREE.PointsMaterial({
      color: 0x55ffbb, size: 0.025, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const auroraParticles = new THREE.Points(apGeo, apMat);
    group.add(auroraParticles);

    // Point light for inner glow
    const innerGlow = new THREE.PointLight(0x44ddaa, 0.6, 3);
    innerGlow.position.set(0, 0.5, 0);
    scene.add(innerGlow);

    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 0.3 : 0.1);
      // Crystals gently pulse
      crystalShards.forEach((sh, i) => {
        const phase = t * 1.0 + i * 0.8;
        sh.scale.y = 1.0 + Math.sin(phase) * 0.04;
        sh.scale.x = 1.0 + Math.sin(phase + 1) * 0.02;
        sh.scale.z = 1.0 + Math.sin(phase + 2) * 0.02;
      });
      // Particles drift upward
      const positions = apGeo.attributes.position.array;
      for (let i = 0; i < apCount; i++) {
        positions[i*3+1] += 0.002;
        if (positions[i*3+1] > 2.0) positions[i*3+1] = -0.2;
      }
      apGeo.attributes.position.needsUpdate = true;
      // Inner glow pulses
      innerGlow.intensity = 0.5 + Math.sin(t * 1.5) * 0.2;
      apMat.opacity = 0.3 + Math.sin(t * 2) * 0.15;
      auroraParticles.rotation.y = -t * 0.08;
    };
  }

  else if (sceneType === 'glow') {
    camera.position.set(0, 0, 4);
    camera.lookAt(0, 0, 0);
    const geo = new THREE.TorusKnotGeometry(0.6, 0.2, 100, 16);
    const mat = createEditorMaterial('nebula');
    shaderMats.push(mat);
    const knot = new THREE.Mesh(geo, mat);
    group.add(knot);
    const point = new THREE.PointLight(0xa78bfa, 1, 5);
    point.position.set(0, 0, 2);
    scene.add(point);
    animFn = (t, hover) => {
      knot.rotation.x = t * (hover ? 0.8 : 0.2);
      knot.rotation.y = t * (hover ? 1.2 : 0.3);
    };
  }

  // ═══════ Sunset Stack — Stacked Glowing Planes ═══════
  else if (sceneType === 'sunset-stack') {
    camera.position.set(0, 0.3, 3.5);
    camera.lookAt(0, 0, 0);

    // Override lighting for warm scene
    scene.children.length = 0; // clear default lights
    scene.add(group);
    scene.add(new THREE.AmbientLight(0x331100, 0.3));
    const warmDir = new THREE.DirectionalLight(0xff8844, 0.6);
    warmDir.position.set(2, 4, 3);
    scene.add(warmDir);

    const planeCount = 6;
    const planes = [];
    const planeMats = [];

    for (let i = 0; i < planeCount; i++) {
      const geo = new THREE.PlaneGeometry(1.6, 1.0, 1, 1);
      // Skew to parallelogram
      const pos = geo.attributes.position;
      for (let v = 0; v < pos.count; v++) {
        const y = pos.getY(v);
        pos.setX(v, pos.getX(v) + y * 0.4);
      }
      geo.computeVertexNormals();

      const phase = i / planeCount;
      const mat = new THREE.ShaderMaterial({
        side: THREE.DoubleSide,
        transparent: true,
        depthWrite: false,
        uniforms: {
          uTime: { value: 0 },
          uHover: { value: 0 },
          uPhase: { value: phase },
        },
        vertexShader: `
          varying vec2 vUv;
          varying vec3 vNormal, vViewPos;
          void main(){
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            vViewPos = -mv.xyz;
            gl_Position = projectionMatrix * mv;
          }
        `,
        fragmentShader: `
          uniform float uTime, uHover, uPhase;
          varying vec2 vUv;
          varying vec3 vNormal, vViewPos;
          void main(){
            vec3 V = normalize(vViewPos);
            vec3 N = normalize(vNormal);
            float fresnel = pow(1.0 - abs(dot(V, N)), 2.0);

            // Warm gradient from center to edge
            float dist = length(vUv - 0.5) * 2.0;
            vec3 centerColor = vec3(1.0, 0.55, 0.1); // bright orange
            vec3 edgeColor = vec3(0.7, 0.1, 0.05);   // deep red
            vec3 base = mix(centerColor, edgeColor, dist);

            // Time-based color shift
            base += vec3(0.1, 0.05, 0.0) * sin(uTime * 0.5 + uPhase * 6.28);

            // Bright edge glow (Fresnel)
            vec3 glowColor = vec3(1.0, 0.75, 0.3); // orange-white
            base += glowColor * fresnel * 1.8;

            // Feathered transparency at edges
            float alpha = smoothstep(1.0, 0.3, dist) * (0.7 + fresnel * 0.3);
            alpha *= 0.75 + 0.25 * sin(uTime * 0.3 + uPhase * 3.14);

            // Hover boost
            base += vec3(0.15, 0.08, 0.02) * uHover;

            gl_FragColor = vec4(base, alpha);
          }
        `
      });
      planeMats.push(mat);
      shaderMats.push(mat);

      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        (i - planeCount / 2 + 0.5) * 0.15,
        (i - planeCount / 2 + 0.5) * 0.08,
        -i * 0.3
      );
      mesh.rotation.y = 0.15 + i * 0.03;
      mesh.rotation.x = -0.1;
      group.add(mesh);
      planes.push(mesh);
    }

    animFn = (t, hover) => {
      group.rotation.y = t * 0.08;
      planes.forEach((p, i) => {
        const phase = t * 0.6 + i * 0.8;
        p.position.y = (i - planeCount / 2 + 0.5) * 0.08 + Math.sin(phase) * 0.06;
        p.rotation.z = Math.sin(phase * 0.7) * 0.03;
      });
    };
  }

  // ═══════ Glass Text — Chrome/Glass Spheres ═══════
  else if (sceneType === 'glass-text') {
    camera.position.set(0, 0, 3.5);
    camera.lookAt(0, 0, 0);

    // Text-like stripe planes behind
    const stripeMat = new THREE.MeshBasicMaterial({ color: 0xccccdd, transparent: true, opacity: 0.3 });
    const stripeWidths = [1.8, 1.4, 1.6, 1.2, 1.5, 0.9];
    stripeWidths.forEach((w, i) => {
      const geo = new THREE.PlaneGeometry(w, 0.06);
      const stripe = new THREE.Mesh(geo, stripeMat);
      stripe.position.set((Math.random() - 0.5) * 0.2, 0.6 - i * 0.22, -0.5);
      group.add(stripe);
    });

    // Glass sphere shader
    function makeGlassMat() {
      const mat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uHover: { value: 0 },
        },
        vertexShader: `
          varying vec3 vNormal, vViewPos, vPos, vWorldNormal;
          void main(){
            vNormal = normalize(normalMatrix * normal);
            vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
            vPos = position;
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            vViewPos = -mv.xyz;
            gl_Position = projectionMatrix * mv;
          }
        `,
        fragmentShader: `
          uniform float uTime, uHover;
          varying vec3 vNormal, vViewPos, vPos, vWorldNormal;
          void main(){
            vec3 V = normalize(vViewPos);
            vec3 N = normalize(vNormal);
            float fresnel = pow(1.0 - max(dot(V, N), 0.0), 3.0);

            // Fake environment reflection
            vec3 refl = reflect(-V, N);
            float ey = refl.y * 0.5 + 0.5;
            vec3 envColor = mix(vec3(0.02, 0.02, 0.06), vec3(0.12, 0.10, 0.18), ey);
            envColor += vec3(0.3, 0.25, 0.5) * pow(max(dot(refl, normalize(vec3(0.5, 0.8, 0.3))), 0.0), 12.0);
            envColor += vec3(0.1, 0.2, 0.5) * pow(max(dot(refl, normalize(vec3(-0.6, 0.2, 0.7))), 0.0), 8.0);

            // Dark base with strong reflection
            vec3 base = vec3(0.03, 0.03, 0.05);
            base = mix(base, envColor, 0.6 + fresnel * 0.4);

            // Purple/blue tint in reflections
            base += vec3(0.08, 0.04, 0.15) * fresnel;

            // High specular
            vec3 L = normalize(vec3(0.5, 0.8, 0.6));
            vec3 H = normalize(V + L);
            float spec = pow(max(dot(N, H), 0.0), 200.0) * 1.5;
            base += vec3(1.0, 0.98, 0.95) * spec;

            // Secondary spec
            vec3 L2 = normalize(vec3(-0.4, 0.3, 0.8));
            vec3 H2 = normalize(V + L2);
            float spec2 = pow(max(dot(N, H2), 0.0), 100.0) * 0.8;
            base += vec3(0.8, 0.85, 1.0) * spec2;

            base += vec3(0.1, 0.08, 0.15) * uHover;
            gl_FragColor = vec4(base, 1.0);
          }
        `
      });
      shaderMats.push(mat);
      return mat;
    }

    // Large sphere
    const bigSphereGeo = new THREE.SphereGeometry(0.6, 48, 48);
    const bigSphere = new THREE.Mesh(bigSphereGeo, makeGlassMat());
    bigSphere.position.set(-0.2, -0.1, 0.3);
    group.add(bigSphere);

    // Small sphere
    const smallSphereGeo = new THREE.SphereGeometry(0.2, 32, 32);
    const smallSphere = new THREE.Mesh(smallSphereGeo, makeGlassMat());
    smallSphere.position.set(0.5, 0.35, 0.5);
    group.add(smallSphere);

    let orbitAngle = 0;
    animFn = (t, hover) => {
      orbitAngle = t * 0.3;
      bigSphere.position.x = -0.2 + Math.sin(orbitAngle) * 0.15;
      bigSphere.position.y = -0.1 + Math.cos(orbitAngle * 0.7) * 0.08;
      smallSphere.position.x = 0.5 + Math.cos(orbitAngle * 1.3) * 0.2;
      smallSphere.position.y = 0.35 + Math.sin(orbitAngle * 1.1) * 0.12;
      bigSphere.rotation.y = t * 0.2;
      smallSphere.rotation.y = -t * 0.3;
      group.rotation.y = Math.sin(t * 0.15) * 0.1;
    };
  }

  // ═══════ Holographic Logo — Edge-Lit Shape ═══════
  else if (sceneType === 'holo-logo') {
    camera.position.set(0, 0, 3.5);
    camera.lookAt(0, 0, 0);

    // Pure black background - override lights
    scene.children.length = 0;
    scene.add(group);
    scene.add(new THREE.AmbientLight(0x000000, 0.0));

    const holoMat = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      uniforms: {
        uTime: { value: 0 },
        uHover: { value: 0 },
      },
      vertexShader: `
        varying vec3 vNormal, vViewPos, vPos;
        void main(){
          vNormal = normalize(normalMatrix * normal);
          vPos = position;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mv.xyz;
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uTime, uHover;
        varying vec3 vNormal, vViewPos, vPos;

        vec3 hsvToRgb(float h, float s, float v){
          vec3 c = vec3(h, s, v);
          vec3 p = abs(fract(c.xxx + vec3(1.0, 2.0/3.0, 1.0/3.0)) * 6.0 - 3.0);
          return c.z * mix(vec3(1.0), clamp(p - 1.0, 0.0, 1.0), c.y);
        }

        void main(){
          vec3 V = normalize(vViewPos);
          vec3 N = normalize(vNormal);

          vec3 base = vec3(0.02);
          float fresnel = pow(1.0 - abs(dot(V, N)), 2.5);

          // Cycling hue for rim
          float hue = fract(uTime * 0.1 + vPos.y * 0.3);
          vec3 rimColor = hsvToRgb(hue, 0.8, 2.5); // HDR bright

          base += rimColor * fresnel;

          // Additional inner glow at steep angles
          float innerGlow = pow(1.0 - abs(dot(V, N)), 4.0);
          vec3 innerColor = hsvToRgb(fract(hue + 0.33), 0.6, 1.5);
          base += innerColor * innerGlow * 0.3;

          // Hover intensifies
          base += rimColor * fresnel * uHover * 0.5;

          gl_FragColor = vec4(base, 1.0);
        }
      `
    });
    shaderMats.push(holoMat);

    const knotGeo = new THREE.TorusKnotGeometry(0.7, 0.22, 128, 32, 2, 3);
    const knot = new THREE.Mesh(knotGeo, holoMat);
    group.add(knot);

    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 0.3 : 0.12);
      group.rotation.x = Math.sin(t * 0.2) * 0.1;
    };
  }

  // ═══════ Nexbot — Premium Dark Robot ═══════
  else if (sceneType === 'nexbot') {
    camera.position.set(0, 0.3, 3.0);
    camera.lookAt(0, 0.1, 0);

    // Override lights for light background
    scene.children.length = 0;
    scene.add(group);
    scene.add(new THREE.AmbientLight(0xcccccc, 0.7));
    const mainLight = new THREE.DirectionalLight(0xffffff, 0.9);
    mainLight.position.set(3, 5, 4);
    scene.add(mainLight);
    const fillLight = new THREE.DirectionalLight(0x8888aa, 0.4);
    fillLight.position.set(-2, 3, -1);
    scene.add(fillLight);
    // Strong rim backlight for silhouette edge definition
    const rimLight = new THREE.PointLight(0xeeeeff, 1.2, 6);
    rimLight.position.set(0, 2, -2.5);
    scene.add(rimLight);
    // Additional top rim for head highlight
    const topRim = new THREE.PointLight(0xffffff, 0.6, 4);
    topRim.position.set(0, 3, 0);
    scene.add(topRim);

    const bodyGroup = new THREE.Group();

    // Chrome head ShaderMaterial — fake env reflection with purple-blue tint
    const chromeMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        varying vec3 vNormal, vViewPos, vPos;
        void main(){
          vNormal = normalize(normalMatrix * normal);
          vPos = position;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mv.xyz;
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        varying vec3 vNormal, vViewPos, vPos;
        void main(){
          vec3 N = normalize(vNormal);
          vec3 V = normalize(vViewPos);
          vec3 R = reflect(-V, N);
          // Fake environment — gradient reflections
          float ey = R.y * 0.5 + 0.5;
          vec3 env = mix(vec3(0.05, 0.05, 0.1), vec3(0.4, 0.45, 0.5), ey);
          // Hot spots for realism
          env += vec3(0.8, 0.85, 0.9) * pow(max(dot(R, normalize(vec3(0.5, 0.6, 0.4))), 0.0), 16.0);
          env += vec3(0.3, 0.4, 0.8) * pow(max(dot(R, normalize(vec3(-0.6, 0.3, 0.5))), 0.0), 8.0);
          // Strong Fresnel
          float fresnel = pow(1.0 - max(dot(V, N), 0.0), 2.0);
          vec3 base = mix(vec3(0.03), env, 0.85 + fresnel * 0.15);
          // Sharp specular
          vec3 L = normalize(vec3(0.5, 0.8, 0.6));
          vec3 H = normalize(V + L);
          float spec = pow(max(dot(N, H), 0.0), 128.0);
          base += vec3(1.0, 0.98, 0.95) * spec * 0.6;
          gl_FragColor = vec4(base, 1.0);
        }
      `
    });
    shaderMats.push(chromeMat);

    // Dark carbon-fiber body ShaderMaterial
    const darkBodyMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        varying vec3 vNormal, vViewPos, vPos;
        void main(){
          vNormal = normalize(normalMatrix * normal);
          vPos = position;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mv.xyz;
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        varying vec3 vNormal, vViewPos, vPos;
        void main(){
          vec3 N = normalize(vNormal);
          vec3 V = normalize(vViewPos);
          // Very dark base with subtle color
          vec3 base = vec3(0.06, 0.06, 0.08);
          // Subtle carbon-fiber cross-hatch
          float grid = step(0.48, fract(vPos.x * 20.0)) + step(0.48, fract(vPos.y * 20.0));
          base += grid * 0.015;
          // Fresnel rim — cool blue-white edge highlight
          float fresnel = pow(1.0 - max(dot(V, N), 0.0), 3.0);
          base += vec3(0.3, 0.4, 0.6) * fresnel * 0.5;
          // Subtle specular
          vec3 L = normalize(vec3(0.5, 0.8, 0.6));
          vec3 H = normalize(V + L);
          float spec = pow(max(dot(N, H), 0.0), 64.0);
          base += vec3(0.5, 0.6, 0.8) * spec * 0.3;
          // Diffuse wrap
          float diff = dot(N, L) * 0.3 + 0.7;
          base *= diff;
          gl_FragColor = vec4(base, 1.0);
        }
      `
    });
    shaderMats.push(darkBodyMat);

    // Head — chrome sphere with custom ShaderMaterial
    const headGeo = new THREE.SphereGeometry(0.25, 48, 48);
    const head = new THREE.Mesh(headGeo, chromeMat);
    head.position.y = 0.75;
    bodyGroup.add(head);

    // Visor / face area — dark with subtle blue
    const visorMat = new THREE.MeshBasicMaterial({ color: 0x0a0a14 });
    const visorGeo = new THREE.BoxGeometry(0.24, 0.09, 0.06);
    const visor = new THREE.Mesh(visorGeo, visorMat);
    visor.position.set(0, 0.73, 0.22);
    bodyGroup.add(visor);

    // Subtle glow plane behind LED eyes
    const glowPlaneMat = new THREE.MeshBasicMaterial({ color: 0x88ffcc, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
    const glowPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.18, 0.06), glowPlaneMat);
    glowPlane.position.set(0, 0.74, 0.248);
    bodyGroup.add(glowPlane);

    // LED dot-matrix eyes — bigger, brighter (0x88ffcc)
    const ledMat = new THREE.MeshBasicMaterial({ color: 0x88ffcc });
    const ledDotGeo = new THREE.SphereGeometry(0.012, 8, 8);
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 4; col++) {
        if ((row === 0 && (col === 0 || col === 3)) ||
            (row === 1 && (col === 1 || col === 2)) ||
            (row === 2 && (col === 0 || col === 3))) {
          const dot = new THREE.Mesh(ledDotGeo, ledMat);
          dot.position.set(
            -0.035 + col * 0.023,
            0.74 + (1 - row) * 0.023,
            0.255
          );
          bodyGroup.add(dot);
        }
      }
    }

    // Neck — dark body shader
    const neckGeo = new THREE.CylinderGeometry(0.04, 0.05, 0.12, 16);
    const neck = new THREE.Mesh(neckGeo, darkBodyMat);
    neck.position.y = 0.45;
    bodyGroup.add(neck);

    // Shoulders — wider and more angular for heroic silhouette, using dark body shader
    const leftShoulder = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.09, 0.17), darkBodyMat);
    leftShoulder.position.set(-0.28, 0.35, 0);
    leftShoulder.rotation.z = 0.12;
    bodyGroup.add(leftShoulder);
    const rightShoulder = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.09, 0.17), darkBodyMat);
    rightShoulder.position.set(0.28, 0.35, 0);
    rightShoulder.rotation.z = -0.12;
    bodyGroup.add(rightShoulder);

    // Shoulder accent strips — subtle chrome edges
    const shoulderAccentL = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.015, 0.15), chromeMat);
    shoulderAccentL.position.set(-0.28, 0.39, 0);
    shoulderAccentL.rotation.z = 0.12;
    bodyGroup.add(shoulderAccentL);
    const shoulderAccentR = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.015, 0.15), chromeMat);
    shoulderAccentR.position.set(0.28, 0.39, 0);
    shoulderAccentR.rotation.z = -0.12;
    bodyGroup.add(shoulderAccentR);

    // Upper body / torso — dark carbon-fiber body
    const torsoGeo = new THREE.CapsuleGeometry(0.18, 0.3, 16, 32);
    const torso = new THREE.Mesh(torsoGeo, darkBodyMat);
    torso.position.y = 0.1;
    bodyGroup.add(torso);

    // Chest accent line
    const chestLine = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.008, 0.02), ledMat);
    chestLine.position.set(0, 0.22, 0.18);
    bodyGroup.add(chestLine);

    group.add(bodyGroup);

    let headRotY = 0;
    animFn = (t, hover) => {
      // Slow head turn
      const targetRot = Math.sin(t * 0.4) * 0.3;
      headRotY += (targetRot - headRotY) * 0.05;
      head.rotation.y = headRotY;
      visor.rotation.y = headRotY;
      // Subtle body sway
      bodyGroup.rotation.z = Math.sin(t * 0.3) * 0.02;
      bodyGroup.position.y = Math.sin(t * 0.5) * 0.015;
      group.rotation.y = t * (hover ? 0.15 : 0.05);
    };
  }

  // ═══════ Clay Heads — Claymation Character Group ═══════
  else if (sceneType === 'clay-heads') {
    camera.position.set(0, 0.3, 3.8);
    camera.lookAt(0, 0, 0);

    // Warm fill lighting
    scene.children.length = 0;
    scene.add(group);
    scene.add(new THREE.AmbientLight(0x2a1040, 0.6));
    const warmLight = new THREE.DirectionalLight(0xffddbb, 0.8);
    warmLight.position.set(3, 5, 4);
    scene.add(warmLight);
    const fillLight2 = new THREE.DirectionalLight(0x8866cc, 0.3);
    fillLight2.position.set(-2, 3, -2);
    scene.add(fillLight2);

    const headColors = [0xffb5a7, 0xfcd5ce, 0x8b6b52, 0x89b4fa, 0x81c784, 0xce93d8, 0xffb74d];
    const headPositions = [
      // Row 1 (back)
      { x: -0.45, y: 0.35, z: -0.3 },
      { x: 0.0,   y: 0.40, z: -0.35 },
      { x: 0.45,  y: 0.33, z: -0.3 },
      // Row 2 (front)
      { x: -0.28, y: -0.05, z: 0.15 },
      { x: 0.28,  y: -0.03, z: 0.15 },
      // Row 3 (closest)
      { x: -0.5,  y: -0.35, z: 0.45 },
      { x: 0.15,  y: -0.38, z: 0.5 },
    ];

    const heads = [];
    headPositions.forEach((pos, i) => {
      const headGroup = new THREE.Group();
      headGroup.position.set(pos.x + (Math.random() - 0.5) * 0.05, pos.y, pos.z);

      const r = 0.22 + Math.random() * 0.06;
      // Main head sphere
      const headMat = new THREE.MeshStandardMaterial({
        color: headColors[i % headColors.length],
        roughness: 0.7, metalness: 0.0
      });
      const headMesh = new THREE.Mesh(new THREE.SphereGeometry(r, 24, 24), headMat);
      headGroup.add(headMesh);

      // Eyes — dark with white highlight
      const eyeMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
      const eyeHighlight = new THREE.MeshBasicMaterial({ color: 0xffffff });
      [-0.08, 0.08].forEach(ex => {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 12), eyeMat);
        eye.position.set(ex, 0.04, r * 0.88);
        headGroup.add(eye);
        const highlight = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 8), eyeHighlight);
        highlight.position.set(ex + 0.01, 0.055, r * 0.92);
        headGroup.add(highlight);
      });

      // Tiny nose bump
      const noseMat = new THREE.MeshStandardMaterial({ color: headColors[i % headColors.length], roughness: 0.7 });
      const nose = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), noseMat);
      nose.position.set(0, -0.02, r * 0.95);
      headGroup.add(nose);

      // Special accessories
      if (i === 0) {
        // Party hat (cone with stripes via shader)
        const hatMat = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 }, uHover: { value: 0 } },
          vertexShader: `
            varying vec3 vPos;
            void main(){
              vPos = position;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }`,
          fragmentShader: `
            varying vec3 vPos;
            void main(){
              float stripe = step(0.5, fract(vPos.y * 8.0));
              vec3 col = mix(vec3(1.0, 0.5, 0.0), vec3(1.0, 1.0, 1.0), stripe);
              gl_FragColor = vec4(col, 1.0);
            }`
        });
        shaderMats.push(hatMat);
        const hat = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.25, 12), hatMat);
        hat.position.y = r + 0.1;
        headGroup.add(hat);
      }
      if (i === 2) {
        // Glasses — two small torus rings
        const glassesMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        [-0.08, 0.08].forEach(gx => {
          const lens = new THREE.Mesh(new THREE.TorusGeometry(0.04, 0.006, 8, 24), glassesMat);
          lens.position.set(gx, 0.04, r * 0.92);
          headGroup.add(lens);
        });
        // Bridge
        const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.004, 0.004, 0.06, 6), glassesMat);
        bridge.position.set(0, 0.04, r * 0.92);
        bridge.rotation.z = Math.PI / 2;
        headGroup.add(bridge);
      }
      if (i === 4) {
        // Mohawk — 3 small spheres on top
        const mohawkMat = new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: 0.6 });
        for (let m = 0; m < 3; m++) {
          const spike = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), mohawkMat);
          spike.position.set((m - 1) * 0.06, r + 0.03, -0.02);
          headGroup.add(spike);
        }
      }

      group.add(headGroup);
      heads.push({ group: headGroup, baseY: pos.y, speed: 0.5 + Math.random() * 0.5, phase: Math.random() * Math.PI * 2 });
    });

    animFn = (t, hover) => {
      heads.forEach((h, i) => {
        h.group.position.y = h.baseY + Math.sin(t * h.speed + h.phase) * 0.04;
        h.group.rotation.z = Math.sin(t * h.speed * 0.7 + h.phase) * 0.05;
      });
      group.rotation.y = t * (hover ? 0.15 : 0.04);
    };
  }

  // ═══════ Icon Grid — Isometric 3D Icon Tiles ═══════
  else if (sceneType === 'icon-grid') {
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);

    // Override lighting
    scene.children.length = 0;
    scene.add(group);
    scene.add(new THREE.AmbientLight(0x222222, 0.5));
    const isoLight = new THREE.DirectionalLight(0xffffff, 0.7);
    isoLight.position.set(5, 8, 5);
    scene.add(isoLight);
    const greenGlow = new THREE.PointLight(0x88ff44, 0.4, 8);
    greenGlow.position.set(0, 2, 0);
    scene.add(greenGlow);

    const tileMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.3 });
    const iconMat = new THREE.MeshBasicMaterial({ color: 0x88ff44 });

    const icons = [];
    const iconGeos = [
      // 0: compass (torus + cone)
      null,
      // 1: cone
      new THREE.ConeGeometry(0.15, 0.3, 12),
      // 2: atom (sphere + torus)
      null,
      // 3: cylinder pin
      new THREE.CylinderGeometry(0.08, 0.08, 0.3, 12),
      // 4: cube
      new THREE.BoxGeometry(0.22, 0.22, 0.22),
      // 5: small face (sphere)
      new THREE.SphereGeometry(0.14, 16, 16),
      // 6: torus
      new THREE.TorusGeometry(0.13, 0.04, 16, 32),
      // 7: icosahedron
      new THREE.IcosahedronGeometry(0.15, 0),
      // 8: octahedron
      new THREE.OctahedronGeometry(0.15, 0),
    ];

    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const idx = row * 3 + col;
        const tx = (col - 1) * 1.0;
        const tz = (row - 1) * 1.0;

        // Dark tile
        const tile = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.15, 0.8), tileMat);
        tile.position.set(tx, 0, tz);
        group.add(tile);

        // Icon on tile
        let iconMesh;
        if (idx === 0) {
          // Compass: torus + cone needle
          const compassGroup = new THREE.Group();
          const ring = new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.02, 12, 32), iconMat);
          compassGroup.add(ring);
          const needle = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.2, 6), iconMat);
          compassGroup.add(needle);
          compassGroup.position.set(tx, 0.25, tz);
          group.add(compassGroup);
          iconMesh = compassGroup;
        } else if (idx === 2) {
          // Atom: sphere + torus orbits
          const atomGroup = new THREE.Group();
          const nucleus = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), iconMat);
          atomGroup.add(nucleus);
          const orbit1 = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.01, 8, 32), iconMat);
          atomGroup.add(orbit1);
          const orbit2 = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.01, 8, 32), iconMat);
          orbit2.rotation.x = Math.PI / 3;
          atomGroup.add(orbit2);
          atomGroup.position.set(tx, 0.25, tz);
          group.add(atomGroup);
          iconMesh = atomGroup;
        } else {
          const geo = iconGeos[idx];
          if (geo) {
            iconMesh = new THREE.Mesh(geo, iconMat);
            iconMesh.position.set(tx, 0.25, tz);
            group.add(iconMesh);
          }
        }
        if (iconMesh) {
          icons.push({ mesh: iconMesh, baseY: 0.25, tileX: tx, tileZ: tz, tile });
        }
      }
    }

    animFn = (t, hover) => {
      icons.forEach((ic, i) => {
        ic.mesh.rotation.y = t * (0.3 + i * 0.05);
        // Subtle wave displacement on tiles
        ic.tile.position.y = Math.sin(t * 0.5 + i * 0.7) * 0.03;
        ic.mesh.position.y = ic.baseY + Math.sin(t * 0.5 + i * 0.7) * 0.03;
      });
    };
  }

  // ═══════ Desert Game — Sunset Game Scene ═══════
  else if (sceneType === 'desert-game') {
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0.5, -1);

    // Override lighting for warm desert
    scene.children.length = 0;
    scene.add(group);
    scene.add(new THREE.AmbientLight(0x553322, 0.5));
    const sunLight = new THREE.DirectionalLight(0xff8844, 0.8);
    sunLight.position.set(0, 3, -5);
    scene.add(sunLight);

    // Sky gradient backdrop
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      depthWrite: false,
      uniforms: { uTime: { value: 0 }, uHover: { value: 0 } },
      vertexShader: `
        varying vec2 vUv;
        void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
      `,
      fragmentShader: `
        varying vec2 vUv;
        void main(){
          vec3 top = vec3(0.08, 0.04, 0.15);
          vec3 mid = vec3(0.6, 0.25, 0.1);
          vec3 bottom = vec3(1.0, 0.6, 0.15);
          vec3 col = mix(bottom, mid, smoothstep(0.0, 0.5, vUv.y));
          col = mix(col, top, smoothstep(0.5, 1.0, vUv.y));
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
    shaderMats.push(skyMat);
    const skyPlane = new THREE.Mesh(new THREE.PlaneGeometry(20, 10), skyMat);
    skyPlane.position.set(0, 3, -8);
    group.add(skyPlane);

    // Sun sphere at horizon
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa44 });
    const sun = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), sunMat);
    sun.position.set(0, 1.0, -7);
    group.add(sun);

    // Terrain — rolling dunes
    const terrainGeo = new THREE.PlaneGeometry(10, 8, 32, 32);
    terrainGeo.rotateX(-Math.PI / 2);
    const terrainPos = terrainGeo.attributes.position;
    for (let i = 0; i < terrainPos.count; i++) {
      const x = terrainPos.getX(i);
      const z = terrainPos.getZ(i);
      terrainPos.setY(i, Math.sin(x * 0.5) * 0.3 + Math.sin(z * 0.7) * 0.2);
    }
    terrainGeo.computeVertexNormals();
    const terrainMat = new THREE.MeshStandardMaterial({ color: 0xcc8844, roughness: 0.9, metalness: 0.0 });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.position.y = -0.8;
    group.add(terrain);

    // Spacecraft
    const shipMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
    const ships = [];
    [{ x: -1.5, y: 1.2, z: 0 }, { x: 1.0, y: 1.6, z: -1 }].forEach((sp, si) => {
      const shipGroup = new THREE.Group();
      // Nose cone
      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.25, 8), shipMat);
      nose.rotation.z = -Math.PI / 2;
      shipGroup.add(nose);
      // Body cylinder
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.3, 8), shipMat);
      body.rotation.z = -Math.PI / 2;
      body.position.x = -0.25;
      shipGroup.add(body);
      // Engine trail
      const trailMat = new THREE.MeshBasicMaterial({
        color: 0x44ddff, transparent: true, opacity: 0.6,
        blending: THREE.AdditiveBlending
      });
      const trail = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.04), trailMat);
      trail.position.x = -0.7;
      shipGroup.add(trail);

      shipGroup.position.set(sp.x, sp.y, sp.z);
      group.add(shipGroup);
      ships.push({ group: shipGroup, baseX: sp.x });
    });

    animFn = (t, hover) => {
      // Spacecraft fly slowly across
      ships.forEach((s, i) => {
        s.group.position.x = s.baseX + Math.sin(t * 0.2 + i * 2) * 1.5;
        s.group.position.y += Math.sin(t * 0.5 + i) * 0.001;
      });
      // Subtle terrain ripple
      for (let i = 0; i < terrainPos.count; i++) {
        const x = terrainPos.getX(i);
        const z = terrainPos.getZ(i);
        terrainPos.setY(i, Math.sin(x * 0.5 + t * 0.3) * 0.3 + Math.sin(z * 0.7 + t * 0.2) * 0.2);
      }
      terrainGeo.attributes.position.needsUpdate = true;
      terrainGeo.computeVertexNormals();
      group.rotation.y = Math.sin(t * 0.1) * 0.05;
    };
  }

  else if (sceneType === '3d-map') {
    camera.position.set(0, 3, 3);
    camera.lookAt(0, 0, 0);
    const gnd = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 4),
      new THREE.MeshStandardMaterial({ color: 0x1a2a1a, roughness: 0.95 })
    );
    gnd.rotation.x = -PI / 2;
    group.add(gnd);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.8 });
    [[0, 0.01, 0, 6, 0.02, 0.15], [0, 0.01, 0.5, 0.15, 0.02, 4],
     [-1, 0.01, -0.5, 3, 0.02, 0.1], [1.2, 0.01, 0.8, 0.1, 0.02, 2]].forEach(([x,y,z,w,h,d]) => {
      const r = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), roadMat);
      r.position.set(x,y,z);
      group.add(r);
    });
    const bldgMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.7, metalness: 0.1 });
    for (let i = 0; i < 6; i++) {
      const bh = 0.1 + Math.random() * 0.25;
      const bw = 0.2 + Math.random() * 0.2;
      const bd = 0.2 + Math.random() * 0.15;
      const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bldgMat);
      b.position.set((Math.random()-0.5)*3, bh/2, (Math.random()-0.5)*2);
      group.add(b);
    }
    const pin = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xcc0000, emissiveIntensity: 0.5 })
    );
    pin.position.set(0, 0.4, 0);
    group.add(pin);
    const pinStick = new THREE.Mesh(
      new THREE.CylinderGeometry(0.015, 0.015, 0.35),
      new THREE.MeshStandardMaterial({ color: 0xef4444 })
    );
    pinStick.position.set(0, 0.2, 0);
    group.add(pinStick);
    animFn = (t, hover) => {
      pin.position.y = 0.4 + Math.sin(t * 2) * 0.05;
      group.rotation.y = Math.sin(t * 0.2) * 0.08 + (hover ? t * 0.15 : 0);
    };
  }

  return { scene, camera, group, animFn, shaderMats, el, hover: false, visible: false };
}


// ═══════════════════════════════════════════════════════════
// INIT SCENES + INTERSECTION OBSERVER
// ═══════════════════════════════════════════════════════════
const liveScenes = [];

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const s = liveScenes.find(s => s.el === e.target);
    if (s) s.visible = e.isIntersecting;
  });
}, { rootMargin: '200px' });

scenePending.forEach(({ el, config }) => {
  const s = createMiniScene(el, config);
  if (s) {
    s.visible = true;
    liveScenes.push(s);
    observer.observe(el);

    // Hover tracking
    const card = el.closest('.card');
    card.addEventListener('mouseenter', () => s.hover = true);
    card.addEventListener('mouseleave', () => s.hover = false);
  }
});


// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP — single shared renderer with scissor
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();
const canvas = renderer.domElement;

function updateRendererSize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  if (canvas.width !== w * renderer.getPixelRatio() || canvas.height !== h * renderer.getPixelRatio()) {
    renderer.setSize(w, h);
  }
}

function animate() {
  requestAnimationFrame(animate);
  updateRendererSize();

  const t = clock.getElapsedTime();
  const canvasRect = canvas.getBoundingClientRect();

  // Clear entire canvas first with transparent
  renderer.setScissorTest(false);
  renderer.setClearColor(0x000000, 0);
  renderer.clear();
  renderer.setScissorTest(true);

  let anyRendered = false;

  liveScenes.forEach(s => {
    if (!s.visible) return;

    // Get the element's bounding rect relative to canvas
    const rect = s.el.getBoundingClientRect();

    // Check if rect is within viewport
    if (rect.bottom < canvasRect.top || rect.top > canvasRect.bottom ||
        rect.right < canvasRect.left || rect.left > canvasRect.right) {
      return;
    }

    const width  = rect.right - rect.left;
    const height = rect.bottom - rect.top;
    if (width <= 0 || height <= 0) return;

    // Convert to canvas pixel coordinates (bottom-left origin for WebGL)
    const left   = rect.left - canvasRect.left;
    const bottom = canvasRect.bottom - rect.bottom;

    // Update camera aspect
    s.camera.aspect = width / height;
    s.camera.updateProjectionMatrix();

    // Update shader uniforms (safely — some custom shaders may lack uHover)
    s.shaderMats.forEach(mat => {
      if (mat.uniforms.uTime) mat.uniforms.uTime.value = t;
      if (mat.uniforms.uHover) mat.uniforms.uHover.value += ((s.hover ? 1 : 0) - mat.uniforms.uHover.value) * 0.08;
    });

    // Run animation function
    if (s.animFn) s.animFn(t, s.hover);

    // Set viewport & scissor
    renderer.setViewport(left, bottom, width, height);
    renderer.setScissor(left, bottom, width, height);

    renderer.render(s.scene, s.camera);
    anyRendered = true;
  });

  renderer.setScissorTest(false);
}
animate();

// ═══════════════════════════════════════════════════════════
// HAPPY BOT MOUSE INTERACTION
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.card-happy-robot').forEach(bot => {
  const card = bot.closest('.card');
  const face = bot.querySelector('.robot-face');
  const eyes = bot.querySelectorAll('.robot-eye');
  const container = bot.querySelector('.robot-container');
  const body = bot.querySelector('.robot-body');

  // Mouse tracking — eyes and face follow cursor
  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    // Normalized mouse position: -1 to 1
    const mx = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
    const my = ((e.clientY - rect.top) / rect.height - 0.5) * 2;

    // Eyes follow mouse — shift within face
    eyes.forEach(eye => {
      eye.style.transform = `translate(${mx * 3}px, ${my * 2}px) scaleY(1)`;
    });

    // Face turns slightly toward mouse
    if (face) {
      face.style.transform = `translate(calc(-50% + ${mx * 4}px), calc(-50% + ${my * 2}px))`;
    }

    // Body tilts toward mouse (3D perspective feel)
    if (body) {
      body.style.transform = `translateX(-50%) rotateY(${mx * 8}deg) rotateX(${-my * 5}deg) translateY(${-Math.abs(my) * 3}px)`;
    }

    // Container subtle parallax
    if (container) {
      container.style.transform = `translateX(${mx * 3}px) translateY(${my * 2}px)`;
    }
  });

  // Reset on mouse leave
  card.addEventListener('mouseleave', () => {
    eyes.forEach(eye => {
      eye.style.transform = '';
    });
    if (face) face.style.transform = '';
    if (body) body.style.transform = '';
    if (container) container.style.transform = '';
  });

  // Click interaction — excited bounce + ripple + heart
  card.addEventListener('click', (e) => {
    // Ripple at click position
    const rect = bot.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'click-ripple';
    ripple.style.left = (e.clientX - rect.left) + 'px';
    ripple.style.top = (e.clientY - rect.top) + 'px';
    bot.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    // Heart particles
    for (let i = 0; i < 3; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart-particle';
      heart.textContent = ['❤️', '💜', '✨'][i];
      heart.style.left = (30 + Math.random() * 60) + '%';
      heart.style.top = (20 + Math.random() * 30) + '%';
      heart.style.animationDelay = (i * 0.15) + 's';
      bot.appendChild(heart);
      setTimeout(() => heart.remove(), 1200);
    }

    // Excited state
    bot.classList.add('excited');
    setTimeout(() => bot.classList.remove('excited'), 1500);
  });
});

// Also add mouse tracking to dancing/sleepy/party bot variants
document.querySelectorAll('.card-dancing-robot, .card-sleepy-robot, .card-party-robot').forEach(bot => {
  const card = bot.closest('.card');
  const face = bot.querySelector('.robot-face');
  const eyes = bot.querySelectorAll('.robot-eye');
  const container = bot.querySelector('.robot-container');
  const body = bot.querySelector('.robot-body');

  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const mx = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
    const my = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
    if (eyes.length) eyes.forEach(eye => { eye.style.transform = `translate(${mx * 3}px, ${my * 2}px)`; });
    if (face) face.style.transform = `translate(calc(-50% + ${mx * 4}px), calc(-50% + ${my * 2}px))`;
    if (container) container.style.transform = `translateX(${mx * 3}px) translateY(${my * 2}px)`;
  });
  card.addEventListener('mouseleave', () => {
    if (eyes.length) eyes.forEach(eye => { eye.style.transform = ''; });
    if (face) face.style.transform = '';
    if (container) container.style.transform = '';
  });
});
</script>
