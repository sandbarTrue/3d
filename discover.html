<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — 3D Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Mono:wght@700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;overflow-x:hidden}

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.2);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(167,139,250,0.4)}

  /* ─── Nav ─── */
  .nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;padding:0 24px;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid rgba(167,139,250,0.1)}
  .nav-logo{font-weight:800;font-size:18px;letter-spacing:-0.5px;margin-right:32px;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .nav a{text-decoration:none;color:rgba(255,255,255,0.4);font-size:13px;font-weight:500;margin-right:20px;transition:color .2s}
  .nav a:hover{color:rgba(255,255,255,0.8)}
  .nav a.on{color:#fff}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .nav-right .btn{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:rgba(255,255,255,0.7)}
  .nav-right .btn:hover{border-color:rgba(167,139,250,0.3);color:#fff}
  .nav-right .btn.primary{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;border-color:transparent}
  .nav-right .btn.primary:hover{box-shadow:0 0 20px rgba(167,139,250,0.4)}

  /* ─── Pills ─── */
  .pills{display:flex;gap:6px;padding:14px 24px;background:rgba(10,10,15,0.6);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.04);overflow-x:auto}
  .pills::-webkit-scrollbar{display:none}
  .pill{padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);font-size:12px;font-weight:500;color:rgba(255,255,255,0.4);cursor:pointer;white-space:nowrap;transition:all .15s}
  .pill:hover{border-color:rgba(167,139,250,0.3);color:rgba(255,255,255,0.7)}
  .pill.on{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;border-color:transparent}

  /* ─── Masonry ─── */
  .grid{column-count:4;column-gap:14px;padding:20px 24px 60px;max-width:1500px;margin:0 auto}
  @media(max-width:1200px){.grid{column-count:3}}
  @media(max-width:800px){.grid{column-count:2;padding:12px}}
  @media(max-width:500px){.grid{column-count:1}}

  /* ─── Card ─── */
  .card{break-inside:avoid;margin-bottom:14px;border-radius:14px;overflow:hidden;background:rgba(20,18,30,0.8);border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;position:relative}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.2)}

  /* 3D canvas container */
  .card .scene{width:100%;position:relative;overflow:hidden}
  .card .scene canvas{width:100%!important;height:100%!important;display:block}

  /* Text overlays — z-index:5 to stay above the fixed WebGL canvas (z-index:1) */
  .card .overlay{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;pointer-events:none}
  .card .overlay.center{justify-content:center;align-items:center;text-align:center}
  .card .overlay.gradient::before{content:'';position:absolute;inset:0;z-index:0;background:linear-gradient(transparent 30%,rgba(0,0,0,.55));pointer-events:none}
  .card .overlay *{position:relative;z-index:1}
  .card .overlay h2{color:white;font-size:28px;font-weight:900;line-height:1.1;letter-spacing:-1px}
  .card .overlay p{color:rgba(255,255,255,.65);font-size:11px;margin-top:4px;font-weight:500}

  /* Card types */
  .card-text{padding:24px 20px}
  .card-text h3{font-size:16px;font-weight:700;margin-bottom:6px;color:#e8e8f0}
  .card-text p{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5}
  .card-text .tag{display:inline-block;margin-top:10px;padding:3px 8px;border-radius:10px;background:rgba(167,139,250,0.1);font-size:10px;font-weight:600;color:rgba(167,139,250,0.7)}

  .card-pixel{background:rgba(10,10,20,0.9);color:#0f0;padding:24px 20px;font-family:'Space Mono',monospace}
  .card-pixel .label{font-size:9px;text-transform:uppercase;letter-spacing:2px;opacity:.5;margin-bottom:10px}
  .card-pixel .body{font-size:11px;line-height:1.7;text-transform:uppercase;font-weight:700}
  .card-pixel .foot{margin-top:14px;font-size:10px;opacity:.4}

  .card-love{padding:28px 20px;text-align:center;background:linear-gradient(160deg,rgba(40,20,30,0.9),rgba(50,15,40,0.9))}
  .card-love .hearts{font-size:36px;margin-bottom:12px}
  .card-love h3{font-family:'Playfair Display',serif;font-size:22px;font-style:italic;margin-bottom:6px;color:#f9a8d4}
  .card-love p{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.5;max-width:220px;margin:0 auto}

  .card-deck{padding:24px 20px;background:rgba(15,14,25,0.9)}
  .card-deck .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(167,139,250,0.5);font-weight:600;margin-bottom:8px}
  .card-deck h3{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1.1;color:#e8e8f0}
  .card-deck .author{font-size:11px;color:rgba(255,255,255,0.3);margin-top:8px}

  .card-play{padding:28px;background:linear-gradient(135deg,rgba(40,30,10,0.9),rgba(50,20,15,0.9));display:flex;align-items:center;justify-content:center;min-height:160px}
  .card-play h2{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  .card-cjk{padding:24px 20px;background:linear-gradient(135deg,rgba(60,50,120,0.9),rgba(80,40,100,0.9));color:white}
  .card-cjk h3{font-size:24px;font-weight:900;margin-bottom:6px}
  .card-cjk p{font-size:11px;opacity:.55}

  .card-tool{padding:20px;border:2px dashed rgba(255,255,255,0.08);background:rgba(15,14,25,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:140px;color:rgba(255,255,255,0.25)}
  .card-tool .icon{width:40px;height:40px;border-radius:10px;background:rgba(167,139,250,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(167,139,250,0.5)}
  .card-tool p{font-size:12px;font-weight:500}

  /* Map card */
  .card-map{position:relative;overflow:hidden}
  .card-map canvas{width:100%!important;height:100%!important;display:block}
  .card-map .map-label{position:absolute;bottom:10px;left:10px;background:rgba(10,10,15,0.8);backdrop-filter:blur(8px);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;color:#e8e8f0;border:1px solid rgba(255,255,255,0.1)}

  /* Footer */
  .card-foot{display:flex;align-items:center;gap:6px;padding:10px 14px;border-top:1px solid rgba(255,255,255,0.04)}
  .card-foot.dark{border-color:rgba(255,255,255,0.04);background:rgba(10,10,15,0.9)}
  .card-foot .dot{width:20px;height:20px;border-radius:50%}
  .card-foot .name{font-size:11px;font-weight:500;color:rgba(255,255,255,0.4)}
  .card-foot .likes{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.2)}

  /* ─── 3D Card glow on hover ─── */
  .card .scene::after{
    content:'';position:absolute;inset:0;z-index:3;
    background:radial-gradient(circle at 50% 50%, rgba(167,139,250,0.12) 0%, transparent 70%);
    opacity:0;transition:opacity .4s ease;pointer-events:none;
  }
  .card:hover .scene::after{opacity:1}

  /* ─── Shimmer badge for 3D cards ─── */
  .badge-3d{
    position:absolute;top:10px;right:10px;z-index:5;
    padding:3px 8px;border-radius:6px;
    background:rgba(167,139,250,0.15);backdrop-filter:blur(8px);
    border:1px solid rgba(167,139,250,0.2);
    font-size:9px;font-weight:700;letter-spacing:1px;
    color:rgba(167,139,250,0.8);text-transform:uppercase;
  }

  /* ─── Shape name label ─── */
  .shape-label{
    position:absolute;bottom:10px;left:10px;z-index:5;
    padding:3px 10px;border-radius:6px;
    background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
    font-size:10px;font-weight:600;letter-spacing:0.5px;
    color:rgba(255,255,255,0.6);
    opacity:0;transition:opacity .3s ease;
  }
  .card:hover .shape-label{opacity:1}

  /* ─── Clickable 3D cards ─── */
  .card-clickable{cursor:pointer}
  .card-clickable:hover .badge-3d{
    background:rgba(167,139,250,0.25);border-color:rgba(167,139,250,0.4);
    color:rgba(167,139,250,1);
  }

  /* ─── Entrance animation ─── */
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card{opacity:0;animation:cardIn .45s ease forwards}
  .card:nth-child(1){animation-delay:.04s}
  .card:nth-child(2){animation-delay:.08s}
  .card:nth-child(3){animation-delay:.12s}
  .card:nth-child(4){animation-delay:.16s}
  .card:nth-child(5){animation-delay:.20s}
  .card:nth-child(6){animation-delay:.24s}
  .card:nth-child(7){animation-delay:.28s}
  .card:nth-child(8){animation-delay:.32s}
  .card:nth-child(n+9){animation-delay:.36s}
</style>
</head>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════
// GLSL SNIPPETS (from index.html)
// ═══════════════════════════════════════════════════════════
const PALETTE_GLSL = `
vec3 cosPalette(float t, vec3 a, vec3 b, vec3 c, vec3 d){
  return a + b * cos(6.283185 * (c * t + d));
}`;

// ═══════════════════════════════════════════════════════════
// PALETTES (from index.html)
// ═══════════════════════════════════════════════════════════
const PALETTES = {
  nebula:   { name:'Nebula',     a:[.55,.45,.60], b:[.50,.50,.45], c:[1,.7,.4],  d:[.00,.15,.20], rim1:[.4,.6,1], rim2:[.9,.4,.8],  style:null },
  coral:    { name:'Coral Reef', a:[.50,.50,.50], b:[.50,.50,.50], c:[1,1,1],    d:[.25,.05,.10], rim1:[1,.5,.4], rim2:[1,.7,.3],    style:null },
  aurora:   { name:'Aurora',     a:[.50,.50,.50], b:[.50,.50,.50], c:[1,1,.5],   d:[.10,.20,.30], rim1:[.3,1,.7], rim2:[.5,.4,1],    style:null },
  sunset:   { name:'Sunset',     a:[.50,.50,.30], b:[.50,.50,.30], c:[1,.7,.4],  d:[.00,.05,.20], rim1:[1,.4,.2], rim2:[1,.2,.5],    style:null },
  mint:     { name:'Mint Ice',   a:[.60,.70,.65], b:[.30,.40,.35], c:[.8,.6,1],  d:[.05,.25,.15], rim1:[.4,.9,.8],rim2:[.6,.7,1],    style:null },
  ember:    { name:'Ember',      a:[.55,.35,.25], b:[.50,.45,.40], c:[1,.5,.2],  d:[.35,.15,.05], rim1:[1,.3,.1], rim2:[1,.6,.1],    style:null },
  ocean:    { name:'Deep Ocean', a:[.40,.45,.60], b:[.35,.40,.50], c:[.8,1,1],   d:[.00,.10,.30], rim1:[.1,.5,1], rim2:[.1,.8,.9],   style:null },
  hologram: { name:'Hologram',   a:[.50,.50,.50], b:[.50,.50,.50], c:[1,1,1],    d:[.00,.33,.67], rim1:[1,.3,.5], rim2:[.3,1,.5],    style:null },
  clay:     { name:'Clay',       a:[.62,.52,.45], b:[.12,.10,.08], c:[.5,.5,.5],  d:[.10,.05,.00], rim1:[.75,.65,.55], rim2:[.65,.55,.50], style:'natural' },
  stone:    { name:'Stone',      a:[.50,.50,.52], b:[.10,.10,.12], c:[.6,.6,.7],  d:[.00,.00,.05], rim1:[.60,.60,.65], rim2:[.55,.55,.60], style:'natural' },
  porcelain:{ name:'Porcelain',  a:[.88,.86,.84], b:[.08,.06,.05], c:[.3,.3,.4],  d:[.00,.02,.05], rim1:[.90,.88,.95], rim2:[.85,.82,.90], style:'natural' },
  moss:     { name:'Moss',       a:[.35,.42,.32], b:[.12,.15,.10], c:[.6,.4,.5],  d:[.05,.10,.00], rim1:[.45,.55,.40], rim2:[.40,.50,.38], style:'natural' },
};

// ═══════════════════════════════════════════════════════════
// MATERIAL FACTORY (from index.html createEditorMaterial)
// ═══════════════════════════════════════════════════════════
function createEditorMaterial(paletteKey){
  const p = PALETTES[paletteKey] || PALETTES.nebula;
  const isNatural = p.style==='natural';
  return new THREE.ShaderMaterial({
    side:THREE.DoubleSide,
    uniforms:{
      uTime:{value:0}, uHover:{value:0},
      uPalA:{value:new THREE.Vector3(...p.a)}, uPalB:{value:new THREE.Vector3(...p.b)},
      uPalC:{value:new THREE.Vector3(...p.c)}, uPalD:{value:new THREE.Vector3(...p.d)},
      uRim1:{value:new THREE.Vector3(...p.rim1)}, uRim2:{value:new THREE.Vector3(...p.rim2)},
      uFresnelStr:{value:isNatural?0.18:0.55}, uFresnelPow:{value:isNatural?2.0:3.0},
      uSpecInt:{value:isNatural?0.08:0.35}, uSpecSharp:{value:isNatural?16.0:64.0}, uMinBright:{value:isNatural?0.18:0.12},
      uNatural:{value:isNatural?1.0:0.0},
    },
    vertexShader:`
      varying vec3 vNormal, vViewPos, vPos;
      void main(){
        vNormal=normalize(normalMatrix*normal); vPos=position;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        vViewPos=-mv.xyz; gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`
      uniform float uTime, uHover, uNatural;
      uniform vec3 uPalA,uPalB,uPalC,uPalD,uRim1,uRim2;
      uniform float uFresnelStr,uFresnelPow,uSpecInt,uSpecSharp,uMinBright;
      ${PALETTE_GLSL}
      varying vec3 vNormal, vViewPos, vPos;

      float hash_e(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
      float valNoise(vec3 p){
        vec3 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
        float a=hash_e(i.xy+i.z*137.0), b=hash_e(i.xy+vec2(1,0)+i.z*137.0);
        float c=hash_e(i.xy+vec2(0,1)+i.z*137.0), d=hash_e(i.xy+vec2(1,1)+i.z*137.0);
        float e=hash_e(i.xy+(i.z+1.0)*137.0), ff=hash_e(i.xy+vec2(1,0)+(i.z+1.0)*137.0);
        float g=hash_e(i.xy+vec2(0,1)+(i.z+1.0)*137.0), h=hash_e(i.xy+vec2(1,1)+(i.z+1.0)*137.0);
        float z0=mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
        float z1=mix(mix(e,ff,f.x),mix(g,h,f.x),f.y);
        return mix(z0,z1,f.z);
      }

      vec3 fakeEnv(vec3 reflDir){
        float ey=reflDir.y*0.5+0.5;
        vec3 env=mix(vec3(0.15,0.05,0.25),vec3(0.05,0.1,0.2),ey);
        env+=vec3(0.6,0.3,0.8)*pow(max(dot(reflDir,normalize(vec3(0.5,0.6,0.4))),0.0),8.0)*0.8;
        env+=vec3(0.2,0.5,0.9)*pow(max(dot(reflDir,normalize(vec3(-0.6,0.3,0.5))),0.0),6.0)*0.6;
        env+=vec3(0.9,0.3,0.5)*pow(max(dot(reflDir,normalize(vec3(0.0,-0.3,-0.7))),0.0),5.0)*0.5;
        return env;
      }
      vec3 fakeEnvNatural(vec3 reflDir){
        float ey=reflDir.y*0.5+0.5;
        vec3 env=mix(vec3(0.18,0.15,0.13),vec3(0.35,0.32,0.30),ey);
        env+=vec3(0.5,0.45,0.38)*pow(max(dot(reflDir,normalize(vec3(0.4,0.8,0.3))),0.0),4.0)*0.4;
        env+=vec3(0.25,0.28,0.35)*pow(max(dot(reflDir,normalize(vec3(-0.5,0.2,0.6))),0.0),3.0)*0.3;
        return env;
      }

      void main(){
        vec3 N=normalize(vNormal); vec3 V=normalize(vViewPos);
        float colorNoise=hash_e(vPos.xy*5.0)*0.08;
        float gradT=vPos.y*0.5+0.5+N.x*0.2+uTime*0.06*mix(1.0,0.3,uNatural)+colorNoise;
        vec3 base=cosPalette(gradT,uPalA,uPalB,uPalC,uPalD);
        vec3 minBright=mix(vec3(0.12,0.06,0.18),vec3(uMinBright,uMinBright*0.9,uMinBright*0.8),uNatural);
        base=max(base,minBright);
        float detailScale=mix(8.0,12.0,uNatural);
        float detailAmt=mix(0.03,0.06,uNatural);
        float microDetail=valNoise(vPos*detailScale+uTime*0.05)*detailAmt;
        base*=1.0+microDetail;
        vec3 L1=normalize(vec3(0.5,0.7,0.6)); vec3 L2=normalize(vec3(-0.5,0.3,0.7));
        float wrapAmt=mix(0.3,0.45,uNatural);
        float d1=dot(N,L1)*wrapAmt+(1.0-wrapAmt); float d2=dot(N,L2)*(wrapAmt*0.7)+(1.0-wrapAmt*0.7);
        base*=max(d1,d2);
        base=pow(base,vec3(mix(0.85,0.95,uNatural)));
        float sssAmt=mix(0.15,0.08,uNatural);
        float sss=pow(max(dot(-V,L1),0.0),2.0)*sssAmt;
        base+=base*sss;
        float fres=pow(1.0-max(dot(V,N),0.0),uFresnelPow);
        vec3 rim=mix(uRim1,uRim2,sin(uTime*0.4)*0.5+0.5);
        base+=rim*fres*uFresnelStr;
        vec3 refl=reflect(-V,N);
        vec3 envC=mix(fakeEnv(refl),fakeEnvNatural(refl),uNatural);
        float envMix=mix(0.10+fres*0.06, 0.04+fres*0.03, uNatural);
        base=mix(base,envC,envMix);
        vec3 H1=normalize(V+L1);
        float specSharp=pow(max(dot(N,H1),0.0),mix(80.0,uSpecSharp,uNatural))*mix(0.35,uSpecInt,uNatural);
        float specSoft=pow(max(dot(N,H1),0.0),mix(12.0,6.0,uNatural))*mix(0.12,0.04,uNatural);
        vec3 specColor=mix(vec3(1.0,0.95,0.9),vec3(0.9,0.88,0.82),uNatural);
        base+=specColor*(specSharp+specSoft);
        // Hover glow
        base+=rim*uHover*mix(0.25,0.12,uNatural);
        base=max(base,minBright);
        gl_FragColor=vec4(base,1.0);
      }`
  });
}


// ═══════════════════════════════════════════════════════════
// CARD DEFINITIONS
// ═══════════════════════════════════════════════════════════
const PI = Math.PI;
const cards = [
  // 1: "The next wave" hero
  { type: '3d-hero', height: 280, bg: '#0c1a2e',
    title: 'The next<br>wave', sub: 'Generative 3D — Explore the frontier',
    scene: 'wave', foot: { color: '#60a5fa', name: 'Studio Wave', likes: '2.4k' } },

function makeLatheProfile(){
  const pts=[];
  for(let i=0;i<=20;i++){
    const t=i/20;
    const r=0.3+0.4*Math.sin(t*Math.PI)*(1+0.3*Math.sin(t*Math.PI*3));
    pts.push(new THREE.Vector2(r, t*1.6-0.8));
  }
  return pts;
}

const SHAPE_CREATORS = {
  sphere:      ()=>new THREE.SphereGeometry(1,64,64),
  torus:       ()=>new THREE.TorusGeometry(.7,.25,64,128),
  torusknot:   ()=>new THREE.TorusKnotGeometry(.55,.18,200,32,2,3),
  icosahedron: ()=>new THREE.IcosahedronGeometry(.8,0),
  octahedron:  ()=>new THREE.OctahedronGeometry(.8,0),
  dodecahedron:()=>new THREE.DodecahedronGeometry(.7,0),
  tetrahedron: ()=>new THREE.TetrahedronGeometry(.8,0),
  capsule:     ()=>new THREE.CapsuleGeometry(.5,.8,16,32),
  cylinder:    ()=>new THREE.CylinderGeometry(.6,.6,1.2,64),
  cone:        ()=>new THREE.ConeGeometry(.7,1.2,64),
  box:         ()=>new THREE.BoxGeometry(1,1,1,4,4,4),
  ring:        ()=>new THREE.TorusGeometry(.6,.08,32,96),
  trefoil:     ()=>new THREE.TorusKnotGeometry(.55,.18,200,32,3,2),
  lathe:       ()=>new THREE.LatheGeometry(makeLatheProfile(),64),
};

function buildCuteRobot(palette) {
  const root = new THREE.Group();
  const mat = createEditorMaterial(palette || 'porcelain');
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x44ffff });
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111122 });
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xff6688 });

  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.32, 0.4, 8, 16), mat);
  root.add(body);

  const headJoint = new THREE.Group();
  headJoint.position.set(0, 0.45, 0);
  root.add(headJoint);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 24, 24), mat);
  head.position.set(0, 0.22, 0);
  headJoint.add(head);

  const eyeGeo = new THREE.SphereGeometry(0.06, 12, 12);
  const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
  leftEye.position.set(-0.1, 0.28, 0.24);
  headJoint.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
  rightEye.position.set(0.1, 0.28, 0.24);
  headJoint.add(rightEye);

  const pupilGeo = new THREE.SphereGeometry(0.03, 8, 8);
  leftEye.add(new THREE.Mesh(pupilGeo, pupilMat).translateZ(0.055));
  rightEye.add(new THREE.Mesh(pupilGeo, pupilMat).translateZ(0.055));

  const antBase = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.12, 6), mat);
  antBase.position.set(0, 0.5, 0);
  headJoint.add(antBase);
  const antTip = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8), glowMat);
  antTip.position.set(0, 0.57, 0);
  headJoint.add(antTip);

  const armGeo = new THREE.CapsuleGeometry(0.08, 0.25, 4, 8);
  const leftArmJoint = new THREE.Group();
  leftArmJoint.position.set(-0.35, 0.2, 0);
  root.add(leftArmJoint);
  leftArmJoint.add(new THREE.Mesh(armGeo, mat).translateY(-0.15));

  const rightArmJoint = new THREE.Group();
  rightArmJoint.position.set(0.35, 0.2, 0);
  root.add(rightArmJoint);
  rightArmJoint.add(new THREE.Mesh(armGeo, mat).translateY(-0.15));

  const footGeo = new THREE.SphereGeometry(0.1, 12, 12);
  const lFoot = new THREE.Mesh(footGeo, mat);
  lFoot.position.set(-0.15, -0.55, 0.03); lFoot.scale.set(1, 0.6, 1.3);
  root.add(lFoot);
  const rFoot = new THREE.Mesh(footGeo, mat);
  rFoot.position.set(0.15, -0.55, 0.03); rFoot.scale.set(1, 0.6, 1.3);
  root.add(rFoot);

  return { root, headJoint, leftArmJoint, rightArmJoint, eyes: [leftEye, rightEye], antTip, body, shaderMats: [mat] };
}

function buildMechRobot(palette) {
  const root = new THREE.Group();
  const mat = createEditorMaterial(palette || 'ocean');
  const visorMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.85 });
  const accentMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });

  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.55, 0.35), mat);
  root.add(torso);
  const chest = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.2, 0.05), accentMat);
  chest.position.set(0, 0.08, 0.19);
  root.add(chest);

  const headJoint = new THREE.Group();
  headJoint.position.set(0, 0.35, 0);
  root.add(headJoint);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.22, 0.26), mat);
  head.position.set(0, 0.16, 0);
  headJoint.add(head);
  const visor = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.06, 0.05), visorMat);
  visor.position.set(0, 0.14, 0.135);
  headJoint.add(visor);

  function buildArm(sign) {
    const armJoint = new THREE.Group();
    armJoint.position.set(sign * 0.38, 0.18, 0);
    root.add(armJoint);
    const shoulder = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.2), mat);
    shoulder.position.set(sign * -0.05, 0.05, 0);
    armJoint.add(shoulder);
    const upper = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.28, 0.12), mat);
    upper.position.set(0, -0.2, 0);
    armJoint.add(upper);
    const elbowJoint = new THREE.Group();
    elbowJoint.position.set(0, -0.36, 0);
    armJoint.add(elbowJoint);
    const forearm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.22, 0.1), mat);
    forearm.position.set(0, -0.13, 0);
    elbowJoint.add(forearm);
    return { armJoint, elbowJoint };
  }
  const leftArm = buildArm(-1);
  const rightArm = buildArm(1);

  const hip = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.12, 0.3), mat);
  hip.position.set(0, -0.34, 0);
  root.add(hip);

  function buildLeg(sign) {
    const legJoint = new THREE.Group();
    legJoint.position.set(sign * 0.14, -0.42, 0);
    root.add(legJoint);
    const upper = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.25, 0.13), mat);
    upper.position.set(0, -0.16, 0);
    legJoint.add(upper);
    const kneeJoint = new THREE.Group();
    kneeJoint.position.set(0, -0.28, 0);
    legJoint.add(kneeJoint);
    const lower = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.22, 0.11), mat);
    lower.position.set(0, -0.14, 0);
    kneeJoint.add(lower);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.06, 0.22), mat);
    foot.position.set(0, -0.28, 0.03);
    kneeJoint.add(foot);
    return { legJoint, kneeJoint };
  }
  const leftLeg = buildLeg(-1);
  const rightLeg = buildLeg(1);

  return { root, headJoint, visor, leftArm, rightArm, leftLeg, rightLeg, torso, body: torso, shaderMats: [mat] };
}

function buildRetroRobot(palette) {
  const root = new THREE.Group();
  const mat = createEditorMaterial(palette || 'ember');
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
  const dialMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
  const grillMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.3 });
  const btnColors = [0x33ff33, 0xff3333, 0x3399ff];

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.35), mat);
  root.add(body);

  const dial = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.04, 12), dialMat);
  dial.rotation.x = PI / 2; dial.position.set(0, -0.05, 0.19);
  root.add(dial);

  for (let i = 0; i < 3; i++) {
    const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.04, 8), new THREE.MeshBasicMaterial({ color: btnColors[i] }));
    btn.rotation.x = PI / 2; btn.position.set(-0.08 + i * 0.08, 0.15, 0.19);
    root.add(btn);
  }

  const headJoint = new THREE.Group();
  headJoint.position.set(0, 0.38, 0);
  root.add(headJoint);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.3, 0.3), mat);
  head.position.set(0, 0.2, 0);
  headJoint.add(head);

  const eyeGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.04, 12);
  const lEye = new THREE.Mesh(eyeGeo, eyeMat);
  lEye.rotation.x = PI / 2; lEye.position.set(-0.08, 0.24, 0.16);
  headJoint.add(lEye);
  const rEye = new THREE.Mesh(eyeGeo, eyeMat);
  rEye.rotation.x = PI / 2; rEye.position.set(0.08, 0.24, 0.16);
  headJoint.add(rEye);

  for (let i = 0; i < 3; i++) {
    const bar = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.02, 0.04), grillMat);
    bar.position.set(0, 0.11 + i * 0.03, 0.16);
    headJoint.add(bar);
  }

  const antGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.18, 6);
  const antTipGeo = new THREE.SphereGeometry(0.025, 8, 8);
  const antTipMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
  [-0.1, 0.1].forEach(x => {
    const ant = new THREE.Mesh(antGeo, mat);
    ant.position.set(x, 0.44, 0);
    headJoint.add(ant);
    const tip = new THREE.Mesh(antTipGeo, antTipMat);
    tip.position.set(x, 0.54, 0);
    headJoint.add(tip);
  });

  const armGeo = new THREE.BoxGeometry(0.12, 0.3, 0.12);
  const handGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
  function buildArm(sign) {
    const joint = new THREE.Group();
    joint.position.set(sign * 0.36, 0.15, 0);
    root.add(joint);
    joint.add(new THREE.Mesh(armGeo, mat).translateY(-0.2));
    joint.add(new THREE.Mesh(handGeo, mat).translateY(-0.4));
    return joint;
  }
  const leftArmJoint = buildArm(-1);
  const rightArmJoint = buildArm(1);

  const legGeo = new THREE.BoxGeometry(0.14, 0.3, 0.14);
  const footGeo = new THREE.BoxGeometry(0.18, 0.06, 0.24);
  function buildLeg(sign) {
    const joint = new THREE.Group();
    joint.position.set(sign * 0.14, -0.36, 0);
    root.add(joint);
    joint.add(new THREE.Mesh(legGeo, mat).translateY(-0.18));
    const foot = new THREE.Mesh(footGeo, mat);
    foot.position.set(0, -0.36, 0.03);
    joint.add(foot);
    return joint;
  }
  const leftLegJoint = buildLeg(-1);
  const rightLegJoint = buildLeg(1);

  return { root, headJoint, leftArmJoint, rightArmJoint, leftLegJoint, rightLegJoint, eyes: [lEye, rEye], body, shaderMats: [mat] };
}

function buildDroneRobot(palette) {
  const root = new THREE.Group();
  const mat = createEditorMaterial(palette || 'hologram');
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff2244, transparent: true, opacity: 0.8 });
  const eyeInnerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x44ffaa });

  const body = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), mat);
  root.add(body);

  const eyeLens = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
  eyeLens.position.set(0, 0.05, 0.28);
  root.add(eyeLens);
  const eyeInner = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), eyeInnerMat);
  eyeInner.position.set(0, 0, 0.06);
  eyeLens.add(eyeInner);

  const sensor = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.04, 0.12, 8), mat);
  sensor.position.set(0, 0.32, 0);
  root.add(sensor);
  const sensorLight = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8), glowMat);
  sensorLight.position.set(0, 0.39, 0);
  root.add(sensorLight);

  const LEG_COUNT = 6;
  const upperGeo = new THREE.CylinderGeometry(0.025, 0.018, 0.45, 6);
  const lowerGeo = new THREE.CylinderGeometry(0.018, 0.012, 0.35, 6);
  const kneeGeo = new THREE.SphereGeometry(0.03, 6, 6);
  const tipGeo = new THREE.SphereGeometry(0.02, 6, 6);
  const legs = [];

  for (let i = 0; i < LEG_COUNT; i++) {
    const angle = (i / LEG_COUNT) * Math.PI * 2;
    const legJoint = new THREE.Group();
    legJoint.position.set(Math.cos(angle) * 0.25, -0.05, Math.sin(angle) * 0.25);
    legJoint.rotation.y = -angle;
    legJoint.rotation.z = 0.6;
    root.add(legJoint);

    const upper = new THREE.Mesh(upperGeo, mat);
    upper.position.set(0, -0.22, 0);
    legJoint.add(upper);

    const kneeJoint = new THREE.Group();
    kneeJoint.position.set(0, -0.45, 0);
    legJoint.add(kneeJoint);
    kneeJoint.add(new THREE.Mesh(kneeGeo, mat));

    const lower = new THREE.Mesh(lowerGeo, mat);
    lower.position.set(0, -0.18, 0);
    lower.rotation.z = -0.8;
    kneeJoint.add(lower);

    const tip = new THREE.Mesh(tipGeo, glowMat);
    tip.position.set(0, -0.35, 0);
    kneeJoint.add(tip);

    legs.push({ legJoint, kneeJoint });
  }

  return { root, body, eyeLens, eyeInner, sensorLight, legs, shaderMats: [mat] };
}

// ── createRobot factory ──
function createRobot(style, palette) {
  switch (style) {
    case 'cute':  return buildCuteRobot(palette);
    case 'mech':  return buildMechRobot(palette);
    case 'retro': return buildRetroRobot(palette);
    case 'drone': return buildDroneRobot(palette);
    default: return buildCuteRobot(palette);
  }
}

// ── Robot animation factory ──
function createRobotAnimFn(robot, style) {
  let lastT = 0, curHover = 0;
  const phaseOffset = Math.random() * PI * 2;

  return (t, hover) => {
    t += phaseOffset;
    const dt = Math.min(t - lastT, 0.05);
    lastT = t;
    curHover += ((hover ? 1 : 0) - curHover) * 0.08;

    // Float/bob
    robot.root.position.y = Math.sin(t * 1.2) * 0.06;

    // Head turn
    if (robot.headJoint) {
      robot.headJoint.rotation.y = Math.sin(t * 0.5) * 0.25;
      robot.headJoint.rotation.x = Math.sin(t * 0.7) * 0.05;
    }

    // Breathing
    if (robot.body) {
      robot.body.scale.y = 1.0 + Math.sin(t * 1.5) * 0.015;
    }

    // Eye glow
    if (robot.eyes) {
      const eyeBright = 0.5 + Math.sin(t * 3.0) * 0.2 + curHover * 0.3;
      robot.eyes.forEach(eye => {
        const hsl = {};
        eye.material.color.getHSL(hsl);
        eye.material.color.setHSL(hsl.h, 1.0, Math.min(eyeBright, 0.95));
      });
    }

    switch (style) {
      case 'cute':
        if (robot.leftArmJoint) {
          robot.leftArmJoint.rotation.z = Math.sin(t * 0.8) * 0.15;
          robot.rightArmJoint.rotation.z = Math.sin(t * 0.8 + PI) * 0.15;
        }
        if (robot.antTip) {
          robot.antTip.material.color.setHSL(0.95, 1, 0.5 + Math.sin(t * 4) * 0.3);
        }
        break;

      case 'mech':
        if (robot.leftArm) {
          robot.leftArm.armJoint.rotation.x = Math.sin(t * 0.4) * 0.08;
          robot.rightArm.armJoint.rotation.x = Math.sin(t * 0.4 + 1) * 0.08;
          robot.leftArm.elbowJoint.rotation.x = -0.15 + Math.sin(t * 0.6) * 0.05;
          robot.rightArm.elbowJoint.rotation.x = -0.15 + Math.sin(t * 0.6 + 1) * 0.05;
        }
        if (robot.visor) {
          robot.visor.material.opacity = 0.6 + (0.5 + Math.sin(t * 2) * 0.15 + curHover * 0.35) * 0.3;
        }
        if (robot.leftLeg) {
          robot.leftLeg.legJoint.rotation.x = Math.sin(t * 0.6) * 0.06;
          robot.rightLeg.legJoint.rotation.x = Math.sin(t * 0.6 + PI) * 0.06;
        }
        break;

      case 'retro':
        if (robot.rightArmJoint) {
          robot.rightArmJoint.rotation.z = -0.3 + Math.sin(t * 1.5) * 0.4;
          robot.leftArmJoint.rotation.z = 0.1 + Math.sin(t * 0.5) * 0.05;
        }
        if (robot.leftLegJoint) {
          robot.leftLegJoint.rotation.x = Math.sin(t * 0.8) * 0.1;
          robot.rightLegJoint.rotation.x = Math.sin(t * 0.8 + PI) * 0.1;
        }
        break;

      case 'drone':
        robot.root.rotation.y = t * 0.3;
        if (robot.legs) {
          robot.legs.forEach((leg, i) => {
            const phase = (i / robot.legs.length) * PI * 2;
            leg.kneeJoint.rotation.z = -0.8 + Math.sin(t * 1.2 + phase) * 0.15;
            leg.legJoint.rotation.z = 0.6 + Math.sin(t * 0.8 + phase) * 0.1;
          });
        }
        if (robot.eyeLens) {
          robot.eyeLens.position.x = Math.sin(t * 0.7) * 0.03;
          robot.eyeLens.position.y = 0.05 + Math.cos(t * 0.5) * 0.02;
        }
        if (robot.sensorLight) {
          robot.sensorLight.material.color.setHSL(0.4, 1.0, 0.3 + Math.sin(t * 5) * 0.5);
        }
        break;
    }

    // Hover: speed up rotation
    if (curHover > 0.01 && style !== 'drone') {
      robot.root.rotation.y += curHover * 0.5 * dt;
    }

    // Update shader time
    robot.shaderMats.forEach(m => {
      m.uniforms.uTime.value = t;
      m.uniforms.uHover.value += ((hover ? 1 : 0) - m.uniforms.uHover.value) * 0.08;
    });
  };
}

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.autoClear = false;
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';

renderer.domElement.style.height = '100%';

// Each card still holds its own mini scene and camera
function createMiniScene(el, config) {
  const w = el.clientWidth, h = el.clientHeight;
  if (w === 0 || h === 0) return null;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, w / h, 0.1, 100);

  // Lighting
  scene.add(new THREE.AmbientLight(0x1a1030, 0.5));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(5, 8, 6);
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-3, 4, -2);
  scene.add(fill);

  const group = new THREE.Group();
  scene.add(group);

  let animFn = null;
  let shaderMats = []; // track shader materials for uTime/uHover updates
  const sceneType = config.scene || config.type;

  // ── Block builder (for legacy scenes) ──
  function addBlock(x, y, z, color, s = 0.45) {
    const geo = new THREE.BoxGeometry(s, s, s);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.05 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x * s, z * s, y * s);
    mesh.castShadow = true;
    group.add(mesh);
    return mesh;
  }

  // ═══════ NEW: 3D Shape with shader material ═══════
  if (sceneType === '3d-shape') {
    camera.position.set(0, 0, 3.5);
    camera.lookAt(0, 0, 0);
    const geoFn = SHAPE_CREATORS[config.shape];
    if (!geoFn) return null;
    const geo = geoFn();
    const mat = createEditorMaterial(config.palette || 'nebula');
    shaderMats.push(mat);
    const mesh = new THREE.Mesh(geo, mat);
    group.add(mesh);

    // Particles surrounding the shape — color matched to palette rim
    const pal = PALETTES[config.palette] || PALETTES.nebula;
    const particleCount = 60;
    const pGeo = new THREE.BufferGeometry();
    const pPositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const r = 1.2 + Math.random() * 0.8;
      pPositions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      pPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      pPositions[i*3+2] = r * Math.cos(phi);
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    const rimCol = new THREE.Color(pal.rim1[0], pal.rim1[1], pal.rim1[2]);
    const pMat = new THREE.PointsMaterial({
      color: rimCol, size: 0.02, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const particles = new THREE.Points(pGeo, pMat);
    group.add(particles);

    // Smooth rotation state
    let rotY = 0, lastT = 0, curScale = 1.0;
    animFn = (t, hover) => {
      const dt = Math.min(t - lastT, 0.05); // clamp to avoid jumps
      lastT = t;
      const speed = hover ? 0.8 : 0.2;
      rotY += speed * dt;
      group.rotation.y = rotY;
      group.rotation.x = Math.sin(t * 0.3) * 0.15;
      // Smooth scale interpolation
      const targetScale = hover ? 1.08 : 1.0;
      curScale += (targetScale - curScale) * 0.08;
      mesh.scale.setScalar(curScale);
      particles.rotation.y = -t * 0.1;
    };
  }

  // ═══════ Robot card ═══════
  else if (sceneType === '3d-robot') {
    const camY = config.robotStyle === 'drone' ? 0.5 : 0.2;
    const camZ = config.robotStyle === 'drone' ? 3.2 : 3.5;
    camera.position.set(0, camY, camZ);
    camera.lookAt(0, 0, 0);

    const robot = createRobot(config.robotStyle, config.palette);
    group.add(robot.root);
    shaderMats.push(...robot.shaderMats);

    const robotAnim = createRobotAnimFn(robot, config.robotStyle);
    animFn = (t, hover) => robotAnim(t, hover);
  }

  else if (sceneType === 'wave') {
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);
    const spheres = [];
    const sg = new THREE.SphereGeometry(0.15, 16, 16);
    for (let x = -5; x <= 5; x++) {
      for (let z = -3; z <= 3; z++) {
        const mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.55 + x * 0.02, 0.7, 0.5),
          roughness: 0.3, metalness: 0.2
        });
        const s = new THREE.Mesh(sg, mat);
        s.position.set(x * 0.4, 0, z * 0.4);
        s.userData = { ox: x, oz: z };
        group.add(s);
        spheres.push(s);
      }
    }
    animFn = (t, hover) => {
      spheres.forEach(s => {
        const { ox, oz } = s.userData;
        s.position.y = Math.sin(t * (hover ? 2 : 0.8) + ox * 0.5 + oz * 0.3) * 0.3;
      });
      group.rotation.y = t * 0.1;
    };
  }

  else if (sceneType === 'diamond') {
    camera.position.set(0, 0, 4);
    camera.lookAt(0, 0, 0);
    const geo = new THREE.OctahedronGeometry(0.85, 2);

    // Premium diamond shader with refraction-like effect
    const diamondMat = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      transparent: true,
      uniforms: {
        uTime: { value: 0 },
        uHover: { value: 0 },
      },
      vertexShader: `
        varying vec3 vNormal, vViewPos, vWorldPos, vPos;
        void main(){
          vNormal = normalize(normalMatrix * normal);
          vPos = position;
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vViewPos = -mv.xyz;
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform float uTime, uHover;
        varying vec3 vNormal, vViewPos, vWorldPos, vPos;

        vec3 cosPal(float t, vec3 a, vec3 b, vec3 c, vec3 d){
          return a + b * cos(6.283185 * (c * t + d));
        }

        void main(){
          vec3 N = normalize(vNormal);
          vec3 V = normalize(vViewPos);
          float fres = pow(1.0 - max(dot(V, N), 0.0), 3.0);

          // Rainbow refraction based on view angle and position
          float rainbowT = dot(N, V) * 0.5 + vPos.y * 0.3 + uTime * 0.08;
          vec3 rainbow = cosPal(rainbowT,
            vec3(0.5, 0.5, 0.5), vec3(0.5, 0.5, 0.5),
            vec3(1.0, 1.0, 1.0), vec3(0.0, 0.33, 0.67));

          // Base ice-blue diamond color
          vec3 base = mix(vec3(0.7, 0.75, 0.9), vec3(0.9, 0.92, 1.0), fres);

          // Specular highlights — two light sources
          vec3 L1 = normalize(vec3(0.5, 0.8, 0.6));
          vec3 L2 = normalize(vec3(-0.6, 0.3, 0.5));
          vec3 H1 = normalize(V + L1);
          vec3 H2 = normalize(V + L2);
          float spec1 = pow(max(dot(N, H1), 0.0), 120.0) * 1.2;
          float spec2 = pow(max(dot(N, H2), 0.0), 80.0) * 0.8;
          float specSoft = pow(max(dot(N, H1), 0.0), 12.0) * 0.15;

          // Facet sparkle — sharp highlights that flash as it rotates
          float facetFlash = pow(max(dot(N, normalize(vec3(
            sin(uTime * 1.3), cos(uTime * 0.9), sin(uTime * 0.7)
          ))), 0.0), 60.0) * 0.8;

          // Combine
          vec3 col = base;
          col = mix(col, rainbow, 0.3 + fres * 0.3);  // rainbow refraction
          col += vec3(1.0, 0.98, 0.95) * (spec1 + spec2 + specSoft + facetFlash);
          col += vec3(0.6, 0.7, 1.0) * fres * 0.5;     // rim glow

          // Hover boost
          col += rainbow * uHover * 0.2;

          float alpha = 0.65 + fres * 0.3 + (spec1 + facetFlash) * 0.3;
          gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
        }
      `
    });
    shaderMats.push(diamondMat);
    const diamond = new THREE.Mesh(geo, diamondMat);
    group.add(diamond);

    // Faint wireframe overlay for facet definition
    const wireMat = new THREE.ShaderMaterial({
      wireframe: true, transparent: true,
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        varying vec3 vPos;
        void main(){
          vPos = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        varying vec3 vPos;
        void main(){
          float pulse = 0.15 + 0.1 * sin(uTime * 1.5 + vPos.y * 4.0);
          gl_FragColor = vec4(0.6, 0.65, 0.85, pulse);
        }
      `
    });
    const wire = new THREE.Mesh(geo, wireMat);
    wire.scale.setScalar(1.002);
    group.add(wire);

    // Sparkle particles around diamond
    const spCount = 30;
    const spGeo = new THREE.BufferGeometry();
    const spPos = new Float32Array(spCount * 3);
    for (let i = 0; i < spCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const r = 1.0 + Math.random() * 0.5;
      spPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      spPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      spPos[i*3+2] = r * Math.cos(phi);
    }
    spGeo.setAttribute('position', new THREE.BufferAttribute(spPos, 3));
    const spMat = new THREE.PointsMaterial({
      color: 0xddeeff, size: 0.025, transparent: true, opacity: 0.5,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const sparkles = new THREE.Points(spGeo, spMat);
    group.add(sparkles);

    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 0.8 : 0.25);
      group.rotation.x = Math.sin(t * 0.5) * 0.15;
      wireMat.uniforms.uTime.value = t;
      sparkles.rotation.y = -t * 0.15;
      spMat.opacity = 0.3 + Math.sin(t * 3) * 0.15;
    };
  }

  else if (sceneType === 'nature') {
    // Floating crystal garden island
    camera.position.set(0, 1.5, 4.5);
    camera.lookAt(0, 0.2, 0);

    // Floating island base — a faceted rock chunk
    const islandGeo = new THREE.DodecahedronGeometry(1.2, 1);
    // Squash vertically and randomise vertices for organic feel
    const islandPos = islandGeo.attributes.position;
    for (let i = 0; i < islandPos.count; i++) {
      const y = islandPos.getY(i);
      islandPos.setY(i, y * 0.35);
      islandPos.setX(i, islandPos.getX(i) + (Math.random() - 0.5) * 0.08);
      islandPos.setZ(i, islandPos.getZ(i) + (Math.random() - 0.5) * 0.08);
    }
    islandGeo.computeVertexNormals();
    const islandMat = new THREE.MeshStandardMaterial({ color: 0x2a3a2a, roughness: 0.85, metalness: 0.05 });
    const island = new THREE.Mesh(islandGeo, islandMat);
    island.position.y = -0.1;
    group.add(island);

    // Glowing moss top layer
    const mossGeo = new THREE.DodecahedronGeometry(1.22, 1);
    const mossPos = mossGeo.attributes.position;
    for (let i = 0; i < mossPos.count; i++) {
      const y = mossPos.getY(i);
      if (y < 0) { mossPos.setY(i, y * 0.3 - 0.15); }
      else { mossPos.setY(i, y * 0.12 + 0.05); }
      mossPos.setX(i, mossPos.getX(i) + (Math.random() - 0.5) * 0.06);
      mossPos.setZ(i, mossPos.getZ(i) + (Math.random() - 0.5) * 0.06);
    }
    mossGeo.computeVertexNormals();
    const mossMat = new THREE.MeshStandardMaterial({ color: 0x3a6b3a, roughness: 0.9, emissive: 0x0a2a0a, emissiveIntensity: 0.3 });
    const moss = new THREE.Mesh(mossGeo, mossMat);
    moss.position.y = 0.1;
    group.add(moss);

    // Crystal spires growing from the island
    const crystalMat = createEditorMaterial('aurora');
    shaderMats.push(crystalMat);
    const crystals = [];
    const crystalData = [
      { x: 0, z: 0, h: 1.1, r: 0.12, ry: 0 },
      { x: 0.35, z: 0.2, h: 0.7, r: 0.08, ry: 0.3 },
      { x: -0.3, z: 0.15, h: 0.85, r: 0.10, ry: -0.4 },
      { x: 0.15, z: -0.3, h: 0.6, r: 0.07, ry: 0.6 },
      { x: -0.2, z: -0.25, h: 0.5, r: 0.06, ry: -0.2 },
      { x: 0.5, z: -0.1, h: 0.45, r: 0.06, ry: 0.8 },
      { x: -0.5, z: -0.1, h: 0.55, r: 0.07, ry: -0.6 },
    ];
    crystalData.forEach(cd => {
      const cGeo = new THREE.ConeGeometry(cd.r, cd.h, 6, 1);
      const crystal = new THREE.Mesh(cGeo, crystalMat);
      crystal.position.set(cd.x, 0.15 + cd.h / 2, cd.z);
      crystal.rotation.y = cd.ry;
      crystal.rotation.x = (Math.random() - 0.5) * 0.15;
      crystal.rotation.z = (Math.random() - 0.5) * 0.15;
      group.add(crystal);
      crystals.push(crystal);
    });

    // Firefly particles floating around
    const ffCount = 40;
    const ffGeo = new THREE.BufferGeometry();
    const ffPos = new Float32Array(ffCount * 3);
    for (let i = 0; i < ffCount; i++) {
      ffPos[i*3]   = (Math.random() - 0.5) * 2.5;
      ffPos[i*3+1] = 0.2 + Math.random() * 1.5;
      ffPos[i*3+2] = (Math.random() - 0.5) * 2.5;
    }
    ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));
    const ffMat = new THREE.PointsMaterial({
      color: 0x88ffaa, size: 0.03, transparent: true, opacity: 0.6,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const fireflies = new THREE.Points(ffGeo, ffMat);
    group.add(fireflies);

    // Subtle underglow
    const underglow = new THREE.PointLight(0x33aa66, 0.5, 3);
    underglow.position.set(0, -0.3, 0);
    scene.add(underglow);

    let floatPhase = 0;
    animFn = (t, hover) => {
      floatPhase = t;
      // Whole island gently bobs
      group.position.y = Math.sin(t * 0.6) * 0.08;
      group.rotation.y = t * (hover ? 0.25 : 0.08);
      // Crystals gently pulse scale
      crystals.forEach((cr, ci) => {
        cr.scale.y = 1.0 + Math.sin(t * 1.2 + ci * 1.5) * 0.05;
      });
      // Fireflies drift
      const positions = ffGeo.attributes.position.array;
      for (let i = 0; i < ffCount; i++) {
        positions[i*3+1] += Math.sin(t * 0.8 + i) * 0.002;
        positions[i*3]   += Math.cos(t * 0.5 + i * 0.7) * 0.001;
      }
      ffGeo.attributes.position.needsUpdate = true;
      ffMat.opacity = 0.4 + Math.sin(t * 2) * 0.2;
    };
  }

  else if (sceneType === 'abstract') {
    camera.position.set(0, 0, 4.5);
    camera.lookAt(0, 0, 0);

    // Abstract shader shapes with unique per-shape color offsets
    const abstractPalettes = ['nebula', 'coral', 'hologram', 'sunset', 'aurora'];
    const abstractGeos = [
      new THREE.TorusGeometry(0.28, 0.1, 32, 64),
      new THREE.IcosahedronGeometry(0.25, 1),
      new THREE.OctahedronGeometry(0.22, 0),
      new THREE.TorusKnotGeometry(0.2, 0.07, 64, 16, 2, 3),
      new THREE.DodecahedronGeometry(0.2, 0),
    ];
    const shapes = [];
    const positions = [
      { x: 0, y: 0, z: 0 },
      { x: -0.9, y: 0.6, z: -0.3 },
      { x: 0.85, y: -0.5, z: -0.2 },
      { x: -0.7, y: -0.55, z: 0.1 },
      { x: 0.8, y: 0.55, z: -0.1 },
    ];
    abstractGeos.forEach((geo, i) => {
      const mat = createEditorMaterial(abstractPalettes[i]);
      shaderMats.push(mat);
      const m = new THREE.Mesh(geo, mat);
      m.position.set(positions[i].x, positions[i].y, positions[i].z);
      m.userData.speed = 0.4 + i * 0.15;
      m.userData.orbitR = i === 0 ? 0 : 0.6 + i * 0.15;
      m.userData.orbitSpeed = 0.15 + i * 0.05;
      m.userData.baseAngle = (i / 5) * Math.PI * 2;
      group.add(m);
      shapes.push(m);
    });

    animFn = (t, hover) => {
      const speedMul = hover ? 2.0 : 1.0;
      shapes.forEach((s, i) => {
        s.rotation.x = t * s.userData.speed * speedMul;
        s.rotation.y = t * s.userData.speed * 0.6 * speedMul;
        // Orbiting motion for non-center pieces
        if (i > 0) {
          const angle = s.userData.baseAngle + t * s.userData.orbitSpeed * speedMul;
          const r = s.userData.orbitR;
          s.position.x = Math.cos(angle) * r;
          s.position.y = Math.sin(angle) * r * 0.7;
          s.position.z = Math.sin(angle * 0.5) * 0.2;
        }
      });
      group.rotation.y = t * 0.05;
    };
  }

  // ═══════ Floating Architecture — geometric monument ═══════
  else if (sceneType === 'architecture') {
    camera.position.set(0, 1, 5);
    camera.lookAt(0, 0.5, 0);

    // Monumental base platform
    const baseMat = createEditorMaterial('stone');
    shaderMats.push(baseMat);
    const baseGeo = new THREE.BoxGeometry(2.0, 0.15, 2.0, 2, 1, 2);
    const basePlat = new THREE.Mesh(baseGeo, baseMat);
    basePlat.position.y = -0.3;
    group.add(basePlat);

    // Central tower — stacked tapered boxes
    const towerMat = createEditorMaterial('porcelain');
    shaderMats.push(towerMat);
    const towerPieces = [];
    const towerLevels = [
      { w: 0.6, h: 0.5, d: 0.6, y: 0.0 },
      { w: 0.5, h: 0.6, d: 0.5, y: 0.55 },
      { w: 0.38, h: 0.5, d: 0.38, y: 1.1 },
      { w: 0.25, h: 0.4, d: 0.25, y: 1.55 },
    ];
    towerLevels.forEach(lv => {
      const geo = new THREE.BoxGeometry(lv.w, lv.h, lv.d, 2, 2, 2);
      const m = new THREE.Mesh(geo, towerMat);
      m.position.y = lv.y;
      group.add(m);
      towerPieces.push(m);
    });

    // Floating side pylons — smaller angled columns
    const pylonMat = createEditorMaterial('ocean');
    shaderMats.push(pylonMat);
    const pylons = [];
    const pylonData = [
      { x: -0.8, z: 0, h: 0.9, ry: 0.2, rz: 0.15 },
      { x: 0.8, z: 0, h: 0.85, ry: -0.2, rz: -0.15 },
      { x: 0, z: -0.8, h: 0.7, ry: 0.4, rz: 0 },
      { x: 0, z: 0.8, h: 0.75, ry: -0.3, rz: 0 },
    ];
    pylonData.forEach(pd => {
      const geo = new THREE.CylinderGeometry(0.06, 0.1, pd.h, 6);
      const m = new THREE.Mesh(geo, pylonMat);
      m.position.set(pd.x, pd.h * 0.4, pd.z);
      m.rotation.set(0, pd.ry, pd.rz);
      group.add(m);
      pylons.push(m);
    });

    // Floating orb at the top
    const orbMat = createEditorMaterial('hologram');
    shaderMats.push(orbMat);
    const orbGeo = new THREE.IcosahedronGeometry(0.15, 2);
    const orb = new THREE.Mesh(orbGeo, orbMat);
    orb.position.y = 2.0;
    group.add(orb);

    // Ring around the monument
    const ringMat = createEditorMaterial('nebula');
    shaderMats.push(ringMat);
    const ringGeo = new THREE.TorusGeometry(1.0, 0.025, 16, 64);
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = 0.8;
    ring.rotation.x = PI / 2;
    group.add(ring);

    // Dust particles
    const dustCount = 50;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      dustPos[i*3]   = (Math.random() - 0.5) * 3;
      dustPos[i*3+1] = Math.random() * 2.5;
      dustPos[i*3+2] = (Math.random() - 0.5) * 3;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({
      color: 0x8899bb, size: 0.02, transparent: true, opacity: 0.35,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    group.add(new THREE.Points(dustGeo, dustMat));

    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 0.2 : 0.06);
      // Floating orb bobs
      orb.position.y = 2.0 + Math.sin(t * 1.2) * 0.1;
      orb.rotation.y = t * 1.5;
      // Ring rotates slowly
      ring.rotation.z = t * 0.3;
      // Pylons gently float
      pylons.forEach((p, i) => {
        p.position.y = pylonData[i].h * 0.4 + Math.sin(t * 0.8 + i * 1.5) * 0.05;
      });
    };
  }

  // ═══════ Crystal Cluster — elongated octahedrons with aurora palette ═══════
  else if (sceneType === 'crystal') {
    camera.position.set(0, 0.5, 4);
    camera.lookAt(0, 0.2, 0);

    // Crystal cluster: multiple elongated octahedrons
    const clusterMat = createEditorMaterial('aurora');
    shaderMats.push(clusterMat);
    const crystalShards = [];
    const shardData = [
      // x, z, height-scale, radius, tilt-x, tilt-z, y-offset
      { x: 0, z: 0, sy: 2.5, s: 0.18, rx: 0, rz: 0, yo: 0 },
      { x: 0.3, z: 0.15, sy: 1.8, s: 0.13, rx: 0.2, rz: -0.15, yo: -0.1 },
      { x: -0.25, z: 0.2, sy: 2.0, s: 0.14, rx: -0.15, rz: 0.2, yo: -0.05 },
      { x: 0.15, z: -0.25, sy: 1.5, s: 0.11, rx: 0.1, rz: 0.25, yo: -0.15 },
      { x: -0.35, z: -0.1, sy: 1.7, s: 0.12, rx: -0.25, rz: -0.1, yo: -0.1 },
      { x: 0.4, z: -0.05, sy: 1.3, s: 0.10, rx: 0.3, rz: 0.1, yo: -0.2 },
      { x: -0.1, z: -0.35, sy: 1.4, s: 0.10, rx: 0.05, rz: -0.3, yo: -0.18 },
      { x: 0.2, z: 0.35, sy: 1.1, s: 0.09, rx: -0.2, rz: 0.15, yo: -0.22 },
      { x: -0.4, z: 0.3, sy: 1.0, s: 0.08, rx: 0.15, rz: -0.2, yo: -0.25 },
    ];
    shardData.forEach(sd => {
      const geo = new THREE.OctahedronGeometry(sd.s, 0);
      // Elongate vertically
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.setY(i, pos.getY(i) * sd.sy);
      }
      geo.computeVertexNormals();
      const shard = new THREE.Mesh(geo, clusterMat);
      shard.position.set(sd.x, sd.yo + sd.s * sd.sy * 0.5, sd.z);
      shard.rotation.set(sd.rx, 0, sd.rz);
      group.add(shard);
      crystalShards.push(shard);
    });

    // Base rock
    const rockGeo = new THREE.DodecahedronGeometry(0.6, 1);
    const rockPos = rockGeo.attributes.position;
    for (let i = 0; i < rockPos.count; i++) {
      rockPos.setY(i, rockPos.getY(i) * 0.3);
      rockPos.setX(i, rockPos.getX(i) + (Math.random() - 0.5) * 0.05);
      rockPos.setZ(i, rockPos.getZ(i) + (Math.random() - 0.5) * 0.05);
    }
    rockGeo.computeVertexNormals();
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x1a2030, roughness: 0.9, metalness: 0.05 });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.y = -0.35;
    group.add(rock);

    // Aurora-colored ambient particles
    const apCount = 60;
    const apGeo = new THREE.BufferGeometry();
    const apPos = new Float32Array(apCount * 3);
    for (let i = 0; i < apCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const r = 0.6 + Math.random() * 1.2;
      apPos[i*3]   = Math.cos(theta) * r;
      apPos[i*3+1] = -0.2 + Math.random() * 2.0;
      apPos[i*3+2] = Math.sin(theta) * r;
    }
    apGeo.setAttribute('position', new THREE.BufferAttribute(apPos, 3));
    const apMat = new THREE.PointsMaterial({
      color: 0x55ffbb, size: 0.025, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const auroraParticles = new THREE.Points(apGeo, apMat);
    group.add(auroraParticles);

    // Point light for inner glow
    const innerGlow = new THREE.PointLight(0x44ddaa, 0.6, 3);
    innerGlow.position.set(0, 0.5, 0);
    scene.add(innerGlow);

    animFn = (t, hover) => {
      group.rotation.y = t * (hover ? 0.3 : 0.1);
      // Crystals gently pulse
      crystalShards.forEach((sh, i) => {
        const phase = t * 1.0 + i * 0.8;
        sh.scale.y = 1.0 + Math.sin(phase) * 0.04;
        sh.scale.x = 1.0 + Math.sin(phase + 1) * 0.02;
        sh.scale.z = 1.0 + Math.sin(phase + 2) * 0.02;
      });
      // Particles drift upward
      const positions = apGeo.attributes.position.array;
      for (let i = 0; i < apCount; i++) {
        positions[i*3+1] += 0.002;
        if (positions[i*3+1] > 2.0) positions[i*3+1] = -0.2;
      }
      apGeo.attributes.position.needsUpdate = true;
      // Inner glow pulses
      innerGlow.intensity = 0.5 + Math.sin(t * 1.5) * 0.2;
      apMat.opacity = 0.3 + Math.sin(t * 2) * 0.15;
      auroraParticles.rotation.y = -t * 0.08;
    };
  }

  else if (sceneType === 'glow') {
    camera.position.set(0, 0, 4);
    camera.lookAt(0, 0, 0);
    const geo = new THREE.TorusKnotGeometry(0.6, 0.2, 100, 16);
    const mat = createEditorMaterial('nebula');
    shaderMats.push(mat);
    const knot = new THREE.Mesh(geo, mat);
    group.add(knot);
    const point = new THREE.PointLight(0xa78bfa, 1, 5);
    point.position.set(0, 0, 2);
    scene.add(point);
    animFn = (t, hover) => {
      knot.rotation.x = t * (hover ? 0.8 : 0.2);
      knot.rotation.y = t * (hover ? 1.2 : 0.3);
    };
  }

  else if (sceneType === '3d-map') {
    camera.position.set(0, 3, 3);
    camera.lookAt(0, 0, 0);
    const gnd = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 4),
      new THREE.MeshStandardMaterial({ color: 0x1a2a1a, roughness: 0.95 })
    );
    gnd.rotation.x = -PI / 2;
    group.add(gnd);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.8 });
    [[0, 0.01, 0, 6, 0.02, 0.15], [0, 0.01, 0.5, 0.15, 0.02, 4],
     [-1, 0.01, -0.5, 3, 0.02, 0.1], [1.2, 0.01, 0.8, 0.1, 0.02, 2]].forEach(([x,y,z,w,h,d]) => {
      const r = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), roadMat);
      r.position.set(x,y,z);
      group.add(r);
    });
    const bldgMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.7, metalness: 0.1 });
    for (let i = 0; i < 6; i++) {
      const bh = 0.1 + Math.random() * 0.25;
      const bw = 0.2 + Math.random() * 0.2;
      const bd = 0.2 + Math.random() * 0.15;
      const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bldgMat);
      b.position.set((Math.random()-0.5)*3, bh/2, (Math.random()-0.5)*2);
      group.add(b);
    }
    const pin = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xcc0000, emissiveIntensity: 0.5 })
    );
    pin.position.set(0, 0.4, 0);
    group.add(pin);
    const pinStick = new THREE.Mesh(
      new THREE.CylinderGeometry(0.015, 0.015, 0.35),
      new THREE.MeshStandardMaterial({ color: 0xef4444 })
    );
    pinStick.position.set(0, 0.2, 0);
    group.add(pinStick);
    animFn = (t, hover) => {
      pin.position.y = 0.4 + Math.sin(t * 2) * 0.05;
      group.rotation.y = Math.sin(t * 0.2) * 0.08 + (hover ? t * 0.15 : 0);
    };
  }

  return { scene, camera, group, animFn, shaderMats, el, hover: false, visible: false };
}


// ═══════════════════════════════════════════════════════════
// INIT SCENES + INTERSECTION OBSERVER
// ═══════════════════════════════════════════════════════════
const liveScenes = [];

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const s = liveScenes.find(s => s.el === e.target);
    if (s) s.visible = e.isIntersecting;
  });
}, { rootMargin: '200px' });

scenePending.forEach(({ el, config }) => {
  const s = createMiniScene(el, config);
  if (s) {
    s.visible = true;
    liveScenes.push(s);
    observer.observe(el);

    // Hover tracking
    const card = el.closest('.card');
    card.addEventListener('mouseenter', () => s.hover = true);
    card.addEventListener('mouseleave', () => s.hover = false);
  }
});


// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP — single shared renderer with scissor
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();
const canvas = renderer.domElement;

function updateRendererSize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  if (canvas.width !== w * renderer.getPixelRatio() || canvas.height !== h * renderer.getPixelRatio()) {
    renderer.setSize(w, h);
  }
}

function animate() {
  requestAnimationFrame(animate);
  updateRendererSize();

  const t = clock.getElapsedTime();
  const canvasRect = canvas.getBoundingClientRect();

  // Clear entire canvas first with transparent
  renderer.setScissorTest(false);
  renderer.setClearColor(0x000000, 0);
  renderer.clear();
  renderer.setScissorTest(true);

  let anyRendered = false;

  liveScenes.forEach(s => {
    if (!s.visible) return;

    // Get the element's bounding rect relative to canvas
    const rect = s.el.getBoundingClientRect();

    // Check if rect is within viewport
    if (rect.bottom < canvasRect.top || rect.top > canvasRect.bottom ||
        rect.right < canvasRect.left || rect.left > canvasRect.right) {
      return;
    }

    const width  = rect.right - rect.left;
    const height = rect.bottom - rect.top;
    if (width <= 0 || height <= 0) return;

    // Convert to canvas pixel coordinates (bottom-left origin for WebGL)
    const left   = rect.left - canvasRect.left;
    const bottom = canvasRect.bottom - rect.bottom;

    // Update camera aspect
    s.camera.aspect = width / height;
    s.camera.updateProjectionMatrix();

    // Update shader uniforms
    s.shaderMats.forEach(mat => {
      mat.uniforms.uTime.value = t;
      mat.uniforms.uHover.value += ((s.hover ? 1 : 0) - mat.uniforms.uHover.value) * 0.08;
    });

    // Run animation function
    if (s.animFn) s.animFn(t, s.hover);

    // Set viewport & scissor
    renderer.setViewport(left, bottom, width, height);
    renderer.setScissor(left, bottom, width, height);

    renderer.render(s.scene, s.camera);
    anyRendered = true;
  });

  renderer.setScissorTest(false);
}
animate();


// ═══════════════════════════════════════════════════════════
// PILLS
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(q => q.classList.remove('on'));
    p.classList.add('on');
  });
});
</script>
