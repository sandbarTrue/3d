<!DOCTYPE html>
<!--
  showcase-particles.html
  规范依据: CloudAI-X/threejs-skills
    · threejs-fundamentals  — renderer / animation loop / resize
    · threejs-geometry       — BufferGeometry + attributes
    · threejs-shaders        — ShaderMaterial with built-in uniforms, gl_PointSize, circular point via smoothstep
    · threejs-postprocessing — UnrealBloomPass (composer.render)
  注意: 不修改老页面。
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Stardust — 3D Lab Showcase</title>
<style>
  html,body{margin:0;padding:0;background:#050408;color:#eaeaf2;font-family:'Space Grotesk','Helvetica Neue',sans-serif;overflow:hidden;height:100%}
  canvas{display:block}
  .overlay{position:fixed;top:20px;left:20px;z-index:10;max-width:360px}
  .overlay h1{margin:0 0 8px;font-size:20px;font-weight:600;letter-spacing:-0.01em}
  .overlay p{margin:0;font-size:13px;line-height:1.55;color:#a9a6bb}
  .overlay .tag{display:inline-block;margin-top:10px;padding:3px 8px;font-size:11px;color:#8ed4ff;border:1px solid rgba(142,212,255,0.3);border-radius:3px}
  .back{position:fixed;top:20px;right:20px;z-index:10;color:#a9a6bb;text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid rgba(255,255,255,0.12);border-radius:3px}
  .back:hover{color:#eaeaf2;border-color:rgba(255,255,255,0.3)}
  .controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:14px;padding:10px 14px;background:rgba(15,12,24,0.7);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:4px;font-size:12px;color:#a9a6bb}
  .controls label{display:flex;align-items:center;gap:6px}
  .controls input[type=range]{width:90px;accent-color:#8ed4ff}
</style>
</head>
<body>
<div class="overlay">
  <h1>Stardust Field</h1>
  <p>12,000 points via <code>BufferGeometry</code> + <code>ShaderMaterial</code>. Fragment computes circular alpha via <code>smoothstep(length(gl_PointCoord-.5))</code>. Heavy bloom simulates additive glow.</p>
  <span class="tag">threejs-geometry · shaders · postprocessing</span>
</div>
<a class="back" href="showcase-2d.html">← Lab</a>
<div class="controls">
  <label>Spin <input type="range" id="spin" min="0" max="100" value="30"></label>
  <label>Bloom <input type="range" id="bloom" min="0" max="400" value="220"></label>
  <label>Size <input type="range" id="size" min="10" max="100" value="40"></label>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.164.1/build/three.module.js","three/addons/":"https://unpkg.com/three@0.164.1/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ---------- Scene / Camera / Renderer ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050408);
scene.fog = new THREE.FogExp2(0x050408, 0.04);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* ---------- Particle BufferGeometry ---------- */
const COUNT = 12000;
const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);
const seeds = new Float32Array(COUNT);

for (let i = 0; i < COUNT; i++) {
  // layered galaxy: 60% thin disk, 40% halo
  const disk = Math.random() < 0.6;
  const r = disk ? Math.pow(Math.random(), 0.6) * 8 : Math.random() * 14;
  const theta = Math.random() * Math.PI * 2;
  const y = disk ? (Math.random() - 0.5) * 0.6 : (Math.random() - 0.5) * 10;
  positions[i * 3 + 0] = Math.cos(theta) * r;
  positions[i * 3 + 1] = y;
  positions[i * 3 + 2] = Math.sin(theta) * r;

  // color: inner warm, outer cool
  const t = r / 14;
  const c = new THREE.Color().setHSL(0.62 - t * 0.35, 0.75, 0.55 + Math.random() * 0.25);
  colors[i * 3 + 0] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
  seeds[i] = Math.random();
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geo.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));

/* ---------- ShaderMaterial (threejs-shaders §uniforms, §gl_PointSize) ---------- */
const uniforms = {
  uTime: { value: 0 },
  uSize: { value: 40 },
  uPixelRatio: { value: Math.min(devicePixelRatio, 2) },
};
const mat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: `
    uniform float uTime;
    uniform float uSize;
    uniform float uPixelRatio;
    attribute float aSeed;
    varying vec3 vColor;
    varying float vTwinkle;
    void main(){
      vColor = color;
      vec3 p = position;
      float wobble = sin(uTime * 0.6 + aSeed * 6.28) * 0.1;
      p.y += wobble;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_Position = projectionMatrix * mv;
      gl_PointSize = uSize * uPixelRatio * (1.0 + aSeed * 0.6) / -mv.z;
      vTwinkle = 0.6 + 0.4 * sin(uTime * 2.0 + aSeed * 10.0);
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vTwinkle;
    void main(){
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      float core = smoothstep(0.5, 0.0, d);
      float halo = smoothstep(0.5, 0.15, d) * 0.4;
      float alpha = (core + halo) * vTwinkle;
      if (alpha < 0.01) discard;
      gl_FragColor = vec4(vColor * (0.8 + core * 0.6), alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

const points = new THREE.Points(geo, mat);
scene.add(points);

/* ---------- Post-processing ---------- */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  2.2,   // strength (heavy for stardust glow)
  0.8,   // radius
  0.1    // threshold (low so almost everything glows)
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ---------- Pointer parallax ---------- */
const pointer = new THREE.Vector2();
addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / innerWidth - 0.5) * 2;
  pointer.y = (e.clientY / innerHeight - 0.5) * 2;
});

/* ---------- Resize ---------- */
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  uniforms.uPixelRatio.value = Math.min(devicePixelRatio, 2);
});

/* ---------- UI wiring ---------- */
let spinSpeed = 0.3;
document.getElementById('spin').addEventListener('input', (e) => { spinSpeed = e.target.value / 100; });
document.getElementById('bloom').addEventListener('input', (e) => { bloom.strength = e.target.value / 100; });
document.getElementById('size').addEventListener('input', (e) => { uniforms.uSize.value = parseFloat(e.target.value); });

/* ---------- Loop ---------- */
const clock = new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  uniforms.uTime.value = clock.getElapsedTime();
  points.rotation.y += 0.0008 * spinSpeed * 10;
  // gentle camera parallax (lerp, no scrollIntoView)
  camera.position.x += (pointer.x * 1.2 - camera.position.x) * 0.04;
  camera.position.y += (-pointer.y * 0.8 - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);
  composer.render();
}
tick();
</script>
</body>
</html>
