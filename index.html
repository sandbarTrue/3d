<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Lab</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#0a0a12;font-family:system-ui,sans-serif;color:#fff}
  canvas{display:block;width:100vw;height:100vh}
  #loader{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:#0a0a12;transition:opacity 1s ease}
  #loader.done{opacity:0;pointer-events:none}
  .dot{width:6px;height:6px;background:#a78bfa;border-radius:50%;margin:0 4px;animation:bounce .6s ease infinite}
  .dot:nth-child(2){animation-delay:.1s}.dot:nth-child(3){animation-delay:.2s}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>
<div id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<canvas id="c"></canvas>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.164.1/build/three.module.js","three/addons/":"https://unpkg.com/three@0.164.1/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ═══ RENDERER ═══════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 7);

// ═══ POST PROCESSING ════════════════════════════════════
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.4, 0.3));
composer.addPass(new OutputPass());

// ═══ BACKGROUND ═════════════════════════════════════════
// Rich gradient - NOT black. Warm purple-blue.
const bgMat = new THREE.ShaderMaterial({
  depthWrite: false,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
  fragmentShader: `
    varying vec2 vUv;
    uniform float uTime;
    void main(){
      vec2 uv = vUv;
      // Base gradient: deep purple bottom -> dark blue top
      vec3 col = mix(vec3(0.08, 0.02, 0.15), vec3(0.02, 0.05, 0.12), uv.y);
      // Warm center glow
      float d = length(uv - vec2(0.5, 0.45));
      col += vec3(0.08, 0.03, 0.12) * smoothstep(0.7, 0.0, d);
      // Subtle secondary glow
      float d2 = length(uv - vec2(0.7, 0.6));
      col += vec3(0.04, 0.02, 0.08) * smoothstep(0.5, 0.0, d2);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const bg = new THREE.Mesh(new THREE.PlaneGeometry(2,2), bgMat);
bg.frustumCulled = false; bg.renderOrder = -1;
scene.add(bg);

// ═══ LIGHTING ═══════════════════════════════════════════
// Key: warm purple from top-right
const keyLight = new THREE.DirectionalLight(0xb699ff, 2.5);
keyLight.position.set(4, 5, 4);
scene.add(keyLight);

// Fill: cool blue from left
const fillLight = new THREE.DirectionalLight(0x6ba3ff, 1.5);
fillLight.position.set(-5, 1, 3);
scene.add(fillLight);

// Rim: pink from behind
const rimLight = new THREE.DirectionalLight(0xff7eb3, 2.0);
rimLight.position.set(0, -2, -5);
scene.add(rimLight);

// Top accent
const topLight = new THREE.DirectionalLight(0xffffff, 0.8);
topLight.position.set(0, 8, 0);
scene.add(topLight);

scene.add(new THREE.AmbientLight(0x1a1028, 1.0));

// Orbiting colored point lights for live reflections
const pl1 = new THREE.PointLight(0xc084fc, 4, 10);
const pl2 = new THREE.PointLight(0x60a5fa, 3, 10);
const pl3 = new THREE.PointLight(0xf472b6, 3, 10);
scene.add(pl1, pl2, pl3);

// ═══ RICH ENVIRONMENT MAP ═══════════════════════════════
// Multiple colored light spots for visible reflections on surfaces
function createRichEnv() {
  const envScene = new THREE.Scene();
  const envMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    vertexShader: `varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      varying vec3 vPos;
      void main(){
        vec3 d = normalize(vPos);
        float t = d.y * 0.5 + 0.5;
        // Base sky gradient
        vec3 col = mix(vec3(0.03, 0.02, 0.08), vec3(0.05, 0.02, 0.15), t);
        // Warm purple top-right light
        col += vec3(0.6, 0.3, 0.8) * pow(max(dot(d, normalize(vec3(0.6, 0.7, 0.4))), 0.0), 12.0) * 2.5;
        // Cool blue left light
        col += vec3(0.3, 0.5, 0.9) * pow(max(dot(d, normalize(vec3(-0.7, 0.3, 0.5))), 0.0), 10.0) * 2.0;
        // Pink rim from below-behind
        col += vec3(0.9, 0.3, 0.5) * pow(max(dot(d, normalize(vec3(0.0, -0.5, -0.8))), 0.0), 8.0) * 1.5;
        // Cyan accent
        col += vec3(0.2, 0.7, 0.6) * pow(max(dot(d, normalize(vec3(-0.3, 0.5, -0.6))), 0.0), 15.0) * 1.8;
        // Warm horizon band
        float horizon = exp(-20.0 * d.y * d.y);
        col += vec3(0.12, 0.05, 0.18) * horizon;
        // Gold accent top
        col += vec3(0.5, 0.35, 0.1) * pow(max(dot(d, normalize(vec3(0.2, 0.9, -0.2))), 0.0), 20.0) * 1.2;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  envScene.add(new THREE.Mesh(new THREE.SphereGeometry(50, 64, 64), envMat));
  const pm = new THREE.PMREMGenerator(renderer);
  pm.compileCubemapShader();
  const envMap = pm.fromScene(envScene, 0, 0.1, 100).texture;
  pm.dispose();
  return envMap;
}
const envMap = createRichEnv();
scene.environment = envMap;

// ═══ NOISE (GLSL) for onBeforeCompile injection ════════
const NOISE_GLSL = `
vec3 mod289_n(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec4 mod289_n(vec4 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec4 permute_n(vec4 x){ return mod289_n(((x*34.0)+10.0)*x); }
vec4 taylorInvSqrt_n(vec4 r){ return 1.79284291400159 - 0.85373472095314*r; }
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);
  const vec4 D=vec4(0,0.5,1,2);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.0-g;
  vec3 i1=min(g,l.zxy);
  vec3 i2=max(g,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289_n(i);
  vec4 p=permute_n(permute_n(permute_n(
    i.z+vec4(0,i1.z,i2.z,1))+i.y+vec4(0,i1.y,i2.y,1))+i.x+vec4(0,i1.x,i2.x,1));
  float n_=0.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;
  vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt_n(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.5-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;
  return 105.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
`;

// ═══ HERO BLOB ══════════════════════════════════════════
// MeshPhysicalMaterial + onBeforeCompile = PBR quality + organic deformation
// This gives us REAL environment reflections + noise displacement.
const blobGeo = new THREE.IcosahedronGeometry(1.4, 6);
const blobTimeUniform = { value: 0 };
const blobMouseUniform = { value: new THREE.Vector2(0, 0) };

const blobMat = new THREE.MeshPhysicalMaterial({
  color: '#7c3aed',
  metalness: 0.28,
  roughness: 0.12,
  clearcoat: 1.0,
  clearcoatRoughness: 0.08,
  envMapIntensity: 2.0,
  iridescence: 0.9,
  iridescenceIOR: 1.5,
  iridescenceThicknessRange: [100, 800],
  sheen: 0.8,
  sheenRoughness: 0.25,
  sheenColor: new THREE.Color('#f472b6'),
  emissive: '#2e1065',
  emissiveIntensity: 0.3,
});

blobMat.onBeforeCompile = (shader) => {
  shader.uniforms.uTime = blobTimeUniform;
  shader.uniforms.uMouse = blobMouseUniform;

  // Inject noise + displacement into vertex shader
  shader.vertexShader = shader.vertexShader.replace(
    '#include <common>',
    `#include <common>
    uniform float uTime;
    uniform vec2 uMouse;
    ${NOISE_GLSL}
    `
  );

  shader.vertexShader = shader.vertexShader.replace(
    '#include <begin_vertex>',
    `#include <begin_vertex>
    // Multi-octave organic deformation
    float n1 = snoise(position * 1.2 + uTime * 0.3) * 0.35;
    float n2 = snoise(position * 2.5 + uTime * 0.2 + 10.0) * 0.15;
    float n3 = snoise(position * 5.0 + uTime * 0.15 + 20.0) * 0.05;
    float disp = n1 + n2 + n3;
    // Mouse reactive bulge
    disp += dot(normalize(position.xy), uMouse) * 0.08;
    transformed += normal * disp;
    `
  );

  // Recompute normals after displacement
  shader.vertexShader = shader.vertexShader.replace(
    '#include <beginnormal_vertex>',
    `#include <beginnormal_vertex>
    // Finite-difference normal recomputation
    float eps_n = 0.02;
    vec3 tang = normalize(cross(objectNormal, vec3(0.0, 1.0, 0.01)));
    vec3 bitang = normalize(cross(objectNormal, tang));
    vec3 pT = position + tang * eps_n;
    vec3 pB = position + bitang * eps_n;
    float dT = snoise(pT*1.2+uTime*0.3)*0.35 + snoise(pT*2.5+uTime*0.2+10.0)*0.15 + snoise(pT*5.0+uTime*0.15+20.0)*0.05;
    float dB = snoise(pB*1.2+uTime*0.3)*0.35 + snoise(pB*2.5+uTime*0.2+10.0)*0.15 + snoise(pB*5.0+uTime*0.15+20.0)*0.05;
    float dC = snoise(position*1.2+uTime*0.3)*0.35 + snoise(position*2.5+uTime*0.2+10.0)*0.15 + snoise(position*5.0+uTime*0.15+20.0)*0.05;
    vec3 displacedT = pT + objectNormal * dT;
    vec3 displacedB = pB + objectNormal * dB;
    vec3 displacedC = position + objectNormal * dC;
    objectNormal = normalize(cross(displacedT - displacedC, displacedB - displacedC));
    `
  );

  // Inject color variation into fragment shader (modulate diffuseColor)
  shader.uniforms.uTimeFrag = blobTimeUniform;
  shader.fragmentShader = shader.fragmentShader.replace(
    '#include <common>',
    `#include <common>
    uniform float uTimeFrag;
    `
  );
  shader.fragmentShader = shader.fragmentShader.replace(
    '#include <color_fragment>',
    `#include <color_fragment>
    // Animated color gradient across the surface based on normal + position
    vec3 norm01 = vNormal * 0.5 + 0.5;
    float cMix = sin(norm01.y * 3.14 + uTimeFrag * 0.4) * 0.5 + 0.5;
    vec3 gradA = vec3(0.486, 0.227, 0.929); // #7c3aed purple
    vec3 gradB = vec3(0.231, 0.510, 0.965); // #3b82f6 blue
    vec3 gradC = vec3(0.925, 0.286, 0.600); // #ec4899 pink
    vec3 gradD = vec3(0.024, 0.714, 0.831); // #06b6d4 cyan
    vec3 mixAB = mix(gradA, gradB, norm01.y);
    vec3 mixCD = mix(gradC, gradD, norm01.x);
    vec3 finalGrad = mix(mixAB, mixCD, cMix * 0.5 + 0.25);
    diffuseColor.rgb = finalGrad;
    `
  );
};

const blob = new THREE.Mesh(blobGeo, blobMat);
scene.add(blob);

// ═══ COMPANION: TORUS KNOT ══════════════════════════════
// Glossy opaque gradient, NOT glass
const tkGeo = new THREE.TorusKnotGeometry(0.55, 0.18, 200, 32, 2, 3);
const tkMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColor1: { value: new THREE.Color('#8b5cf6') },
    uColor2: { value: new THREE.Color('#06b6d4') },
    uCamPos: { value: camera.position },
    uLightPos: { value: new THREE.Vector3(4, 5, 4) },
  },
  vertexShader: `
    varying vec3 vNormal, vWorldPos;
    varying vec2 vUv;
    void main(){
      vNormal = normalize(normalMatrix * normal);
      vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColor1, uColor2, uCamPos, uLightPos;
    varying vec3 vNormal, vWorldPos;
    varying vec2 vUv;
    void main(){
      vec3 N = normalize(vNormal);
      vec3 V = normalize(uCamPos - vWorldPos);
      vec3 L = normalize(uLightPos - vWorldPos);

      // Gradient along the shape
      float t = sin(vUv.x * 6.28 + uTime * 0.3) * 0.5 + 0.5;
      vec3 base = mix(uColor1, uColor2, t);

      float diff = max(dot(N, L), 0.0);
      vec3 H = normalize(L + V);
      float spec = pow(max(dot(N, H), 0.0), 120.0);
      float fresnel = pow(1.0 - max(dot(N, V), 0.0), 4.0);
      vec3 fresnelCol = mix(uColor1, vec3(1.0, 0.6, 0.9), fresnel) * fresnel * 0.8;

      vec3 color = base * 0.2 + base * diff * 0.7 + vec3(1.0) * spec * 0.9 + fresnelCol;
      color += base * 0.08; // emission

      gl_FragColor = vec4(color, 1.0);
    }
  `,
});
const torusKnot = new THREE.Mesh(tkGeo, tkMat);
torusKnot.position.set(-2.6, 0.5, -0.8);
scene.add(torusKnot);

// ═══ COMPANION: TORUS ═══════════════════════════════════
const torGeo = new THREE.TorusGeometry(0.65, 0.22, 64, 128);
const torMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uColor1: { value: new THREE.Color('#f472b6') },
    uColor2: { value: new THREE.Color('#fbbf24') },
    uCamPos: { value: camera.position },
    uLightPos: { value: new THREE.Vector3(-5, 1, 3) },
  },
  vertexShader: tkMat.vertexShader,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColor1, uColor2, uCamPos, uLightPos;
    varying vec3 vNormal, vWorldPos;
    varying vec2 vUv;
    void main(){
      vec3 N = normalize(vNormal);
      vec3 V = normalize(uCamPos - vWorldPos);
      vec3 L = normalize(uLightPos - vWorldPos);

      float t = sin(vUv.x * 6.28 * 2.0 + uTime * 0.4) * 0.5 + 0.5;
      vec3 base = mix(uColor1, uColor2, t);

      float diff = max(dot(N, L), 0.0);
      vec3 H = normalize(L + V);
      float spec = pow(max(dot(N, H), 0.0), 100.0);
      float fresnel = pow(1.0 - max(dot(N, V), 0.0), 3.5);
      vec3 fresnelCol = mix(uColor2, vec3(1.0, 0.8, 0.9), fresnel) * fresnel * 0.7;

      vec3 color = base * 0.2 + base * diff * 0.65 + vec3(1.0) * spec * 0.8 + fresnelCol;
      color += base * 0.1;

      gl_FragColor = vec4(color, 1.0);
    }
  `,
});
const torus = new THREE.Mesh(torGeo, torMat);
torus.position.set(2.4, -0.6, -0.5);
torus.rotation.set(0.6, 0.3, 0.2);
scene.add(torus);

// ═══ SMALL FLOATING SHAPES ══════════════════════════════
const smalls = [];
const smallConfigs = [
  { geo: new THREE.IcosahedronGeometry(0.2, 1), pos: [-1.2, -1.5, 0.3], color: '#a78bfa' },
  { geo: new THREE.OctahedronGeometry(0.18, 0), pos: [1.5, 1.5, -1], color: '#6ee7b7' },
  { geo: new THREE.TetrahedronGeometry(0.22, 0), pos: [-0.6, 1.8, -1.5], color: '#f9a8d4' },
  { geo: new THREE.DodecahedronGeometry(0.15, 0), pos: [0.8, -1.7, 0.5], color: '#93c5fd' },
  { geo: new THREE.SphereGeometry(0.12, 32, 32), pos: [2.5, 1.2, -1.8], color: '#fbbf24' },
  { geo: new THREE.OctahedronGeometry(0.14, 0), pos: [-2.2, -0.8, 0.8], color: '#34d399' },
];
smallConfigs.forEach(cfg => {
  const mat = new THREE.MeshStandardMaterial({
    color: cfg.color,
    metalness: 0.3,
    roughness: 0.15,
    emissive: cfg.color,
    emissiveIntensity: 0.15,
  });
  const mesh = new THREE.Mesh(cfg.geo, mat);
  mesh.position.set(...cfg.pos);
  scene.add(mesh);
  smalls.push(mesh);
});

// ═══ PARTICLES ══════════════════════════════════════════
const PC = 400;
const pGeo = new THREE.BufferGeometry();
const pp = new Float32Array(PC*3), ps = new Float32Array(PC), pc = new Float32Array(PC*3);
const pal = [new THREE.Color('#c4b5fd'),new THREE.Color('#93c5fd'),new THREE.Color('#6ee7b7'),new THREE.Color('#f9a8d4'),new THREE.Color('#fde68a')];
for(let i=0;i<PC;i++){
  const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), r=2.5+Math.random()*10;
  pp[i*3]=r*Math.sin(ph)*Math.cos(th); pp[i*3+1]=r*Math.sin(ph)*Math.sin(th); pp[i*3+2]=r*Math.cos(ph);
  ps[i]=0.3+Math.random()*1.8;
  const co=pal[Math.floor(Math.random()*pal.length)];
  pc[i*3]=co.r; pc[i*3+1]=co.g; pc[i*3+2]=co.b;
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pp,3));
pGeo.setAttribute('size',new THREE.BufferAttribute(ps,1));
pGeo.setAttribute('color',new THREE.BufferAttribute(pc,3));
const pMat = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0}, uPR:{value:Math.min(devicePixelRatio,2)} },
  vertexShader:`
    attribute float size; attribute vec3 color;
    uniform float uTime,uPR;
    varying vec3 vC; varying float vA;
    void main(){
      vC=color;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      float o=length(position)*0.08;
      mv.y+=sin(uTime*0.2+o)*0.4; mv.x+=cos(uTime*0.15+o*1.3)*0.3;
      float d=max(-mv.z,0.5);
      vA=smoothstep(18.0,2.0,d)*0.5;
      gl_PointSize=size*uPR*(100.0/d);
      gl_Position=projectionMatrix*mv;
    }
  `,
  fragmentShader:`
    varying vec3 vC; varying float vA;
    void main(){
      float d=length(gl_PointCoord-0.5);
      if(d>0.5)discard;
      float a=smoothstep(0.5,0.05,d)*vA;
      gl_FragColor=vec4(vC+vC*smoothstep(0.3,0.0,d)*0.4, a);
    }
  `,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
scene.add(new THREE.Points(pGeo,pMat));

// ═══ MOUSE ══════════════════════════════════════════════
const mouse = {x:0,y:0,tx:0,ty:0};
addEventListener('mousemove',e=>{
  mouse.tx=(e.clientX/innerWidth)*2-1;
  mouse.ty=-(e.clientY/innerHeight)*2+1;
});
addEventListener('touchmove',e=>{
  if(e.touches.length===1){
    mouse.tx=(e.touches[0].clientX/innerWidth)*2-1;
    mouse.ty=-(e.touches[0].clientY/innerHeight)*2+1;
  }
},{passive:true});

// ═══ RESIZE ═════════════════════════════════════════════
let rt;
addEventListener('resize',()=>{
  clearTimeout(rt);
  rt=setTimeout(()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    composer.setSize(innerWidth,innerHeight);
  },100);
});

// ═══ ANIMATE ════════════════════════════════════════════
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth mouse
  mouse.x += (mouse.tx - mouse.x) * 0.04;
  mouse.y += (mouse.ty - mouse.y) * 0.04;

  // Camera follows mouse gently
  camera.position.x = mouse.x * 1.0;
  camera.position.y = mouse.y * 0.6;
  camera.lookAt(0, 0, 0);

  // Hero blob
  blob.rotation.y = t * 0.12;
  blob.rotation.x = Math.sin(t * 0.2) * 0.08;
  blob.position.y = Math.sin(t * 0.4) * 0.1;
  blobTimeUniform.value = t;
  blobMouseUniform.value.set(mouse.x, mouse.y);

  // Companions
  torusKnot.rotation.x = t * 0.2;
  torusKnot.rotation.y = t * 0.15;
  torusKnot.position.y = 0.5 + Math.sin(t * 0.35 + 1) * 0.25;
  tkMat.uniforms.uTime.value = t;

  torus.rotation.x = 0.6 + t * 0.18;
  torus.rotation.z = 0.2 + t * 0.1;
  torus.position.y = -0.6 + Math.sin(t * 0.4 + 2) * 0.2;
  torMat.uniforms.uTime.value = t;

  // Small shapes float and spin
  smalls.forEach((s, i) => {
    s.rotation.x = t * (0.3 + i * 0.08);
    s.rotation.y = t * (0.2 + i * 0.1);
    s.position.y += Math.sin(t * (0.25 + i * 0.08) + i * 1.5) * 0.0008;
  });

  // Orbiting lights
  pl1.position.set(Math.sin(t*0.4)*4, Math.cos(t*0.3)*3, Math.cos(t*0.4)*3);
  pl2.position.set(Math.cos(t*0.35)*3.5, Math.sin(t*0.5)*2, Math.sin(t*0.35)*4);
  pl3.position.set(Math.sin(t*0.3+2)*3, -2, Math.cos(t*0.3+2)*3);

  // PBR pipeline handles lighting automatically

  // Particles
  pMat.uniforms.uTime.value = t;

  composer.render();
}

// Start after a brief moment
setTimeout(() => {
  document.getElementById('loader').classList.add('done');
  animate();
}, 500);
</script>
