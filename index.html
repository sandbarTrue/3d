<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Glass Lab v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #000;
    font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    touch-action: pan-y;
  }
  #c { display: block; width: 100vw; height: 100vh; cursor: grab; }
  #c:active { cursor: grabbing; }

  /* Minimal UI */
  .ui {
    position: fixed;
    z-index: 10;
    pointer-events: none;
  }
  .title {
    top: 40px; left: 50px;
    opacity: 0;
  }
  .title h1 {
    font-size: 42px;
    font-weight: 200;
    letter-spacing: 8px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #c4b5fd, #93c5fd, #6ee7b7, #f9a8d4);
    background-size: 300% 300%;
    animation: gradShift 8s ease infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .title p {
    margin-top: 8px;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
    font-weight: 300;
  }
  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Loading */
  #loader {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #050510;
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #loader.done { opacity: 0; pointer-events: none; }
  .spinner {
    width: 48px; height: 48px;
    border: 1.5px solid rgba(196,181,253,0.15);
    border-top-color: #c4b5fd;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>
<div class="ui title" id="title">
  <h1>Glass Lab</h1>
  <p>Move your mouse to explore</p>
</div>

<canvas id="c"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Renderer ───────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.8;

// ─── Scene ──────────────────────────────────────────────
const scene = new THREE.Scene();

// Gradient background via shader
const bgGeo = new THREE.PlaneGeometry(2, 2);
const bgMat = new THREE.ShaderMaterial({
  depthWrite: false,
  uniforms: {
    uColor1: { value: new THREE.Color('#050510') },
    uColor2: { value: new THREE.Color('#0c0a2a') },
    uColor3: { value: new THREE.Color('#10061a') },
    uTime: { value: 0 },
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
  fragmentShader: `
    uniform vec3 uColor1, uColor2, uColor3;
    uniform float uTime;
    varying vec2 vUv;
    void main(){
      float t = vUv.y;
      // Subtle animated gradient
      t += sin(vUv.x * 3.14 + uTime * 0.15) * 0.04;
      vec3 col = mix(uColor1, uColor2, smoothstep(0.0, 0.5, t));
      col = mix(col, uColor3, smoothstep(0.4, 1.0, t));
      // Slight radial glow in center
      float d = length(vUv - 0.5);
      col += vec3(0.03, 0.01, 0.05) * smoothstep(0.6, 0.0, d);
      gl_FragColor = vec4(col, 1.0);
    }
  `
});
const bgMesh = new THREE.Mesh(bgGeo, bgMat);
bgMesh.renderOrder = -1;
bgMesh.frustumCulled = false;
scene.add(bgMesh);

// ─── Camera ─────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

// ─── Post Processing ────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.5, 0.2
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─── Lighting ───────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const dirLight = new THREE.DirectionalLight(0xc4b5fd, 3);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x93c5fd, 1.5);
fillLight.position.set(-5, 2, 3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x6ee7b7, 1.2);
rimLight.position.set(0, -5, -5);
scene.add(rimLight);

// Colored point lights that orbit
const pLight1 = new THREE.PointLight(0xc4b5fd, 8, 12);
const pLight2 = new THREE.PointLight(0xf9a8d4, 6, 12);
const pLight3 = new THREE.PointLight(0x6ee7b7, 5, 12);
scene.add(pLight1, pLight2, pLight3);

// ─── Load HDRI Environment ─────────────────────────────
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();

// Use a high-quality studio HDRI for beautiful reflections
new RGBELoader()
  .load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr', (hdrTexture) => {
    const envMap = pmrem.fromEquirectangular(hdrTexture).texture;
    scene.environment = envMap;
    hdrTexture.dispose();
    pmrem.dispose();
    onReady();
  }, undefined, () => {
    // Fallback: create a rich procedural environment if HDRI fails to load
    createProceduralEnv();
    onReady();
  });

function createProceduralEnv() {
  const envScene = new THREE.Scene();
  const envMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      c1: { value: new THREE.Color('#1a0a3e') },
      c2: { value: new THREE.Color('#0a2040') },
      c3: { value: new THREE.Color('#301050') },
    },
    vertexShader: `varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform vec3 c1,c2,c3; varying vec3 vPos;
      void main(){
        float t=normalize(vPos).y*0.5+0.5;
        vec3 col=mix(c2,c1,smoothstep(0.0,0.4,t));
        col=mix(col,c3,smoothstep(0.5,1.0,t));
        // Add some "light sources" in the env
        float spot1 = smoothstep(0.15, 0.0, length(normalize(vPos) - normalize(vec3(1,1,0.5))));
        float spot2 = smoothstep(0.12, 0.0, length(normalize(vPos) - normalize(vec3(-1,0.5,0.8))));
        col += vec3(0.4, 0.2, 0.6) * spot1 * 2.0;
        col += vec3(0.2, 0.4, 0.5) * spot2 * 1.5;
        gl_FragColor=vec4(col,1.0);
      }
    `
  });
  envScene.add(new THREE.Mesh(new THREE.SphereGeometry(50, 64, 64), envMat));
  const pm = new THREE.PMREMGenerator(renderer);
  pm.compileCubemapShader();
  scene.environment = pm.fromScene(envScene, 0, 0.1, 100).texture;
  pm.dispose();
}

// ─── Objects ────────────────────────────────────────────
const objectsGroup = new THREE.Group();
scene.add(objectsGroup);

// Hero: Central glass sphere with iridescence
const heroGeo = new THREE.SphereGeometry(1.3, 128, 128);
const heroMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.0,
  roughness: 0.0,
  transmission: 1.0,
  thickness: 3.5,
  ior: 2.0,
  clearcoat: 1.0,
  clearcoatRoughness: 0.0,
  envMapIntensity: 2.5,
  attenuationColor: new THREE.Color('#c4b5fd'),
  attenuationDistance: 1.5,
  iridescence: 1.0,
  iridescenceIOR: 1.5,
  iridescenceThicknessRange: [100, 800],
  sheen: 1.0,
  sheenRoughness: 0.2,
  sheenColor: new THREE.Color('#f9a8d4'),
  transparent: true,
});
const hero = new THREE.Mesh(heroGeo, heroMat);
objectsGroup.add(hero);

// Inner core glow
const coreGeo = new THREE.IcosahedronGeometry(0.5, 4);
const coreMat = new THREE.MeshBasicMaterial({
  color: 0xc4b5fd,
  transparent: true,
  opacity: 0.25,
});
const core = new THREE.Mesh(coreGeo, coreMat);
hero.add(core);

// Second inner ring
const ringGeo = new THREE.TorusGeometry(0.7, 0.03, 32, 128);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x93c5fd,
  transparent: true,
  opacity: 0.3,
});
const innerRing = new THREE.Mesh(ringGeo, ringMat);
innerRing.rotation.x = Math.PI / 2;
hero.add(innerRing);

// Companion: Torus Knot (gradient iridescent)
const tkGeo = new THREE.TorusKnotGeometry(0.6, 0.18, 200, 32);
const tkMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.15,
  roughness: 0.05,
  transmission: 0.8,
  thickness: 2.0,
  ior: 1.6,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  envMapIntensity: 2.0,
  attenuationColor: new THREE.Color('#93c5fd'),
  attenuationDistance: 2.0,
  iridescence: 0.8,
  iridescenceIOR: 1.3,
  iridescenceThicknessRange: [200, 600],
  transparent: true,
});
const torusKnot = new THREE.Mesh(tkGeo, tkMat);
torusKnot.position.set(-2.5, 0.6, -1.2);
torusKnot.scale.setScalar(0.9);
objectsGroup.add(torusKnot);

// Companion: Torus (glass ring)
const torGeo = new THREE.TorusGeometry(0.7, 0.25, 48, 100);
const torMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.0,
  roughness: 0.02,
  transmission: 0.95,
  thickness: 2.5,
  ior: 1.8,
  clearcoat: 1.0,
  clearcoatRoughness: 0.0,
  envMapIntensity: 2.0,
  attenuationColor: new THREE.Color('#6ee7b7'),
  attenuationDistance: 1.8,
  iridescence: 0.6,
  iridescenceIOR: 1.4,
  iridescenceThicknessRange: [150, 500],
  transparent: true,
});
const torus = new THREE.Mesh(torGeo, torMat);
torus.position.set(2.3, -0.4, -0.8);
torus.rotation.set(0.5, 0.3, 0.2);
objectsGroup.add(torus);

// Floating small gems
const gemConfigs = [
  { pos: [-1.5, -1.6, -1], size: 0.25, color: '#f9a8d4' },
  { pos: [1.8, 1.8, -1.5], size: 0.2, color: '#c4b5fd' },
  { pos: [-0.8, 2.0, -2], size: 0.18, color: '#6ee7b7' },
  { pos: [0.5, -2.0, -0.5], size: 0.22, color: '#93c5fd' },
  { pos: [2.8, 1.0, -2], size: 0.15, color: '#fbbf24' },
];
const gems = gemConfigs.map(cfg => {
  const geo = new THREE.OctahedronGeometry(cfg.size, 0);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0.1,
    roughness: 0.0,
    transmission: 0.9,
    thickness: 1.5,
    ior: 2.2,
    clearcoat: 1.0,
    envMapIntensity: 2.5,
    attenuationColor: new THREE.Color(cfg.color),
    attenuationDistance: 1.0,
    iridescence: 1.0,
    iridescenceIOR: 1.5,
    iridescenceThicknessRange: [100, 600],
    transparent: true,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...cfg.pos);
  objectsGroup.add(mesh);
  return mesh;
});

// ─── Particles ──────────────────────────────────────────
const PARTICLE_COUNT = 500;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PARTICLE_COUNT * 3);
const pSizes = new Float32Array(PARTICLE_COUNT);
const pColors = new Float32Array(PARTICLE_COUNT * 3);
const palette = [
  new THREE.Color('#c4b5fd'),
  new THREE.Color('#93c5fd'),
  new THREE.Color('#6ee7b7'),
  new THREE.Color('#f9a8d4'),
  new THREE.Color('#fde68a'),
];

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 2 + Math.random() * 12;
  pPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  pPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  pPos[i*3+2] = r * Math.cos(phi);
  pSizes[i] = 0.3 + Math.random() * 2.0;
  const c = palette[Math.floor(Math.random() * palette.length)];
  pColors[i*3] = c.r; pColors[i*3+1] = c.g; pColors[i*3+2] = c.b;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));
pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

const pMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uPR: { value: Math.min(devicePixelRatio, 2) },
  },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    uniform float uTime, uPR;
    varying vec3 vCol;
    varying float vAlpha;
    void main(){
      vCol = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      float off = length(position) * 0.08;
      mv.y += sin(uTime * 0.25 + off) * 0.4;
      mv.x += cos(uTime * 0.18 + off * 1.3) * 0.3;
      float dist = max(-mv.z, 0.5);
      vAlpha = smoothstep(20.0, 2.0, dist) * 0.6;
      gl_PointSize = size * uPR * (120.0 / dist);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vCol;
    varying float vAlpha;
    void main(){
      float d = length(gl_PointCoord - 0.5);
      if(d > 0.5) discard;
      float a = smoothstep(0.5, 0.05, d) * vAlpha;
      vec3 c = vCol + vCol * smoothstep(0.3, 0.0, d) * 0.6;
      gl_FragColor = vec4(c, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// ─── Mouse ──────────────────────────────────────────────
const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
addEventListener('mousemove', e => {
  mouse.tx = (e.clientX / innerWidth) * 2 - 1;
  mouse.ty = -(e.clientY / innerHeight) * 2 + 1;
});
addEventListener('touchmove', e => {
  if(e.touches.length === 1){
    mouse.tx = (e.touches[0].clientX / innerWidth) * 2 - 1;
    mouse.ty = -(e.touches[0].clientY / innerHeight) * 2 + 1;
  }
}, { passive: true });

// ─── Resize ─────────────────────────────────────────────
let resizeTimer;
addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  }, 100);
});

// ─── Animate ────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth mouse
  mouse.x += (mouse.tx - mouse.x) * 0.04;
  mouse.y += (mouse.ty - mouse.y) * 0.04;

  // Camera: subtle orbit + mouse parallax
  camera.position.x = mouse.x * 0.8;
  camera.position.y = mouse.y * 0.5 + Math.sin(t * 0.2) * 0.1;
  camera.position.z = 6 + Math.sin(t * 0.15) * 0.3;
  camera.lookAt(0, 0, 0);

  // Hero sphere: gentle rotation
  hero.rotation.y = t * 0.15;
  hero.rotation.x = Math.sin(t * 0.2) * 0.05;
  hero.position.y = Math.sin(t * 0.5) * 0.12;

  // Inner core spin
  core.rotation.x = t * 0.8;
  core.rotation.y = t * 0.5;
  core.scale.setScalar(1 + Math.sin(t * 2) * 0.08);
  coreMat.opacity = 0.2 + Math.sin(t * 1.5) * 0.08;

  // Inner ring
  innerRing.rotation.z = t * 0.4;
  innerRing.rotation.x = Math.PI / 2 + Math.sin(t * 0.3) * 0.2;

  // Torus knot
  torusKnot.rotation.x = t * 0.25;
  torusKnot.rotation.y = t * 0.18;
  torusKnot.position.y = 0.6 + Math.sin(t * 0.4 + 1) * 0.2;

  // Torus
  torus.rotation.x = 0.5 + t * 0.2;
  torus.rotation.z = 0.2 + t * 0.12;
  torus.position.y = -0.4 + Math.sin(t * 0.5 + 2) * 0.15;

  // Floating gems
  gems.forEach((g, i) => {
    g.rotation.x = t * (0.3 + i * 0.1);
    g.rotation.y = t * (0.2 + i * 0.15);
    g.position.y += Math.sin(t * (0.3 + i * 0.1) + i * 2) * 0.001;
  });

  // Orbiting point lights
  pLight1.position.set(Math.sin(t * 0.5) * 4, Math.cos(t * 0.3) * 3, Math.cos(t * 0.5) * 4);
  pLight2.position.set(Math.cos(t * 0.4) * 3.5, Math.sin(t * 0.6) * 2, Math.sin(t * 0.4) * 3);
  pLight3.position.set(Math.sin(t * 0.35 + 2) * 3, -2, Math.cos(t * 0.35 + 2) * 4);

  // Subtle iridescence animation via thickness range
  heroMat.iridescenceThicknessRange = [
    100 + Math.sin(t * 0.3) * 50,
    800 + Math.cos(t * 0.2) * 200
  ];
  tkMat.iridescenceThicknessRange = [
    200 + Math.sin(t * 0.4 + 1) * 80,
    600 + Math.cos(t * 0.3 + 1) * 150
  ];

  // Background animation
  bgMat.uniforms.uTime.value = t;

  // Particles
  pMat.uniforms.uTime.value = t;
  particles.rotation.y = t * 0.015;

  // Group subtle sway
  objectsGroup.rotation.y = mouse.x * 0.15 + Math.sin(t * 0.1) * 0.05;
  objectsGroup.rotation.x = mouse.y * 0.08;

  composer.render();
}

// ─── Start ──────────────────────────────────────────────
function onReady() {
  // First render to warm up
  composer.render();

  // Hide loader
  setTimeout(() => {
    document.getElementById('loader').classList.add('done');
    // Fade in title
    const title = document.getElementById('title');
    title.style.transition = 'opacity 1.5s ease';
    title.style.opacity = '1';
  }, 300);

  animate();
}
</script>
</body>
</html>
