<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Shape Lab</title>
<style>
  :root{
    --bg-primary:rgba(8,7,15,0.85);
    --bg-secondary:rgba(12,10,24,0.75);
    --border-subtle:rgba(167,139,250,0.15);
    --border-hover:rgba(167,139,250,0.4);
    --accent-purple:#a78bfa;
    --accent-pink:#f472b6;
    --accent-blue:#60a5fa;
    --text-primary:#e2e0f0;
    --text-secondary:#8b85a8;
    --danger:#ef4444;
    --blur-panel:blur(20px);
    --blur-bar:blur(12px);
    --transition-panel:300ms cubic-bezier(0.4,0,0.2,1);
    --shadow-glow:0 0 20px rgba(167,139,250,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#08070f;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--text-primary);user-select:none}
  canvas{display:block;width:100vw;height:100vh;touch-action:none}
  #loader{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:#08070f;transition:opacity 1.2s ease}
  #loader.done{opacity:0;pointer-events:none}
  .dot{width:6px;height:6px;background:var(--accent-purple);border-radius:50%;margin:0 4px;animation:bounce .6s ease infinite}
  .dot:nth-child(2){animation-delay:.1s}.dot:nth-child(3){animation-delay:.2s}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  .glass{
    background:var(--bg-primary);
    backdrop-filter:var(--blur-panel) saturate(1.4);
    -webkit-backdrop-filter:var(--blur-panel) saturate(1.4);
    border:1px solid var(--border-subtle);
    border-radius:16px;
  }

  /* ── Top Bar ── */
  #top-bar{
    position:fixed;top:0;left:0;right:0;height:44px;z-index:60;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    background:rgba(8,7,15,0.7);
    backdrop-filter:blur(12px) saturate(1.4);
    -webkit-backdrop-filter:blur(12px) saturate(1.4);
    border-bottom:1px solid var(--border-subtle);
    border-radius:0;
  }
  #top-bar .title{font-size:13px;font-weight:600;letter-spacing:0.5px;color:var(--text-primary)}
  #top-bar .title span{color:var(--accent-purple);font-weight:700}
  .bar-actions{display:flex;gap:4px}
  .bar-btn{
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;cursor:pointer;transition:all 0.2s;color:var(--text-secondary);
  }
  .bar-btn:hover{background:rgba(167,139,250,0.15);border-color:var(--border-hover);color:#fff}
  .bar-btn.danger:hover{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:#f87171}
  .bar-btn svg{width:16px;height:16px}
  .bar-sep{width:1px;height:20px;background:rgba(255,255,255,0.06);margin:0 4px}

  /* ── Shape Picker Bar ── */
  #shape-bar{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    z-index:50;display:flex;gap:6px;padding:8px 14px;
    overflow-x:auto;max-width:calc(100vw - 32px);
    scrollbar-width:none;
    background:rgba(8,7,15,0.75);
    backdrop-filter:blur(16px) saturate(1.4);
    -webkit-backdrop-filter:blur(16px) saturate(1.4);
    border:1px solid var(--border-subtle);
    border-radius:16px;
  }
  #shape-bar::-webkit-scrollbar{display:none}
  .shape-btn{
    flex:0 0 auto;width:56px;height:56px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;cursor:pointer;transition:all 0.2s;
    color:var(--text-secondary);font-size:8px;letter-spacing:0.3px;
  }
  .shape-btn:hover{
    background:rgba(167,139,250,0.15);border-color:var(--border-hover);
    color:#fff;transform:translateY(-2px);
    box-shadow:0 0 12px rgba(167,139,250,0.3);
  }
  .shape-btn svg{width:22px;height:22px;opacity:0.6;transition:opacity 0.2s}
  .shape-btn:hover svg{opacity:1}

  /* ── Properties Panel ── */
  #props-panel{
    position:fixed;top:52px;right:0;bottom:88px;width:280px;z-index:50;
    padding:14px;overflow-y:auto;overflow-x:hidden;
    background:rgba(12,10,24,0.85);
    backdrop-filter:var(--blur-panel) saturate(1.4);
    -webkit-backdrop-filter:var(--blur-panel) saturate(1.4);
    border-left:1px solid var(--border-subtle);
    border-radius:0;
    transform:translateX(100%);
    transition:transform var(--transition-panel);
    scrollbar-width:thin;
    scrollbar-color:rgba(167,139,250,0.2) transparent;
  }
  #props-panel.visible{transform:translateX(0)}
  #props-panel::-webkit-scrollbar{width:4px}
  #props-panel::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.2);border-radius:2px}

  .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .panel-header h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-secondary);font-weight:500}
  .close-btn{
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    background:none;border:none;color:var(--text-secondary);cursor:pointer;
    border-radius:6px;transition:all 0.2s;font-size:16px;
  }
  .close-btn:hover{background:rgba(255,255,255,0.08);color:#fff}

  .section{margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.04);padding-bottom:10px}
  .section:last-child{border-bottom:none}
  .section-title{
    font-size:10px;text-transform:uppercase;letter-spacing:1px;
    color:var(--accent-purple);font-weight:600;margin-bottom:8px;
    display:flex;align-items:center;gap:6px;cursor:pointer;
  }
  .section-title .chevron{transition:transform 0.2s;font-size:8px;opacity:0.5}
  .section-title .chevron.collapsed{transform:rotate(-90deg)}
  .section-body.collapsed{max-height:0!important;overflow:hidden}

  .prop-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .prop-label{font-size:10px;color:var(--text-secondary);letter-spacing:0.3px;min-width:60px}
  .prop-value{font-size:12px;color:var(--text-primary);text-align:right}

  .prop-slider{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;
    background:rgba(255,255,255,0.08);border-radius:2px;outline:none;margin:4px 0;
  }
  .prop-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--accent-purple);cursor:pointer;border:2px solid rgba(255,255,255,0.15);
  }

  .palette-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
  .palette-swatch{
    width:28px;height:28px;border-radius:8px;cursor:pointer;
    border:2px solid transparent;transition:all 0.2s;position:relative;overflow:hidden;
  }
  .palette-swatch:hover{transform:scale(1.12);box-shadow:var(--shadow-glow)}
  .palette-swatch.active{border-color:var(--accent-purple);box-shadow:0 0 10px rgba(167,139,250,0.4)}

  .mode-row{display:flex;gap:4px;margin-top:4px}
  .mode-btn{
    flex:1;padding:5px 0;text-align:center;font-size:9px;letter-spacing:0.5px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;cursor:pointer;color:var(--text-secondary);transition:all 0.2s;
    text-transform:uppercase;
  }
  .mode-btn:hover{background:rgba(167,139,250,0.12);color:#fff}
  .mode-btn.active{background:rgba(167,139,250,0.2);border-color:var(--border-hover);color:var(--accent-purple)}

  .action-btn{
    width:100%;padding:8px;margin-top:4px;
    background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.15);
    border-radius:10px;color:#f87171;font-size:10px;cursor:pointer;
    letter-spacing:0.5px;transition:all 0.2s;text-transform:uppercase;
  }
  .action-btn:hover{background:rgba(239,68,68,0.25);border-color:rgba(239,68,68,0.4)}
  .action-btn.secondary{
    background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.15);
    color:var(--accent-purple);
  }
  .action-btn.secondary:hover{background:rgba(167,139,250,0.2);border-color:var(--border-hover)}

  #kb-hint{
    position:fixed;bottom:88px;left:16px;z-index:40;
    padding:8px 12px;font-size:9px;color:var(--text-secondary);
    line-height:1.7;letter-spacing:0.3px;
    opacity:0.6;transition:opacity 0.3s;
  }
  #kb-hint:hover{opacity:1}
  #kb-hint kbd{
    display:inline-block;padding:1px 5px;font-size:8px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    border-radius:3px;color:var(--accent-purple);font-family:inherit;
  }

  #toast{
    position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-20px);
    z-index:70;padding:8px 18px;font-size:11px;
    background:rgba(12,10,24,0.9);border:1px solid var(--border-subtle);
    border-radius:10px;color:var(--text-primary);letter-spacing:0.3px;
    opacity:0;pointer-events:none;transition:all 0.3s;
    backdrop-filter:blur(12px);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:768px){
    .shape-btn{width:48px;height:48px}
    .shape-btn svg{width:18px;height:18px}
    .shape-btn span{font-size:7px}
    #props-panel{width:100%;top:auto;bottom:0;right:0;left:0;max-height:50vh;
      transform:translateY(100%);border-left:none;border-top:1px solid var(--border-subtle);
      border-radius:16px 16px 0 0}
    #props-panel.visible{transform:translateY(0)}
    #kb-hint{display:none}
  }
</style>
</head>

<div id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<canvas id="c"></canvas>

<!-- Top Bar -->
<div id="top-bar">
  <div class="title"><span>3D</span> Shape Lab</div>
  <div class="bar-actions">
    <div class="bar-btn" id="btn-undo" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h12a5 5 0 0 1 0 10H9"/><path d="M3 10l4-4M3 10l4 4"/></svg>
    </div>
    <div class="bar-btn" id="btn-redo" title="Redo (Ctrl+Shift+Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H9a5 5 0 0 0 0 10h6"/><path d="M21 10l-4-4M21 10l-4 4"/></svg>
    </div>
    <div class="bar-sep"></div>
    <div class="bar-btn danger" id="btn-clear" title="Clear Scene">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"/></svg>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Keyboard Hints -->
<div id="kb-hint" class="glass">
  <kbd>Click</kbd> bar to add &middot; <kbd>Click</kbd> to select &middot; <kbd>Scroll</kbd> resize<br>
  <kbd>G</kbd> move <kbd>R</kbd> rotate <kbd>S</kbd> scale &middot; <kbd>Del</kbd> delete &middot; <kbd>D</kbd> dup
</div>

<!-- Shape Picker Bar -->
<div id="shape-bar"></div>

<!-- Properties Panel -->
<div id="props-panel">
  <div class="panel-header">
    <h3 id="panel-title">Properties</h3>
    <button class="close-btn" id="panel-close">&times;</button>
  </div>

  <div class="section" id="sec-transform">
    <div class="section-title" data-section="transform"><span class="chevron">&#x25BC;</span> Transform</div>
    <div class="section-body" id="body-transform">
      <div class="mode-row" id="gizmo-modes">
        <div class="mode-btn active" data-mode="translate">Move</div>
        <div class="mode-btn" data-mode="rotate">Rotate</div>
        <div class="mode-btn" data-mode="scale">Scale</div>
      </div>
      <div class="prop-row" style="margin-top:8px">
        <span class="prop-label">Scale</span>
        <span class="prop-value" id="val-scale">1.00</span>
      </div>
      <input type="range" class="prop-slider" id="sl-scale" min="0.1" max="3" step="0.05" value="1">
      <div class="prop-row">
        <span class="prop-label">Spin</span>
        <span class="prop-value" id="val-spin">0.50</span>
      </div>
      <input type="range" class="prop-slider" id="sl-spin" min="0" max="2" step="0.05" value="0.5">
    </div>
  </div>

  <div class="section" id="sec-palette">
    <div class="section-title" data-section="palette"><span class="chevron">&#x25BC;</span> Palette</div>
    <div class="section-body" id="body-palette">
      <div class="palette-row" id="palette-row"></div>
    </div>
  </div>

  <div class="section" id="sec-material">
    <div class="section-title" data-section="material"><span class="chevron">&#x25BC;</span> Material</div>
    <div class="section-body" id="body-material">
      <div class="prop-row">
        <span class="prop-label">Fresnel</span>
        <span class="prop-value" id="val-fresnel">0.55</span>
      </div>
      <input type="range" class="prop-slider" id="sl-fresnel" min="0" max="1.5" step="0.05" value="0.55">
      <div class="prop-row">
        <span class="prop-label">Specular</span>
        <span class="prop-value" id="val-spec">0.35</span>
      </div>
      <input type="range" class="prop-slider" id="sl-spec" min="0" max="1" step="0.05" value="0.35">
      <div class="prop-row">
        <span class="prop-label">Min Bright</span>
        <span class="prop-value" id="val-bright">0.12</span>
      </div>
      <input type="range" class="prop-slider" id="sl-bright" min="0" max="0.3" step="0.01" value="0.12">
    </div>
  </div>

  <div class="section" style="border-bottom:none">
    <button class="action-btn secondary" id="btn-duplicate">Duplicate</button>
    <button class="action-btn" id="btn-delete">Delete Shape</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ═══════════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 10);

// ═══════════════════════════════════════════════════════════
// ORBIT CONTROLS
// ═══════════════════════════════════════════════════════════
const orbit = new OrbitControls(camera, canvas);
orbit.enableDamping = true;
orbit.dampingFactor = 0.08;
orbit.rotateSpeed = 0.6;
orbit.zoomSpeed = 0.8;
orbit.panSpeed = 0.8;
orbit.minDistance = 3;
orbit.maxDistance = 30;
orbit.target.set(0, 0, 0);

// ═══════════════════════════════════════════════════════════
// TRANSFORM CONTROLS
// ═══════════════════════════════════════════════════════════
const transformCtrl = new TransformControls(camera, canvas);
transformCtrl.setSize(0.75);
transformCtrl.addEventListener('dragging-changed', e => { orbit.enabled = !e.value; });
scene.add(transformCtrl);

// ═══════════════════════════════════════════════════════════
// SHARED GLSL
// ═══════════════════════════════════════════════════════════
const NOISE_GLSL = `
vec3 mod289_n(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec4 mod289_n(vec4 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec4 permute_n(vec4 x){ return mod289_n(((x*34.0)+10.0)*x); }
vec4 taylorInvSqrt_n(vec4 r){ return 1.79284291400159 - 0.85373472095314*r; }
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0,0.5,1,2);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g,l.zxy);vec3 i2=max(g,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod289_n(i);
  vec4 p=permute_n(permute_n(permute_n(
    i.z+vec4(0,i1.z,i2.z,1))+i.y+vec4(0,i1.y,i2.y,1))+i.x+vec4(0,i1.x,i2.x,1));
  float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt_n(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.5-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;
  return 105.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

const PALETTE_GLSL = `
vec3 cosPalette(float t, vec3 a, vec3 b, vec3 c, vec3 d){
  return a + b * cos(6.283185 * (c * t + d));
}`;

// ═══════════════════════════════════════════════════════════
// PALETTE PRESETS (8, full cosine params per design doc)
// ═══════════════════════════════════════════════════════════
const PALETTES = {
  nebula:   { name:'Nebula',     a:[.55,.45,.60], b:[.50,.50,.45], c:[1,.7,.4],  d:[.00,.15,.20], rim1:[.4,.6,1], rim2:[.9,.4,.8],  css:'linear-gradient(135deg,#7c3aed,#3b82f6,#eab308)' },
  coral:    { name:'Coral Reef', a:[.50,.50,.50], b:[.50,.50,.50], c:[1,1,1],    d:[.25,.05,.10], rim1:[1,.5,.4], rim2:[1,.7,.3],    css:'linear-gradient(135deg,#f43f5e,#fb923c,#14b8a6)' },
  aurora:   { name:'Aurora',     a:[.50,.50,.50], b:[.50,.50,.50], c:[1,1,.5],   d:[.10,.20,.30], rim1:[.3,1,.7], rim2:[.5,.4,1],    css:'linear-gradient(135deg,#22c55e,#3b82f6,#a855f7)' },
  sunset:   { name:'Sunset',     a:[.50,.50,.30], b:[.50,.50,.30], c:[1,.7,.4],  d:[.00,.05,.20], rim1:[1,.4,.2], rim2:[1,.2,.5],    css:'linear-gradient(135deg,#f97316,#ef4444,#ec4899)' },

}

// EDITOR MATERIAL FACTORY (uniform-based per design doc)
// cosine palette + Fresnel + fake env + specular + half-Lambert + min brightness
// ═══════════════════════════════════════════════════════════
function createEditorMaterial(paletteKey){
  const p = PALETTES[paletteKey] || PALETTES.nebula;
  return new THREE.ShaderMaterial({
    side:THREE.DoubleSide,
    uniforms:{
      uTime:{value:0}, uHover:{value:0}, uSelected:{value:0},
      uPalA:{value:new THREE.Vector3(...p.a)}, uPalB:{value:new THREE.Vector3(...p.b)},
      uPalC:{value:new THREE.Vector3(...p.c)}, uPalD:{value:new THREE.Vector3(...p.d)},
      uRim1:{value:new THREE.Vector3(...p.rim1)}, uRim2:{value:new THREE.Vector3(...p.rim2)},
      uFresnelStr:{value:0.55}, uFresnelPow:{value:3.0},
      uSpecInt:{value:0.35}, uSpecSharp:{value:64.0}, uMinBright:{value:0.12},
    },
    vertexShader:`
      varying vec3 vNormal, vViewPos, vPos;
      void main(){
        vNormal=normalize(normalMatrix*normal); vPos=position;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        vViewPos=-mv.xyz; gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`
      uniform float uTime, uHover, uSelected;
      uniform vec3 uPalA,uPalB,uPalC,uPalD,uRim1,uRim2;
      uniform float uFresnelStr,uFresnelPow,uSpecInt,uSpecSharp,uMinBright;
      ${PALETTE_GLSL}
      varying vec3 vNormal, vViewPos, vPos;

      float hash_e(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
      float valNoise(vec3 p){
        vec3 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
        float a=hash_e(i.xy+i.z*137.0), b=hash_e(i.xy+vec2(1,0)+i.z*137.0);
        float c=hash_e(i.xy+vec2(0,1)+i.z*137.0), d=hash_e(i.xy+vec2(1,1)+i.z*137.0);
        float e=hash_e(i.xy+(i.z+1.0)*137.0), ff=hash_e(i.xy+vec2(1,0)+(i.z+1.0)*137.0);
        float g=hash_e(i.xy+vec2(0,1)+(i.z+1.0)*137.0), h=hash_e(i.xy+vec2(1,1)+(i.z+1.0)*137.0);
        float z0=mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
        float z1=mix(mix(e,ff,f.x),mix(g,h,f.x),f.y);
        return mix(z0,z1,f.z);
      }

      vec3 fakeEnv(vec3 reflDir){
        float ey=reflDir.y*0.5+0.5;
        vec3 env=mix(vec3(0.15,0.05,0.25),vec3(0.05,0.1,0.2),ey);
        env+=vec3(0.6,0.3,0.8)*pow(max(dot(reflDir,normalize(vec3(0.5,0.6,0.4))),0.0),8.0)*0.8;
        env+=vec3(0.2,0.5,0.9)*pow(max(dot(reflDir,normalize(vec3(-0.6,0.3,0.5))),0.0),6.0)*0.6;
        env+=vec3(0.9,0.3,0.5)*pow(max(dot(reflDir,normalize(vec3(0.0,-0.3,-0.7))),0.0),5.0)*0.5;
        return env;
      }

      void main(){
        vec3 N=normalize(vNormal); vec3 V=normalize(vViewPos);
        // Noise-based color variation
        float colorNoise=hash_e(vPos.xy*5.0)*0.08;
        float gradT=vPos.y*0.5+0.5+N.x*0.2+uTime*0.06+colorNoise;
        vec3 base=cosPalette(gradT,uPalA,uPalB,uPalC,uPalD);
        // Minimum brightness floor
        base=max(base,vec3(0.12,0.06,0.18));
        // Surface micro-detail
        float microDetail=valNoise(vPos*8.0+uTime*0.1)*0.03;
        base*=1.0+microDetail;
        // Half-Lambert diffuse
        vec3 L1=normalize(vec3(0.5,0.7,0.6)); vec3 L2=normalize(vec3(-0.5,0.3,0.7));
        float d1=dot(N,L1)*0.3+0.7; float d2=dot(N,L2)*0.2+0.8;
        base*=max(d1,d2); base=pow(base,vec3(0.85));
        // Subsurface scattering approximation
        float sss=pow(max(dot(-V,L1),0.0),2.0)*0.15;
        base+=base*sss;
        // Fresnel
        float fres=pow(1.0-max(dot(V,N),0.0),uFresnelPow);
        vec3 rim=mix(uRim1,uRim2,sin(uTime*0.4)*0.5+0.5);
        base+=rim*fres*uFresnelStr;
        // Rich fake environment reflection
        vec3 refl=reflect(-V,N);
        vec3 envC=fakeEnv(refl);
        base=mix(base,envC,0.10+fres*0.06);
        // Dual-lobe specular
        vec3 H1=normalize(V+L1);
        float specSharp=pow(max(dot(N,H1),0.0),80.0)*0.35;
        float specSoft=pow(max(dot(N,H1),0.0),12.0)*0.12;
        base+=vec3(1.0,0.95,0.9)*(specSharp+specSoft);
        // Hover & selection glow
        base+=rim*uHover*0.25;
        float selEdge=pow(1.0-max(dot(V,N),0.0),4.0);
        base+=vec3(0.65,0.55,1.0)*selEdge*uSelected*0.8;
        // Final brightness floor
        base=max(base,vec3(0.12,0.06,0.18));
        gl_FragColor=vec4(base,1.0);
      }`
  });
}

// Displaced (twisted) material for the twisted sphere shape
function createDisplacedMaterial(paletteKey){
  const p = PALETTES[paletteKey] || PALETTES.nebula;
  return new THREE.ShaderMaterial({
    side:THREE.DoubleSide,
    uniforms:{
      uTime:{value:0}, uHover:{value:0}, uSelected:{value:0},
      uPalA:{value:new THREE.Vector3(...p.a)}, uPalB:{value:new THREE.Vector3(...p.b)},
      uPalC:{value:new THREE.Vector3(...p.c)}, uPalD:{value:new THREE.Vector3(...p.d)},
      uRim1:{value:new THREE.Vector3(...p.rim1)}, uRim2:{value:new THREE.Vector3(...p.rim2)},
      uFresnelStr:{value:0.65}, uFresnelPow:{value:3.5},
      uSpecInt:{value:0.45}, uSpecSharp:{value:80.0}, uMinBright:{value:0.12},
    },
    vertexShader:`
      uniform float uTime;
      ${NOISE_GLSL}
      varying vec3 vNormal, vViewPos, vPos; varying float vDisp;
      void main(){
        vec3 pos=position;
        float tw=sin(pos.y*1.8+uTime*0.25)*0.22;
        float c=cos(tw),s=sin(tw); pos.xz=mat2(c,-s,s,c)*pos.xz;
        float n=snoise(pos*0.7+uTime*0.12)*0.22;
        float disp=n+sin(uTime*0.4)*0.04; vDisp=disp;
        vec3 displaced=pos+normal*disp;
        float eps=0.02;
        vec3 tang=normalize(cross(normal,vec3(0,1,0.01)));
        vec3 bitang=normalize(cross(normal,tang));
        float dT=snoise((pos+tang*eps)*0.7+uTime*0.12)*0.22;
        float dB=snoise((pos+bitang*eps)*0.7+uTime*0.12)*0.22;
        vec3 newN=normalize(cross(pos+tang*eps+normal*dT-displaced, pos+bitang*eps+normal*dB-displaced));
        vNormal=normalize(normalMatrix*newN); vPos=displaced;
        vec4 mv=modelViewMatrix*vec4(displaced,1.0);
        vViewPos=-mv.xyz; gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`
      uniform float uTime,uHover,uSelected;
      uniform vec3 uPalA,uPalB,uPalC,uPalD,uRim1,uRim2;
      uniform float uFresnelStr,uFresnelPow,uSpecInt,uSpecSharp,uMinBright;
      ${PALETTE_GLSL}
      varying vec3 vNormal,vViewPos,vPos; varying float vDisp;

      float hash_d(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
      float valNoise_d(vec3 p){
        vec3 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
        float a=hash_d(i.xy+i.z*137.0), b=hash_d(i.xy+vec2(1,0)+i.z*137.0);
        float c=hash_d(i.xy+vec2(0,1)+i.z*137.0), d=hash_d(i.xy+vec2(1,1)+i.z*137.0);
        float e=hash_d(i.xy+(i.z+1.0)*137.0), ff=hash_d(i.xy+vec2(1,0)+(i.z+1.0)*137.0);
        float g=hash_d(i.xy+vec2(0,1)+(i.z+1.0)*137.0), h=hash_d(i.xy+vec2(1,1)+(i.z+1.0)*137.0);
        float z0=mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
        float z1=mix(mix(e,ff,f.x),mix(g,h,f.x),f.y);
        return mix(z0,z1,f.z);
      }

      vec3 fakeEnv_d(vec3 reflDir){
        float ey=reflDir.y*0.5+0.5;
        vec3 env=mix(vec3(0.15,0.05,0.25),vec3(0.05,0.1,0.2),ey);
        env+=vec3(0.6,0.3,0.8)*pow(max(dot(reflDir,normalize(vec3(0.5,0.6,0.4))),0.0),8.0)*0.8;
        env+=vec3(0.2,0.5,0.9)*pow(max(dot(reflDir,normalize(vec3(-0.6,0.3,0.5))),0.0),6.0)*0.6;
        env+=vec3(0.9,0.3,0.5)*pow(max(dot(reflDir,normalize(vec3(0.0,-0.3,-0.7))),0.0),5.0)*0.5;
        return env;
      }

      void main(){
        vec3 N=normalize(vNormal); vec3 V=normalize(vViewPos);
        // Noise-based color variation
        float colorNoise=hash_d(vPos.xy*5.0)*0.08;
        float gradT=vDisp*1.8+0.5+N.y*0.25+uTime*0.04+colorNoise;
        vec3 base=cosPalette(gradT,uPalA,uPalB,uPalC,uPalD);
        // Minimum brightness floor
        base=max(base,vec3(0.12,0.06,0.18));
        // Surface micro-detail
        float microDetail=valNoise_d(vPos*8.0+uTime*0.1)*0.03;
        base*=1.0+microDetail;
        // Half-Lambert diffuse
        vec3 L1=normalize(vec3(0.5,0.8,0.6)); vec3 L2=normalize(vec3(-0.6,0.3,0.8));
        base*=max(dot(N,L1)*0.35+0.65, dot(N,L2)*0.2+0.8);
        base=pow(base,vec3(0.85));
        // Subsurface scattering approximation
        float sss=pow(max(dot(-V,L1),0.0),2.0)*0.15;
        base+=base*sss;
        // Fresnel
        float fres=pow(1.0-max(dot(V,N),0.0),uFresnelPow);
        vec3 rim=mix(uRim1,uRim2,sin(uTime*0.3)*0.5+0.5);
        base+=rim*fres*uFresnelStr;
        // Rich fake environment reflection
        vec3 refl=reflect(-V,N);
        vec3 envC=fakeEnv_d(refl);
        base=mix(base,envC,0.12+fres*0.08);
        // Dual-lobe specular
        vec3 H1=normalize(V+L1); vec3 H2=normalize(V+L2);
        float specSharp=pow(max(dot(N,H1),0.0),80.0)*0.35;
        float specSoft=pow(max(dot(N,H1),0.0),12.0)*0.12;
        base+=vec3(1.0,0.95,0.9)*(specSharp+specSoft);
        base+=vec3(0.8,0.7,1.0)*pow(max(dot(N,H2),0.0),60.0)*uSpecInt*0.6;
        // Hover & selection glow
        base+=rim*uHover*0.3;
        base+=vec3(0.65,0.55,1.0)*pow(1.0-max(dot(V,N),0.0),4.0)*uSelected*0.8;
        // Final brightness floor
        base=max(base,vec3(0.12,0.06,0.18));
        gl_FragColor=vec4(base,1.0);
      }`
  });
}

  fragmentShader:`varying vec3 vC;varying float vA;void main(){float d=length(gl_PointCoord-0.5);
    if(d>0.5)discard;float a=smoothstep(0.5,0.05,d)*vA;gl_FragColor=vec4(vC+vC*smoothstep(0.3,0.0,d)*0.3,a);}`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});
scene.add(new THREE.Points(pGeo,pMat));

// ═══════════════════════════════════════════════════════════
// POST-PROCESSING
// ═══════════════════════════════════════════════════════════
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth*.5,innerHeight*.5),.28,.5,.5);
composer.addPass(bloomPass);
const CinematicShader={
  uniforms:{tDiffuse:{value:null},uTime:{value:0},uVignetteOffset:{value:.95},uVignetteDarkness:{value:1.05},uChromaticStrength:{value:.002},uGrainIntensity:{value:.028},uSaturation:{value:1.12},uContrast:{value:1.04},uBrightness:{value:1}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float uTime,uVignetteOffset,uVignetteDarkness,uChromaticStrength,uGrainIntensity,uSaturation,uContrast,uBrightness;varying vec2 vUv;
    float hash(vec2 p){vec3 p3=fract(vec3(p.xyx)*0.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    void main(){vec2 uv=vUv;vec2 ctr=uv-0.5;float dist=length(ctr);
    float ca=uChromaticStrength*dist;vec2 cd=normalize(ctr+0.001)*ca;
    float r=texture2D(tDiffuse,uv+cd).r;float g=texture2D(tDiffuse,uv).g;float b=texture2D(tDiffuse,uv-cd).b;
    vec3 col=vec3(r,g,b);col*=uBrightness;col=(col-0.5)*uContrast+0.5;
    float luma=dot(col,vec3(0.2126,0.7152,0.0722));col=mix(vec3(luma),col,uSaturation);
    col=mix(col,col*vec3(0.75,0.55,1.15),(1.0-smoothstep(0.0,0.5,luma))*0.10);
    col=mix(col,col*vec3(1.04,1.0,0.94),smoothstep(0.5,1.0,luma)*0.06);
    col*=smoothstep(uVignetteOffset,uVignetteOffset-0.45,dist*(uVignetteDarkness+uVignetteOffset));
    col+=(hash(uv*1000.0+uTime*100.0)-0.5)*uGrainIntensity;
    gl_FragColor=vec4(max(col,0.0),1.0);}`
};
const cinematicPass=new ShaderPass(CinematicShader);
composer.addPass(cinematicPass);
composer.addPass(new OutputPass());

// ═══════════════════════════════════════════════════════════
// EDITOR STATE
// ═══════════════════════════════════════════════════════════
const objects=[];
let selected=null;
const raycaster=new THREE.Raycaster();
const pointer=new THREE.Vector2(-9,-9);
let hoverTarget=null, lastHoverCheck=0;

// Wireframe overlay
const wireframeMat=new THREE.MeshBasicMaterial({wireframe:true,color:0xa78bfa,opacity:0.2,transparent:true,depthTest:true});

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

// ═══════════════════════════════════════════════════════════
// ADD SHAPE
// ═══════════════════════════════════════════════════════════
function addShape(shapeType, position, opts={}){
  const def=SHAPES[shapeType];
  if(!def) return null;
  if(objects.length>=30){ showToast('Max 30 shapes'); return null; }

  const paletteKey=opts.palette||def.palette;
  const geo=def.create();
  const isDisplaced=shapeType==='sphere'&&opts.displaced;
  const mat=isDisplaced?createDisplacedMaterial(paletteKey):createEditorMaterial(paletteKey);
  const mesh=new THREE.Mesh(geo,mat);

  mesh.position.copy(position||new THREE.Vector3((Math.random()-.5)*3,(Math.random()-.5)*1.5,(Math.random()-.5)*2));
  mesh.scale.set(0,0,0);
  scene.add(mesh);

  const obj={mesh, wireframe:null, shapeType, palette:paletteKey, spinSpeed:0.5, baseScale:opts.scale||1.0, isDisplaced};
  objects.push(obj);

  gsap.to(mesh.scale,{
    x:obj.baseScale, y:obj.baseScale, z:obj.baseScale, duration:0.7,
    ease:'elastic.out(1,0.5)',
    onComplete:()=>{ if(!selected) selectObj(obj); }
  });

  gsap.to(bloomPass,{strength:0.35,duration:0.15,onComplete:()=>gsap.to(bloomPass,{strength:0.28,duration:0.4})});
  return obj;
}

// ═══════════════════════════════════════════════════════════
// SELECTION
// ═══════════════════════════════════════════════════════════
function selectObj(obj){
  if(selected===obj) return;
  deselectObj();
  selected=obj;
  if(!obj) return;

  gsap.to(obj.mesh.material.uniforms.uSelected,{value:1,duration:0.45,ease:'power2.out'});

  // Wireframe overlay — fade in to avoid flash
  const wfMat=wireframeMat.clone();
  wfMat.opacity=0;
  const wf=new THREE.Mesh(obj.mesh.geometry,wfMat);
  wf.scale.setScalar(1.02);
  obj.mesh.add(wf);
  obj.wireframe=wf;
  gsap.to(wfMat,{opacity:0.2,duration:0.35,ease:'power2.out'});

  transformCtrl.attach(obj.mesh);
  updatePanel(obj);
  document.getElementById('props-panel').classList.add('visible');

  // Pulse — gentler
  const s=obj.baseScale;
  gsap.to(obj.mesh.scale,{x:s*1.03,y:s*1.03,z:s*1.03,duration:0.12,yoyo:true,repeat:1,ease:'power2.out'});
}

function deselectObj(){
  if(!selected) return;
  const prev=selected;
  gsap.to(prev.mesh.material.uniforms.uSelected,{value:0,duration:0.4,ease:'power2.out'});
  if(prev.wireframe){
    const wf=prev.wireframe;
    gsap.to(wf.material,{opacity:0,duration:0.25,ease:'power2.out',onComplete:()=>{
      prev.mesh.remove(wf); wf.material.dispose();
    }});
    prev.wireframe=null;
  }
  transformCtrl.detach();
  selected=null;
  document.getElementById('props-panel').classList.remove('visible');
}

function deleteObj(obj){
  if(!obj) return;
  if(selected===obj) deselectObj();
  gsap.to(obj.mesh.scale,{x:0,y:0,z:0,duration:0.35,ease:'back.in(2)',
    onComplete:()=>{ scene.remove(obj.mesh); obj.mesh.geometry.dispose(); obj.mesh.material.dispose(); const i=objects.indexOf(obj); if(i>-1) objects.splice(i,1); }
  });
  showToast('Deleted');
}

function duplicateObj(obj){
  if(!obj) return;
  const dup=addShape(obj.shapeType, obj.mesh.position.clone().add(new THREE.Vector3(1.2,0,0)), {palette:obj.palette, scale:obj.baseScale});
  if(dup){
    dup.spinSpeed=obj.spinSpeed;
    const su=obj.mesh.material.uniforms, du=dup.mesh.material.uniforms;
    du.uFresnelStr.value=su.uFresnelStr.value;
    du.uSpecInt.value=su.uSpecInt.value;
    du.uMinBright.value=su.uMinBright.value;
    showToast('Duplicated');
    selectObj(dup);
  }
}

function clearScene(){
  deselectObj();
  while(objects.length>0){
    const obj=objects[0];
    scene.remove(obj.mesh); obj.mesh.geometry.dispose(); obj.mesh.material.dispose();
    objects.shift();
  }
  showToast('Scene cleared');
}

// ═══════════════════════════════════════════════════════════
// UPDATE PANEL
// ═══════════════════════════════════════════════════════════
function updatePanel(obj){
  document.getElementById('panel-title').textContent=SHAPES[obj.shapeType].name;
  document.getElementById('sl-scale').value=obj.baseScale;
  document.getElementById('val-scale').textContent=obj.baseScale.toFixed(2);
  document.getElementById('sl-spin').value=obj.spinSpeed;
  document.getElementById('val-spin').textContent=obj.spinSpeed.toFixed(2);

  const u=obj.mesh.material.uniforms;
  document.getElementById('sl-fresnel').value=u.uFresnelStr.value;
  document.getElementById('val-fresnel').textContent=u.uFresnelStr.value.toFixed(2);
  document.getElementById('sl-spec').value=u.uSpecInt.value;
  document.getElementById('val-spec').textContent=u.uSpecInt.value.toFixed(2);
  document.getElementById('sl-bright').value=u.uMinBright.value;
  document.getElementById('val-bright').textContent=u.uMinBright.value.toFixed(2);

  // Palettes
  const row=document.getElementById('palette-row');
  row.innerHTML='';
  PALETTE_KEYS.forEach(key=>{
    const p=PALETTES[key];
    const sw=document.createElement('div');
    sw.className='palette-swatch'+(key===obj.palette?' active':'');
    sw.style.background=p.css;
    sw.title=p.name;
    sw.onclick=e=>{ e.stopPropagation(); changePalette(obj,key); };
    row.appendChild(sw);
  });

  // Gizmo mode
  document.querySelectorAll('#gizmo-modes .mode-btn').forEach(b=>
    b.classList.toggle('active',b.dataset.mode===transformCtrl.mode));
}

function changePalette(obj,key){
  const p=PALETTES[key]; if(!p) return;
  obj.palette=key;
  const u=obj.mesh.material.uniforms;
  gsap.to(u.uPalA.value,{x:p.a[0],y:p.a[1],z:p.a[2],duration:0.5});
  gsap.to(u.uPalB.value,{x:p.b[0],y:p.b[1],z:p.b[2],duration:0.5});
  gsap.to(u.uPalC.value,{x:p.c[0],y:p.c[1],z:p.c[2],duration:0.5});
  gsap.to(u.uPalD.value,{x:p.d[0],y:p.d[1],z:p.d[2],duration:0.5});
  gsap.to(u.uRim1.value,{x:p.rim1[0],y:p.rim1[1],z:p.rim1[2],duration:0.5});
  gsap.to(u.uRim2.value,{x:p.rim2[0],y:p.rim2[1],z:p.rim2[2],duration:0.5});
  updatePanel(obj);
}

// ═══════════════════════════════════════════════════════════
// POINTER EVENTS
// ═══════════════════════════════════════════════════════════
function updatePointer(e){
  pointer.x=(e.clientX/innerWidth)*2-1;
  pointer.y=-(e.clientY/innerHeight)*2+1;
}

let mouseDownTime=0, mouseDownPos=new THREE.Vector2();

canvas.addEventListener('pointerdown',e=>{
  if(e.button!==0) return;
  updatePointer(e);
  mouseDownTime=performance.now();
  mouseDownPos.set(e.clientX,e.clientY);
});

canvas.addEventListener('pointerup',e=>{
  if(e.button!==0) return;
  const elapsed=performance.now()-mouseDownTime;
  const dist=Math.hypot(e.clientX-mouseDownPos.x,e.clientY-mouseDownPos.y);
  if(elapsed>300||dist>6) return;

  updatePointer(e);
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(objects.map(o=>o.mesh));
  if(hits.length>0){
    const obj=objects.find(o=>o.mesh===hits[0].object);
    if(obj) selectObj(obj);
    createBurstAt(hits[0].point);
  } else {
    deselectObj();
  }
});

canvas.addEventListener('pointermove',e=>updatePointer(e));

// Scroll resize
canvas.addEventListener('wheel',e=>{
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(objects.map(o=>o.mesh));
  if(hits.length>0){
    const obj=objects.find(o=>o.mesh===hits[0].object);
    if(obj){
      e.preventDefault();
      obj.baseScale=Math.max(0.1,Math.min(3,obj.baseScale+(e.deltaY>0?-0.05:0.05)));
      const s=obj.baseScale;
      gsap.to(obj.mesh.scale,{x:s,y:s,z:s,duration:0.15,ease:'power2.out'});
      if(selected===obj){
        document.getElementById('sl-scale').value=s;
        document.getElementById('val-scale').textContent=s.toFixed(2);
      }
    }
  }
},{passive:false});

// Hover
function checkHover(t){
  if(t-lastHoverCheck<0.066) return;
  lastHoverCheck=t;
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(objects.map(o=>o.mesh));
  const newT=hits.length>0?hits[0].object:null;
  if(newT!==hoverTarget){
    if(hoverTarget){
      const obj=objects.find(o=>o.mesh===hoverTarget);
      if(obj) gsap.to(hoverTarget.material.uniforms.uHover,{value:0,duration:0.4});
    }
    if(newT){
      gsap.to(newT.material.uniforms.uHover,{value:1,duration:0.3});
      canvas.style.cursor='pointer';
    } else { canvas.style.cursor='default'; }
    hoverTarget=newT;
  }
}

// ═══════════════════════════════════════════════════════════
// BURST PARTICLES
// ═══════════════════════════════════════════════════════════
const bursts=[];
const _tc=new THREE.Color();
function createBurstAt(pos){
  const count=40;
  const geo=new THREE.BufferGeometry();
  const positions=new Float32Array(count*3), velocities=[], colors=new Float32Array(count*3);
  const bp=['#c084fc','#60a5fa','#f472b6','#34d399','#fbbf24'];
  for(let i=0;i<count;i++){
    positions[i*3]=pos.x;positions[i*3+1]=pos.y;positions[i*3+2]=pos.z;
    velocities.push(new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize().multiplyScalar(2+Math.random()*3));
    _tc.set(bp[Math.floor(Math.random()*bp.length)]);
    colors[i*3]=_tc.r;colors[i*3+1]=_tc.g;colors[i*3+2]=_tc.b;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  const mat=new THREE.PointsMaterial({size:.06,vertexColors:true,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false});
  const pts=new THREE.Points(geo,mat);
  scene.add(pts);
  bursts.push({pts,velocities,positions,life:1,age:0});
}

// ═══════════════════════════════════════════════════════════
// BUILD SHAPE BAR
// ═══════════════════════════════════════════════════════════
const shapeBar=document.getElementById('shape-bar');
SHAPE_KEYS.forEach(key=>{
  const def=SHAPES[key];
  const btn=document.createElement('div');
  btn.className='shape-btn';
  btn.innerHTML=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${def.icon}</svg><span>${def.name}</span>`;
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    const camDir=new THREE.Vector3();
    camera.getWorldDirection(camDir);
    const pos=camera.position.clone().add(camDir.multiplyScalar(5));
    pos.x+=(Math.random()-.5)*1.5; pos.y+=(Math.random()-.5)*1;
    addShape(key,pos);
  });
  shapeBar.appendChild(btn);
});

// ═══════════════════════════════════════════════════════════
// PANEL HANDLERS
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('#gizmo-modes .mode-btn').forEach(btn=>{
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    transformCtrl.setMode(btn.dataset.mode);
    document.querySelectorAll('#gizmo-modes .mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('sl-scale').addEventListener('input',e=>{
  if(!selected) return;
  const s=parseFloat(e.target.value); selected.baseScale=s;
  gsap.to(selected.mesh.scale,{x:s,y:s,z:s,duration:0.1});
  document.getElementById('val-scale').textContent=s.toFixed(2);
});
document.getElementById('sl-spin').addEventListener('input',e=>{
  if(!selected) return;
  selected.spinSpeed=parseFloat(e.target.value);
  document.getElementById('val-spin').textContent=selected.spinSpeed.toFixed(2);
});
document.getElementById('sl-fresnel').addEventListener('input',e=>{
  if(!selected) return;
  selected.mesh.material.uniforms.uFresnelStr.value=parseFloat(e.target.value);
  document.getElementById('val-fresnel').textContent=parseFloat(e.target.value).toFixed(2);
});
document.getElementById('sl-spec').addEventListener('input',e=>{
  if(!selected) return;
  selected.mesh.material.uniforms.uSpecInt.value=parseFloat(e.target.value);
  document.getElementById('val-spec').textContent=parseFloat(e.target.value).toFixed(2);
});
document.getElementById('sl-bright').addEventListener('input',e=>{
  if(!selected) return;
  selected.mesh.material.uniforms.uMinBright.value=parseFloat(e.target.value);
  document.getElementById('val-bright').textContent=parseFloat(e.target.value).toFixed(2);
});

document.getElementById('btn-delete').addEventListener('click',e=>{ e.stopPropagation(); deleteObj(selected); });
document.getElementById('btn-duplicate').addEventListener('click',e=>{ e.stopPropagation(); duplicateObj(selected); });
document.getElementById('panel-close').addEventListener('click',e=>{ e.stopPropagation(); deselectObj(); });
document.getElementById('btn-clear').addEventListener('click',e=>{ e.stopPropagation(); clearScene(); });

// Section toggles
document.querySelectorAll('.section-title').forEach(title=>{
  title.addEventListener('click',()=>{
    const sec=title.dataset.section;
    const body=document.getElementById('body-'+sec);
    const chev=title.querySelector('.chevron');
    if(body){ body.classList.toggle('collapsed'); chev.classList.toggle('collapsed'); }
  });
});

// Prevent UI from reaching canvas
document.querySelectorAll('#props-panel,#shape-bar,#top-bar,#kb-hint').forEach(el=>{
  el.addEventListener('pointerdown',e=>e.stopPropagation());
});

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='Delete'||e.key==='Backspace') deleteObj(selected);
  else if(e.key==='Escape') deselectObj();
  else if(e.key==='d'||e.key==='D') duplicateObj(selected);
  else if(e.key==='g'||e.key==='G'){ transformCtrl.setMode('translate'); if(selected) updatePanel(selected); }
  else if(e.key==='r'&&!e.ctrlKey&&!e.metaKey){ transformCtrl.setMode('rotate'); if(selected) updatePanel(selected); }
  else if(e.key==='s'&&!e.ctrlKey&&!e.metaKey){ transformCtrl.setMode('scale'); if(selected) updatePanel(selected); }
  else if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){ e.preventDefault(); showToast('Undo'); }
  else if((e.ctrlKey||e.metaKey)&&e.key==='z'&&e.shiftKey){ e.preventDefault(); showToast('Redo'); }
});

// ═══════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════
let resizeTimer;
addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    composer.setSize(innerWidth,innerHeight);
    bloomPass.resolution.set(innerWidth*.5,innerHeight*.5);
  },100);
});

// ═══════════════════════════════════════════════════════════
// CLEANUP
// ═══════════════════════════════════════════════════════════
addEventListener('beforeunload',()=>{
  scene.traverse(obj=>{
    if(obj.geometry) obj.geometry.dispose();
    if(obj.material){ if(Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose()); else obj.material.dispose(); }
  });
  renderer.dispose();
});

// ═══════════════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════════════
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  orbit.update();
  bgMat.uniforms.uTime.value=t;

  objects.forEach(obj=>{
    obj.mesh.material.uniforms.uTime.value=t;
    if(!transformCtrl.dragging||transformCtrl.object!==obj.mesh){
      obj.mesh.rotation.y+=obj.spinSpeed*0.008;
      obj.mesh.rotation.x+=obj.spinSpeed*0.003;
    }
  });

  pMat.uniforms.uTime.value=t;

  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i]; b.age+=0.016;
    if(b.age>=b.life){ scene.remove(b.pts);b.pts.geometry.dispose();b.pts.material.dispose();bursts.splice(i,1);continue; }
    b.pts.material.opacity=1-b.age/b.life;
    for(let j=0;j<b.velocities.length;j++){
      const v=b.velocities[j];v.y-=0.024;v.multiplyScalar(0.96);
      b.positions[j*3]+=v.x*0.016;b.positions[j*3+1]+=v.y*0.016;b.positions[j*3+2]+=v.z*0.016;
    }
    b.pts.geometry.attributes.position.needsUpdate=true;
  }

  checkHover(t);
  cinematicPass.uniforms.uTime.value=t;
  composer.render();
}

// ═══════════════════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════════════════
function startScene(){
  document.getElementById('loader').classList.add('done');
  animate();

  setTimeout(()=>addShape('torusknot', new THREE.Vector3(0,0.2,0), {scale:1.2}), 100);
  setTimeout(()=>addShape('torus', new THREE.Vector3(2.5,-0.3,-0.5)), 300);
  setTimeout(()=>addShape('icosahedron', new THREE.Vector3(-2.2,0.8,0.3)), 500);
  setTimeout(()=>addShape('dodecahedron', new THREE.Vector3(1.5,1.2,-1)), 700);
  setTimeout(()=>addShape('capsule', new THREE.Vector3(-1.3,-1,0.6)), 900);

  gsap.fromTo(bloomPass,{strength:0.5},{strength:0.28,duration:1.5,ease:'power2.out'});
}

setTimeout(startScene,400);
</script>
